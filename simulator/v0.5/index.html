<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAD NEXUS В· Simulator v0.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; background: #06060e; color: #e0e0e0; }
  body { font-family: 'Rajdhani', system-ui, sans-serif; overflow-x: hidden; }
  .mono { font-family: 'Share Tech Mono', monospace; }
  button { font-family: inherit; cursor: pointer; }

  /* ---- Color palette ---- */
  :root {
    --bg: #06060e;
    --bg2: #0f0f1a;
    --bg3: #1a1a2e;
    --border: #2d2d4f;
    --cyan: #00e5ff;
    --magenta: #ff003c;
    --yellow: #ffd700;
    --green: #b4ff39;
    --orange: #ff9100;
    --purple: #a855f7;
    --text-dim: #9090a8;
    --text: #e0e0e0;
  }

  /* ---- Boot screen ---- */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #06060e; color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 4px; font-size: 14px;
  }

  /* ---- Setup screen ---- */
  .setup {
    max-width: 900px; margin: 0 auto; padding: 40px 24px;
  }
  .setup h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 42px; letter-spacing: 4px; margin: 0;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .setup .tagline {
    color: var(--text-dim); letter-spacing: 3px; font-size: 11px;
    margin-top: 4px; font-family: 'Share Tech Mono', monospace;
  }
  .setup h2 {
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan); letter-spacing: 2px;
    font-size: 16px; margin: 32px 0 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  .role-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .role-card {
    border: 2px solid var(--border); background: var(--bg2);
    padding: 16px; border-radius: 4px; cursor: pointer;
    transition: all 0.2s;
  }
  .role-card.selected { border-color: var(--cyan); background: var(--bg3); box-shadow: 0 0 20px rgba(0,229,255,0.2); }
  .role-card h3 { margin: 0 0 6px; font-family: 'Share Tech Mono', monospace; color: var(--cyan); }
  .role-card p { margin: 0; color: var(--text-dim); font-size: 13px; }

  .class-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .class-card {
    border: 1.5px solid var(--border); background: var(--bg2);
    padding: 12px; border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .class-card.selected { border-color: var(--cyan); background: rgba(0,229,255,0.1); }
  .class-card .cname { font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: 700; color: var(--cyan); letter-spacing: 1px; }
  .class-card .cstats { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  .start-btn {
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border: none; color: #000; font-weight: 700;
    font-family: 'Share Tech Mono', monospace; letter-spacing: 3px;
    padding: 14px 36px; font-size: 16px; border-radius: 3px;
    margin-top: 32px; width: 100%;
  }
  .start-btn:hover { filter: brightness(1.15); box-shadow: 0 0 30px rgba(0,229,255,0.4); }

  /* ---- Game layout ---- */
  .game {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    grid-template-rows: 50px 1fr;
    height: 100vh; max-height: 100vh;
    grid-template-areas:
      "top top top"
      "left center right";
  }
  .top-bar {
    grid-area: top;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 24px;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .top-bar .title {
    font-weight: 700; letter-spacing: 3px; color: var(--cyan);
  }
  .top-bar .phases {
    display: flex; gap: 4px; flex: 1; justify-content: center;
  }
  .phase-chip {
    padding: 2px 10px; border: 1px solid var(--border); border-radius: 2px;
    font-size: 10px; letter-spacing: 1px; color: var(--text-dim);
  }
  .phase-chip.active { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 700; }
  .phase-chip.done { color: #555; border-color: #333; }
  .top-bar .round { color: var(--yellow); }
  .top-bar .heat { color: var(--magenta); }

  /* Left panel вҖ” player state */
  .left-panel {
    grid-area: left; background: var(--bg2); border-right: 1px solid var(--border);
    padding: 12px; overflow-y: auto;
  }
  .player-card {
    border: 1.5px solid var(--border); background: var(--bg3);
    padding: 10px; border-radius: 3px; margin-bottom: 10px;
  }
  .player-card.me { border-color: var(--cyan); }
  .player-card.turn { box-shadow: 0 0 15px rgba(0,229,255,0.3); }
  .player-card .pheader {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    margin-bottom: 6px;
  }
  .player-card .pname { color: var(--cyan); letter-spacing: 1px; }
  .player-card .php {
    color: var(--magenta); font-weight: 700;
  }
  .player-card .pstats {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--text-dim); display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px;
  }
  .player-card .pstats strong { color: var(--text); }

  /* Center - map */
  .center-panel {
    grid-area: center; display: flex; flex-direction: column; padding: 12px;
    overflow: auto;
  }
  .map-wrap { display: flex; gap: 16px; }
  .map-board {
    display: grid;
    grid-template-columns: 28px repeat(5, 1fr);
    grid-template-rows: 28px repeat(5, 1fr);
    gap: 2px;
    background: #000;
    padding: 2px;
    border: 2px solid var(--border);
    max-width: 520px;
    aspect-ratio: 5.5/5.5;
  }
  /* v0.8.2 / v1.0.5-fix: 11Г—11 м •мӢқ вҖ” мҶҗнҢЁк°Җ к°Җл Өм§Җм§Җ м•ҠлҸ„лЎқ max 480pxлЎң м¶•мҶҢ */
  .map-board.size-11 {
    grid-template-columns: 18px repeat(11, 1fr);
    grid-template-rows: 18px repeat(11, 1fr);
    max-width: 480px;
    max-height: 480px;
    aspect-ratio: 1/1;
    margin: 0 auto;
  }
  .map-board.size-11 .map-cell { font-size: 7px; padding: 1px; }
  .map-board.size-11 .map-cell .coord { font-size: 6px; }
  .map-board.size-11 .map-cell .ztype { font-size: 6px; }
  .map-board.size-11 .map-cell .owner { font-size: 6px; padding: 0 1px; }
  .map-board.size-11 .map-cell .pm { font-size: 6px; }
  .map-cell {
    background: var(--bg3); display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    font-size: 10px; padding: 4px;
    position: relative; cursor: pointer;
    transition: all 0.1s;
    font-family: 'Share Tech Mono', monospace;
  }
  .map-cell:hover { filter: brightness(1.3); outline: 1px solid var(--cyan); z-index: 1; }
  .map-cell.label { background: transparent; cursor: default; color: var(--text-dim); }
  .map-cell.corner { background: transparent; cursor: default; }
  .map-cell .coord {
    position: absolute; top: 2px; left: 3px; font-size: 8px; opacity: 0.5;
  }
  .map-cell .ztype { font-size: 9px; color: #000; font-weight: 700; }
  .map-cell .owner {
    position: absolute; bottom: 2px; right: 3px;
    font-size: 7px; padding: 0 3px;
    background: rgba(0,0,0,0.5); color: white; font-weight: 700;
  }
  .map-cell .pm {
    position: absolute; top: 14px; right: 3px; font-size: 9px;
    background: var(--cyan); color: #000; padding: 1px 3px; font-weight: 700;
  }
  /* Zone colors */
  .z-ruin { background: #3a3a2a; color: #999; }
  .z-home { background: #4a3a5a; color: #fff; }
  .z-bank { background: #8a6a10; color: #fff; }
  .z-data { background: #1a4a7a; color: #fff; }
  .z-heal { background: #2a7a5a; color: #fff; }
  .z-work { background: #7a5a2a; color: #fff; }
  .z-arms { background: #5a5a5a; color: #fff; }
  .z-club { background: #7a2a5a; color: #fff; }
  .z-port { background: #3a4a7a; color: #fff; }
  .z-cop  { background: #222; color: #fff; }
  .z-nex  { background: #ffd700; color: #000; font-weight: 900; }
  .z-aux  { background: #5a3a3a; color: #fff; }

  /* Right panel */
  .right-panel {
    grid-area: right; background: var(--bg2); border-left: 1px solid var(--border);
    padding: 12px; overflow-y: auto; display: flex; flex-direction: column;
  }
  .pool-box {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 8px; border-radius: 3px; margin-bottom: 10px;
  }
  .pool-box h4 {
    margin: 0 0 6px; font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
  }
  .attr-row { display: flex; gap: 4px; flex-wrap: wrap; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .attr-tag {
    padding: 2px 6px; border-radius: 2px; color: white; font-weight: 700;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .a-M { background: #185FA5; }
  .a-I { background: #888780; }
  .a-V { background: #854F0B; }
  .a-S { background: #534AB7; }
  .a-B { background: #1D9E75; }
  .a-A { background: #C04828; }
  .a-GRID { background: #666; }

  .signal-box { text-align: center; font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; padding: 6px; }
  .sig-MESH_UP { background: rgba(24,95,165,0.3); color: var(--cyan); }
  .sig-MESH_DOWN { background: rgba(192,72,40,0.3); color: var(--magenta); }
  .sig-SURGE { background: rgba(255,215,0,0.3); color: var(--yellow); }
  .sig-BLACKOUT { background: #000; color: #555; border: 1px solid #333; }

  .news-box {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 10px; border-radius: 3px; margin-bottom: 10px;
    font-size: 12px;
  }
  .news-box .nh { color: var(--yellow); font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }

  .log-box {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 10px; border-radius: 3px; font-size: 12px; flex: 1 1 auto;
    overflow-y: auto; min-height: 200px;
    font-family: 'Share Tech Mono', monospace;
    display: flex; flex-direction: column;
  }
  .log-box .log-head {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 1px solid var(--border);
  }
  .log-box .log-head h4 {
    margin: 0; font-size: 11px; letter-spacing: 3px; color: var(--cyan);
  }
  .log-box .copy-btn {
    background: var(--bg2); border: 1px solid var(--cyan); color: var(--cyan);
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    padding: 3px 8px; letter-spacing: 1px; cursor: pointer;
  }
  .log-box .copy-btn:hover { background: var(--cyan); color: #000; }
  .log-box .log-scroll {
    flex: 1; overflow-y: auto; padding-right: 4px;
    display: flex; flex-direction: column-reverse;
  }
  .log-entry {
    padding: 3px 6px; margin-bottom: 2px;
    line-height: 1.4; font-size: 11px;
    color: var(--text-dim);
    border-left: 2px solid transparent;
    word-break: break-word;
  }
  .log-entry.me { border-left-color: var(--cyan); background: rgba(0,229,255,0.06); color: var(--text); }
  .log-entry.combat { color: var(--magenta); }
  .log-entry.income { color: var(--green); }
  .log-entry.news { color: var(--yellow); }
  .log-entry.move { color: #9fdcff; }
  .log-entry.raid { color: #ff6b9e; font-weight: 700; }
  .log-entry.round { color: var(--cyan); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; padding: 4px 6px; background: rgba(0,229,255,0.08); }
  .log-entry.summary { color: var(--yellow); background: rgba(255,215,0,0.08); padding: 4px 6px; font-weight: 700; }
  .log-entry .tag { font-size: 9px; color: var(--text-dim); margin-right: 6px; font-weight: 400; }

  /* Hand */
  /* v1.0.5-fix: handк°Җ н•ӯмғҒ мөңмҶҢ 280px ліҙмһҘ (11Г—11 л§өм—җ к°Җл Өм§Җм§Җ м•ҠлҸ„лЎқ) */
  .hand-wrap {
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 10px; flex: 1 1 280px;
    display: flex; flex-direction: column;
    min-height: 280px; max-height: 320px;
  }
  .hand-wrap h4 { margin: 0 0 6px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); letter-spacing: 2px; }
  .hand { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; flex: 1; align-items: flex-start; }
  .card {
    width: 150px; height: 240px;
    background: #0a0a18; border: 1.5px solid var(--border);
    border-radius: 4px; padding: 6px;
    flex-shrink: 0;
    font-size: 10px; display: flex; flex-direction: column;
    cursor: pointer; transition: transform 0.15s, border-color 0.1s;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--cyan); }
  .card.selected { border-color: var(--yellow); box-shadow: 0 0 12px rgba(255,215,0,0.4); }
  .card.disabled { opacity: 0.4; cursor: not-allowed; }
  .card .ch {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    border-bottom: 1px solid var(--border); padding-bottom: 3px; margin-bottom: 3px;
  }
  .card .ci { background: var(--cyan); color: #000; padding: 1px 5px; font-weight: 700; }
  .card .ct {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--yellow); letter-spacing: 0.5px; text-align: center; margin: 4px 0;
  }
  .card .ceff {
    font-size: 9.5px; line-height: 1.35; flex: 1;
    overflow-y: auto; max-height: 90px;
  }
  .card .ceff strong { display: block; margin-bottom: 2px; font-size: 9px; }
  .card .cbot {
    border-top: 1px dashed #444; padding-top: 4px; margin-top: 3px;
    font-size: 9.5px; line-height: 1.35;
    max-height: 90px; overflow-y: auto;
  }
  .card .cbot strong { display: block; margin-bottom: 2px; font-size: 9px; }
  .card .cost {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim);
  }
  .loss-tag { color: var(--magenta); font-weight: 700; font-size: 8px; padding: 1px 3px; background: rgba(255,0,60,0.2); }

  /* Action buttons */
  .phase-actions {
    display: flex; gap: 8px; padding: 10px; background: var(--bg2);
    border-top: 2px solid var(--cyan);
    flex: 0 0 auto;
    min-height: 54px;
  }
  /* v1.0.5-fix: л§өмқҙ л„Ҳл¬ҙ нҒ¬л©ҙ мҠӨнҒ¬лЎӨлҗҳлҸ„лЎқ, handлҠ” н•ӯмғҒ ліҙмқҙкІҢ */
  .center-panel { display: flex; flex-direction: column; min-height: 0; overflow: hidden; }
  .map-wrap { flex: 0 1 auto; overflow: auto; min-height: 0; }
  .pa-btn {
    flex: 1; padding: 10px; background: var(--bg3);
    border: 1.5px solid var(--border); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px; border-radius: 2px; font-size: 12px;
  }
  .pa-btn:hover:not(:disabled) { background: var(--cyan); color: #000; border-color: var(--cyan); }
  .pa-btn.primary { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 700; }
  .pa-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg2); border: 2px solid var(--cyan);
    padding: 24px; border-radius: 4px; max-width: 560px; width: 90%;
  }
  .modal h2 {
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan); letter-spacing: 3px; margin: 0 0 12px;
  }
  .modal p { color: var(--text-dim); line-height: 1.5; }
  .modal .obj-list { margin: 16px 0; }
  .modal .obj-item {
    background: var(--bg3); border-left: 3px solid var(--yellow);
    padding: 8px 12px; margin: 6px 0; font-size: 12px;
  }

  /* Game over */
  .gameover {
    text-align: center; padding: 60px 24px;
  }
  .gameover h1 {
    font-family: 'Share Tech Mono', monospace; font-size: 56px;
    letter-spacing: 6px; margin: 0 0 20px;
  }
  .gameover.win h1 { color: var(--green); text-shadow: 0 0 30px var(--green); }
  .gameover.lose h1 { color: var(--magenta); text-shadow: 0 0 30px var(--magenta); }
  .gameover .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    max-width: 600px; margin: 24px auto;
  }
  .gameover .stat-box {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 16px; border-radius: 3px;
  }
  .gameover .stat-box .lbl { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
  .gameover .stat-box .val { font-family: 'Share Tech Mono', monospace; font-size: 28px; color: var(--cyan); margin-top: 4px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
</style>
</head>
<body>

<div id="root">
  <div id="boot">INITIALIZING ASHGRID SIMULATION...</div>
</div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<script type="text/babel" data-presets="react">
'use strict';
const { useState, useEffect, useReducer, useMemo, useCallback, useRef } = React;

// ============================================================================
// DATA
// ============================================================================

const ZONE_TYPES = {
  ruin: { name: 'нҸҗн—Ҳ', color: 'z-ruin', income: {}, attr: 'A', buildable: false, note: 'кұ°м җ л¶Ҳк°Җ' },
  home: { name: 'мЈјнғқк°Җ', color: 'z-home', income: { credit: 1, operative: 1 }, attr: 'GRID', buildable: true },
  bank: { name: 'кёҲмңөк°Җ', color: 'z-bank', income: { credit: 3 }, attr: 'M', buildable: true },
  data: { name: 'лҚ°мқҙн„°н—ҲлёҢ', color: 'z-data', income: { data: 2 }, attr: 'M', buildable: true },
  heal: { name: 'мқҳлЈҢкө¬м—ӯ', color: 'z-heal', income: { operative: 1 }, attr: 'B', buildable: true, note: 'HPнҡҢліө' },
  work: { name: 'кіөм—…м§Җкө¬', color: 'z-work', income: { parts: 2 }, attr: 'V', buildable: true },
  arms: { name: 'л¬ҙкё°кі ', color: 'z-arms', income: { weapons: 2 }, attr: 'I', buildable: true, note: 'л°©м–ҙ+1' },
  club: { name: 'мң нқҘк°Җ', color: 'z-club', income: { credit: 2 }, attr: 'S', buildable: true },
  port: { name: 'н•ӯкө¬', color: 'z-port', income: { credit: 1, weapons: 1 }, attr: 'I', buildable: true },
  cop:  { name: 'кІҪм°°м„ң', color: 'z-cop', income: {}, attr: null, buildable: false, note: 'м җл № л¶Ҳк°Җ' },
  nex:  { name: 'NEXUS', color: 'z-nex', income: { credit: 3, all_attr: 1 }, attr: 'all', buildable: true, note: '2R м—°мҶҚ=мҰүмӢң мҠ№лҰ¬(нҠңнҶ )' },
  aux:  { name: 'л„Ҙм„ңмҠӨл¶ҖмҶҚ', color: 'z-aux', income: { credit: 2, random_attr: 1 }, attr: null, buildable: true },
};

const MAP_11x11_ZONES = [
  // мҪ”л„Ҳ (мҷёкіҪ) вҖ” ruin / home мң„мЈј
  'ruin','home','ruin','aux','data','bank','data','aux','ruin','home','ruin',

  'ruin','work','heal','club','aux','heal','aux','club','heal','work','ruin',

  'data','data','aux','work','heal','arms','heal','work','aux','data','data',
  'bank','home','heal','data','arms','nex', 'arms','data','heal','home','bank',  // мӨ‘м•ҷ F6 = NEXUS
  'data','data','aux','work','heal','arms','heal','work','aux','data','data',
  'aux','arms','club','port','work','data','work','port','club','arms','aux',
  'ruin','work','heal','club','aux','heal','aux','club','heal','work','ruin',
  'home','aux','work','arms','data','home','data','arms','work','aux','home',
  'ruin','home','ruin','aux','data','bank','data','aux','ruin','home','ruin',
];
const MAP_11x11 = (() => {
  const cells = [];
  for (let r = 0; r < 11; r++) {
    for (let c = 0; c < 11; c++) {
      const coord = String.fromCharCode(65 + c) + (r + 1);
      const zone = MAP_11x11_ZONES[r * 11 + c];
      cells.push([coord, zone]);
    }
  }
  return cells;
})();

const d6 = () => Math.floor(Math.random() * 6) + 1;
const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
const shuffle = (a) => { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[r[i], r[j]] = [r[j], r[i]]; } return r; };

const rollSignalDie = () => {
  const r = d6();
  if (r <= 2) return 'MESH_UP';
  if (r <= 4) return 'MESH_DOWN';
  if (r === 5) return 'SURGE';
  return 'BLACKOUT';
};

const initTracks = (specific) => {
  const start = CLASS_STARTING_TRACKS[specific] || {};
  const tracks = {};
  TRACK_KEYS.forEach(k => { tracks[k] = start[k] || 0; });
  return { tracks };
};

// кұ°лҰ¬лӘ…м„ұ(Street Cred) = 5нҠёлһҷ н•© вҖ” DEAD NEXUS Ashgrid 2091 н•өмӢ¬ м§Җн‘ң
function getInfamy(player) {
  if (!player.tracks) return 0;
  return TRACK_KEYS.reduce((sum, k) => sum + (player.tracks[k] || 0), 0);
}

// нҠёлһҷ м§Ғм ‘ л ҲлІЁм—… (мһҗмӣҗ м°Ёк°җ + л ҲлІЁ +1) вҖ” ліҙнҶө R&D нҺҳмқҙмҰҲм—җм„ң нҳём¶ң
// л°ҳнҷҳ: { ok: bool, state: newState, reason: string }
function levelUpTrack(state, playerIdx, key, opts = {}) {
  if (!TRACK_KEYS.includes(key)) return { ok: false, state, reason: 'мһҳлӘ»лҗң нҠёлһҷ' };
  const p = state.players[playerIdx];
  const tracks = { ...(p.tracks || {}) };
  const curLv = tracks[key] || 0;
  if (curLv >= TRACK_MAX) return { ok: false, state, reason: 'LV5 лҸ„лӢ¬' };
  // л№„мҡ© кІҖмҰқ (free мҳөм…ҳмқҙл©ҙ мҠӨнӮө)
  const cost = opts.free ? {} : (TRACK_COST[key] || {});
  for (const [resKey, amt] of Object.entries(cost)) {
    if ((p.resources[resKey] || 0) < amt) return { ok: false, state, reason: `${resKey} ${amt} н•„мҡ”` };
  }
  // мһҗмӣҗ м°Ёк°җ
  const ps = [...state.players];
  const newP = { ...p };
  newP.resources = { ...p.resources };
  for (const [resKey, amt] of Object.entries(cost)) {
    newP.resources[resKey] = (newP.resources[resKey] || 0) - amt;
  }
  tracks[key] = curLv + 1;
  newP.tracks = tracks;
  ps[playerIdx] = newP;
  let s = { ...state, players: ps };
  const tn = TRACK_NAMES[key];
  const marker = playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
  const costStr = Object.entries(cost).map(([k, v]) => `-${v}${k.charAt(0).toUpperCase()}`).join(' ');
  s = logEntry(s, `${marker}${tn.icon} P${playerIdx} [${newP.specific}] В· ${tn.name} нҠёлһҷ LV${curLv + 1} нҲ¬мһҗ ${costStr ? `(${costStr})` : '(л¬ҙлЈҢ)'} В· ${STREETCRED_LABEL} ${getInfamy(newP)}`);
  s = checkInfamyMilestones(s, playerIdx);
  return { ok: true, state: s, reason: '' };
}

// нҠёлһҷ мһҗлҸҷ мғҒмҠ№ вҖ” м№ҙл“ң нҡЁкіјВ·м•Ўм…ҳ кІ°кіјлЎң л¬ҙлЈҢ +1 (ліҙнҶө 1м№ё)
// levelUpTrackкіј лӢ¬лҰ¬ мһҗмӣҗ л№„мҡ© м—ҶмқҢ, кІҢмһ„ мӨ‘ лҲ„м Ғ к°ҖлҠҘ
function raiseTrack(state, playerIdx, key, n = 1, reason = '') {
  if (!TRACK_KEYS.includes(key)) return state;
  const p = state.players[playerIdx];
  if (!p || p.defeated) return state;
  const tracks = { ...(p.tracks || {}) };
  const curLv = tracks[key] || 0;
  if (curLv >= TRACK_MAX) return state;
  const newLv = Math.min(TRACK_MAX, curLv + n);
  if (newLv === curLv) return state;
  tracks[key] = newLv;
  const ps = [...state.players];
  ps[playerIdx] = { ...p, tracks };
  let s = { ...state, players: ps };
  const tn = TRACK_NAMES[key];
  const marker = playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
  s = logEntry(s, `${marker}${tn.icon} P${playerIdx} [${p.specific}] В· ${tn.name} LV${curLv}вҶ’${newLv} (${reason || 'м•Ўм…ҳ'}) В· ${STREETCRED_LABEL} ${getInfamy(ps[playerIdx])}`);
  // v0.6.4: LV5 лҸ„лӢ¬ мӢң once-ability н•ҙкёҲ
  if (newLv === 5 && curLv < 5) {
    const onceMap = {
      combat: 'critFailImmunity',     // л¬ҙл Ҙ LV5: нҒ¬лҰ¬нӢ°м»¬ мӢӨнҢЁ мҳҒкө¬ л©ҙм—ӯ
      transport: 'teleport',           // мҲҳмҶЎ LV5: 1нҡҢ н…”л ҲнҸ¬нҠё
      mfg: 'droneFree',                // м ңмЎ° LV5: 1нҡҢ л¬ҙлЈҢ л“ңлЎ 
      party: 'reroll',                 // нҢҢнӢ° LV5: 1нҡҢ мЈјмӮ¬мң„ лҰ¬лЎӨ
      security: 'deathSave',           // кІҪнҳё LV5: 1нҡҢ HP 0вҶ’1 л¶Җнҷң
    };
    const ability = onceMap[key];
    if (ability) {
      const abilities = { ...(ps[playerIdx].onceAbilities || {}), [ability]: true };
      ps[playerIdx] = { ...ps[playerIdx], onceAbilities: abilities };
      s = { ...s, players: ps };
      s = logEntry(s, `рҹҢҹ P${playerIdx} [${p.specific}] В· ${tn.name} LV5 к¶Ғк·№ н•ҙкёҲ вҖ” ${ability}`);
    }
  }
  s = checkInfamyMilestones(s, playerIdx);
  return s;
}

// v0.6.3c: нҠёлһҷ LVлі„ нҢЁмӢңлёҢ ліҙл„ҲмҠӨ (мӮ¬мқҙлІ„нҺ‘нҒ¬ лқјмқҙн”„нҢЁмҠӨмӢқ)
// LV2: кё°ліё +1 / LV4: м¶”к°Җ +2 (мҙқ +3) / LV5: м¶”к°Җ +1 (мҙқ +4)
function trackBonus(p, kind) {
  if (!p?.tracks) return 0;
  const t = p.tracks;
  let b = 0;
  const map = { atk: 'combat', spd: 'transport', def: 'security', hack: 'mfg' };
  const trackKey = map[kind];
  if (!trackKey) return 0;
  const lv = t[trackKey] || 0;
  if (lv >= 2) b += 1;
  if (lv >= 4) b += 2;
  if (lv >= 5) b += 1;
  return b;
}

// мһҗмӮ¬ кө¬м—ӯм—җ кұҙл¬ј 1к°ң кұҙм„Ө вҶ’ мҳҒкө¬ нҢЁмӢңлёҢ. Ghost л Ҳмқҙл“ңлЎң нҢҢкҙҙ к°ҖлҠҘ
const BUILDINGS = {
  factory:   { name: 'кіөмһҘ',     icon: 'рҹҸӯ', tl: 1, cost: { credit: 4, parts: 2 }, desc: 'л§Ө лқјмҡҙл“ң л¶Җн’Ҳ +2' },

  trading:   { name: 'кұ°лһҳмҶҢ',   icon: 'рҹ“Ҳ', tl: 2, cost: { credit: 5 },           desc: 'л§Ө лқјмҡҙл“ң мһҗмӮ¬ мЈјмӢқ +1, л§Ө R&D нҒ¬л Ҳл”§ +3' },
  media:     { name: 'лҜёл””м–ҙн—ҲлёҢ', icon: 'рҹ“Ў', tl: 3, cost: { credit: 5, parts: 2 }, desc: 'лүҙмҠӨ нҡЁкіј -50% (л°ӣкё°), Ghost мҲҳл°° +1 (мҳҶ лҸ„мӢң)' },
};
function canBuildBuilding(state, playerIdx, key, coord) {
  const p = state.players[playerIdx];
  if (!p || p.role !== 'bloc' || p.defeated) return { ok: false, reason: 'Bloc м „мҡ©' };
  const cell = state.map[coord];
  if (!cell || cell.owner !== playerIdx) return { ok: false, reason: 'мһҗмӮ¬ кө¬м—ӯл§Ң' };
  if (cell.building) return { ok: false, reason: 'мқҙлҜё кұҙл¬ј мЎҙмһ¬' };
  const cfg = BUILDINGS[key];
  if (!cfg) return { ok: false, reason: 'мһҳлӘ»лҗң кұҙл¬ј' };
  if ((p.tl || 1) < cfg.tl) return { ok: false, reason: `TL${cfg.tl} н•„мҡ”` };
  for (const [r, amt] of Object.entries(cfg.cost)) {
    if ((p.resources[r] || 0) < amt) return { ok: false, reason: `${r} ${amt} н•„мҡ”` };
  }
  return { ok: true };
}

const SIGNAL_REVEAL_COST = { data: 3 };  // data 3 вҶ’ +1 мӢңк·ёл„җ
const SIGNAL_LEVEL_DESC = {
  0: 'м •мІҙ лҜёмғҒ (???)',
  1: 'м •мІҙ нҷ•мқё',
  2: 'л°©м–ҙ нҠ№м„ұ л…ём¶ң',
  3: 'мҷ„м „ л…ём¶ң (л Ҳмқҙл“ң мӢң ліҙл„ҲмҠӨ м•ҪнғҲ)',
};
function revealSignal(state, npcIdx, by = 0, n = 1) {
  const npc = state.players[npcIdx];
  if (!npc?.isNpc || !npc.signal) return state;
  const cur = npc.signal.revealed || 0;
  if (cur >= npc.signal.max) return state;
  const next = Math.min(npc.signal.max, cur + n);
  if (next === cur) return state;
  const ps = [...state.players];
  ps[npcIdx] = { ...npc, signal: { ...npc.signal, revealed: next } };
  let s = { ...state, players: ps };
  const marker = by === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
  s = logEntry(s, `${marker}рҹ“Ў NPC P${npcIdx} мӢңк·ёл„җ ${cur}вҶ’${next}: ${SIGNAL_LEVEL_DESC[next]}${next === 3 ? ' [' + npc.specific + ']' : ''}`);
  return s;
}

// нҠёлһҷ нҢЁмӢңлёҢ мһҗмӣҗ ліҙл„ҲмҠӨ (мҲҳмқө нҺҳмқҙмҰҲм—җм„ң нҳём¶ң)
function trackIncomeBonus(p) {
  if (!p?.tracks) return { credit: 0, parts: 0 };
  const t = p.tracks;
  let credit = 0, parts = 0;
  const partyLv = t.party || 0;
  if (partyLv >= 2) credit += 1;
  if (partyLv >= 4) credit += 2;
  if (partyLv >= 5) credit += 1;
  const mfgLv = t.mfg || 0;
  if (mfgLv >= 2) parts += 1;
  if (mfgLv >= 4) parts += 2;
  if (mfgLv >= 5) parts += 1;
  return { credit, parts };
}

// н•ҳмқҙлқјмқҙнҠё кё°лЎқ вҖ” 1нҡҢм„ұ (мқҙлҜё л°ӣм•ҳмңјл©ҙ мһ¬л°ңлҸҷ X)
function recordHighlight(state, key, playerIdx) {
  const def = HIGHLIGHT_DEFS[key];
  if (!def) return state;
  const list = state.meta.highlights || [];
  const dupe = list.find(h => h.key === key && h.playerIdx === playerIdx);
  if (dupe) return state;  // 1нҡҢм„ұ
  const entry = { key, playerIdx, round: state.meta.round, label: def.label, icon: def.icon, rep: def.rep };
  let s = { ...state, meta: { ...state.meta, highlights: [...list, entry] } };
  // нҸүнҢҗ ліҙмғҒ
  if (def.rep > 0) {
    const ps = [...s.players];
    ps[playerIdx] = { ...ps[playerIdx], resources: { ...ps[playerIdx].resources, rep: (ps[playerIdx].resources.rep || 0) + def.rep } };
    s = { ...s, players: ps };
  }
  const marker = playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
  s = logEntry(s, `${marker}${def.icon} P${playerIdx} В· н•ҳмқҙлқјмқҙнҠё [${def.label}] В· ${def.desc} В· вҳ…+${def.rep}`);
  return s;
}
function checkInfamyMilestones(state, playerIdx) {
  if (!MILESTONES_ENABLED) return state;
  const p = state.players[playerIdx];
  if (!p) return state;
  const infamy = getInfamy(p);
  const awarded = (state.meta.milestonesAwarded && state.meta.milestonesAwarded[playerIdx]) || [];
  let s = state;
  for (const ms of INFAMY_MILESTONES) {
    if (infamy >= ms && !awarded.includes(ms)) {
      s = applyInfamyMilestone(s, playerIdx, ms);
      const newAwarded = [...awarded, ms];
      const allAwarded = { ...(s.meta.milestonesAwarded || {}), [playerIdx]: newAwarded };
      s = { ...s, meta: { ...s.meta, milestonesAwarded: allAwarded } };
    }
  }
  return s;
}

function applyInfamyMilestone(state, playerIdx, ms) {
  const p = state.players[playerIdx];
  const ps = [...state.players];
  let s = state;
  const marker = playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
  // v0.6.3b: л§ҲмқјмҠӨнҶӨмқҖ "лҸ„мһҘ" к°ҷмқҖ мһ‘мқҖ ліҙл„ҲмҠӨлЎң. кІҢмһ„ мў…кІ°мқ„ м§Ғм ‘ л§Ңл“Өм§Җ м•ҠмқҢ.
  if (ms === 6) {
    // 6: мһҗмӣҗ н•ң л¬¶мқҢ вҖ” Ghost вҳ…+1 вӮө+2, Bloc вӮө+3 вҡҷ+1
    const gain = p.role === 'ghost' ? { rep: 1, credit: 2 } : { credit: 3, parts: 1 };
    ps[playerIdx] = { ...p, resources: { ...p.resources, rep: (p.resources.rep || 0) + (gain.rep || 0), credit: (p.resources.credit || 0) + (gain.credit || 0), parts: (p.resources.parts || 0) + (gain.parts || 0) } };
    s = { ...s, players: ps };
    s = logEntry(s, `${marker}вҳ  P${playerIdx} [${p.specific}] В· ${STREETCRED_LABEL} 6 л§ҲмқјмҠӨнҶӨ вҖ” ${p.role === 'ghost' ? 'вҳ…+1 вӮө+2' : 'вӮө+3 вҡҷ+1'}`);
  } else if (ms === 12) {
    // 12: TL Progress +3 (мһҗлҸҷ мҠ№кёү X) + мһҗмӣҗ м•Ҫк°„
    const newProg = (p.tlProgress || 0) + 3;
    ps[playerIdx] = { ...p, tlProgress: newProg, resources: { ...p.resources, rep: (p.resources.rep || 0) + 1, credit: (p.resources.credit || 0) + 3 } };
    s = { ...s, players: ps };
    s = logEntry(s, `${marker}вҳ  P${playerIdx} [${p.specific}] В· ${STREETCRED_LABEL} 12 л§ҲмқјмҠӨнҶӨ вҖ” TLм§„мІҷ+3 вҳ…+1 вӮө+3`);
  } else if (ms === 18) {
    // 18: м „м„Ө вҖ” GhostлҠ” вҳ…+3, BlocмқҖ вӮө+5 + мҳҒкө¬ мҳҒн–Ҙл Ҙ+1
    if (p.role === 'ghost') {
      ps[playerIdx] = { ...p, resources: { ...p.resources, rep: (p.resources.rep || 0) + 3 } };
    } else {
      ps[playerIdx] = { ...p, resources: { ...p.resources, credit: (p.resources.credit || 0) + 5, influence: (p.resources.influence || 0) + 1 } };
    }
    s = { ...s, players: ps };
    s = logEntry(s, `${marker}рҹҸҶ P${playerIdx} [${p.specific}] В· ${STREETCRED_LABEL} 18 м „м„Ө л§ҲмқјмҠӨнҶӨ вҖ” ${p.role === 'ghost' ? 'вҳ…+3' : 'вӮө+5 мҳҒн–Ҙл Ҙ+1'}`);
    s = recordHighlight(s, 'milestone_18', playerIdx);  // v0.9.1
  }
  return s;
}

// ============================================================================
// кІҢмһ„ нһҲмҠӨнҶ лҰ¬ (LocalStorage) вҖ” лёҢлқјмҡ°м Җ лЎңм»¬м—җл§Ң м ҖмһҘ, м„ңлІ„ м „мҶЎ м—ҶмқҢ
// ============================================================================
const HISTORY_KEY = 'dn_sim_history_v053';
const loadHistory = () => {
  try {
    const raw = localStorage.getItem(HISTORY_KEY);
    return raw ? JSON.parse(raw) : [];
  } catch { return []; }
};
const saveGameRecord = (rec) => {
  try {
    const h = loadHistory();
    h.unshift(rec);
    localStorage.setItem(HISTORY_KEY, JSON.stringify(h.slice(0, 50)));  // мөңк·ј 50нҢҗл§Ң
  } catch (e) { console.warn('history save failed', e); }
};
const clearHistory = () => {
  try { localStorage.removeItem(HISTORY_KEY); } catch {}
};
const buildGameRecord = (state) => {
  const me = state.players[0];
  const iWon = state.meta.winner === 0;
  return {
    ts: Date.now(),
    round: state.meta.round,
    role: me.role,
    specific: me.specific,
    won: iWon,
    winner: state.meta.winner,
    winnerSpecific: state.meta.winner != null ? state.players[state.meta.winner]?.specific : null,
    reason: state.meta.winReason,
    hp: me.hp,
    rep: me.resources.rep,
    asset: assetValue(me, state.stocks, state),
    raids: state.meta.raidsThisGame?.[0] || 0,
    tl: me.tl,
    achievements: me.achievements.length,
    zones: Object.values(state.map).filter(c => c.owner === 0).length,
  };
};
const formatHistoryTime = (ts) => {
  const d = new Date(ts);
  const pad = n => String(n).padStart(2, '0');
  return `${d.getMonth()+1}/${d.getDate()} ${pad(d.getHours())}:${pad(d.getMinutes())}`;
};

const coord = (col, row) => String.fromCharCode(65 + col) + (row + 1);
// v0.7.3: л‘җ лІҲм§ё мқёмһҗ maxIdx (0-based мөңлҢҖ мқёлҚұмҠӨ). 5Г—5лҠ” 4, 11Г—11мқҖ 10. лҜём§Җм • мӢң 10 (нҒ° ліҙл“ң).
const coordsAdj = (c, maxIdx = 10) => {
  const col = c.charCodeAt(0) - 65;
  const row = parseInt(c.slice(1)) - 1;
  return [
    col > 0      ? coord(col - 1, row) : null,
    col < maxIdx ? coord(col + 1, row) : null,
    row > 0      ? coord(col, row - 1) : null,
    row < maxIdx ? coord(col, row + 1) : null,
  ].filter(Boolean);
};

// мһҗкё° лё”лЎқ мЈјмӢқ: нҶөм ңк¶Ң н‘ңмӢң, мһҗмӮ° X
// мһҗмӮ° = ОЈ(нғҖ лё”лЎқ мЈјмӢқ Г— мЈјк°Җ) + кө¬м—ӯ мҲҳ Г— 5
// нҒ¬л Ҳл”§мқҖ мң лҸҷ мһҗмӣҗмқҙлқј мһҗліём—җ м•Ҳ л„ЈмқҢ (мһҗмӮ° мқён”Ңл Ҳ л°©м§Җ)
const assetValue = (p, stocks, state) => {
  // v0.5.16: Bloc кІҪм ң к°ңм„ 
  // - кө¬м—ӯ к°Җм№ҳ 5 вҶ’ 7 (кө¬м—ӯ нҷ•мһҘ к°ҖмҶҚ)
  // - нҒ¬л Ҳл”§ 1/3 л°ҳмҳҒ (нҳ„кёҲ ліҙмң лҸ„ мһҗмӮ°мқҳ мқјл¶Җ, лӢЁ мң лҸҷм„ұ н• мқё)
  // - л¬ҙкё°/л¶Җн’Ҳ/лҚ°мқҙн„°лҸ„ мҶҢм•Ў мһҗмӮ°нҷ” (к°Ғ 1pt)
  let total = 0;
  for (const [bl, qty] of Object.entries(p.stocks)) {
    const isOwn = p.role === 'bloc' && p.specific === bl;
    if (isOwn) continue;
    const price = stocks[bl] ?? 10;
    total += qty * price;
  }
  if (state?.map) {
    const zonesOwned = Object.values(state.map).filter(c => c.owner === p.id).length;
    total += zonesOwned * 5;
    // v0.6.3e: кұҙл¬ј мһҗмӮ° ліҙл„ҲмҠӨ вҖ” мӮ¬мҳҘ +5, кұ°лһҳмҶҢ +3, кіөмһҘ/ліҙм•Ҳм„јн„° +2, лҜёл””м–ҙн—ҲлёҢ +4
    const buildingValue = { hq: 5, trading: 3, factory: 2, security: 2, media: 4 };
    Object.values(state.map).forEach(cell => {
      if (cell.owner === p.id && cell.building) total += (buildingValue[cell.building] || 0);
    });
  }
  // v0.5.16 кІ°лЎ : мһҗмӮ° кө¬м„ұмқҖ мҲңмҲҳн•ҳкІҢ (нғҖ лё”лЎқ мЈјмӢқ + кө¬м—ӯ)л§Ң мң м§Җ.
  // Bloc/Ghost P0 кІ©м°ЁлҠ” assetGoal мқҙ м•„лӢҢ Ghost мҠ№лҰ¬ лЈЁнҠё мҲҳ л¬ём ң.
  return Math.floor(total);
};

  : { credit: 5, data: 0, influence: 0, weapons: 0, parts: 0, rep: 5 };

};

// ============================================================================
// GAME STATE + REDUCER

function initGame(humanRole, humanSpecific, playerCount, mapSize, extraOpts) {
  // v0.7.3: 5x5 лҳҗлҠ” 11x11 л§ө л№Ңл“ң (mapSize лҜём§Җм • мӢң 5x5)
  // v1.0: extraOpts = { mode, difficulty, humans } вҖ” мҶ”лЎң/л©ҖнӢ° лӘЁл“ң, лӮңмқҙлҸ„, м¶”к°Җ мқёк°„ м •мқҳ
  const useSize = mapSize === '11x11' ? '11x11' : '5x5';
  const mapSrc = useSize === '11x11' ? MAP_11x11 : MAP_5x5;
  const blocSetupSrc = useSize === '11x11' ? BLOC_SETUP_11x11 : BLOC_SETUP;
  const mode = extraOpts?.mode || 'solo';
  const difficulty = extraOpts?.difficulty || 'normal';
  const humansList = extraOpts?.humans || null;
  const map = {};
  mapSrc.forEach(([c, z]) => {
    map[c] = { zone: z, owner: null, token: Math.random() < 0.6 ? 'quest' : (Math.random() < 0.5 ? 'instant' : 'discovery'), tokenRevealed: false };
  });

  // v1.0.2: л©ҖнӢ° лӘЁл“ңл©ҙ humansList кёёмқҙл§ҢнҒј мқёк°„, лӮҳлЁём§ҖлҠ” лҙҮмңјлЎң
  // мҶ”лЎң/лҙҮл§Ң лӘЁл“ң: 1 human + (playerCount-1) bots
  const totalPlayers = Math.max(2, Math.min(5, playerCount || 4));
  const players = [];
  const allBlocs = ['VANTA', 'IRONWALL', 'HELIX', 'AXIOM', 'CARBON'];
  const allGhosts = ['CIPHER', 'BLADE', 'BROKER', 'RIGGER', 'DRIFTER', 'MOLE'];
  const usedBlocs = [];
  const usedGhosts = [];
  const pickBloc = () => { const avail = allBlocs.filter(b => !usedBlocs.includes(b)); const p = rand(avail); usedBlocs.push(p); return p; };
  const pickGhost = () => { const avail = allGhosts.filter(g => !usedGhosts.includes(g)); const p = rand(avail); usedGhosts.push(p); return p; };

  if (mode === 'multi' && humansList && humansList.length >= 2) {
    // л©ҖнӢ° н•«мӢңнҠё: humansList к·ёлҢҖлЎң мқёк°„ P0~P(N-1)
    humansList.forEach((h, i) => {
      players.push(buildPlayer(i, 'human', h.role, h.specific));
      if (h.role === 'bloc') usedBlocs.push(h.specific);
      else usedGhosts.push(h.specific);
    });
    // л№Ҳ мһҗлҰ¬ лҙҮ ліҙм¶© (мҙқ totalPlayersк№Ңм§Җ)
    const botCount = Math.max(0, totalPlayers - humansList.length);
    // к· нҳ•: мқёк°„ Ghost мҲҳ vs Bloc мҲҳ м°ЁмқҙлҘј лҙҮмқҙ ліҙм¶©
    const humanGhostN = humansList.filter(h => h.role === 'ghost').length;
    const humanBlocN  = humansList.filter(h => h.role === 'bloc').length;
    for (let i = 0; i < botCount; i++) {
      const needGhost = humanGhostN + (botCount > 0 ? Math.floor(i / 2) : 0) <= humanBlocN;
      const r = needGhost ? 'ghost' : 'bloc';
      const sp = r === 'bloc' ? pickBloc() : pickGhost();
      players.push(buildPlayer(humansList.length + i, 'bot', r, sp));
    }
  } else {
    // мҶ”лЎң/лӢЁмқј мқёк°„ лӘЁл“ң
    if (humanRole === 'bloc') usedBlocs.push(humanSpecific);
    else usedGhosts.push(humanSpecific);
    players.push(buildPlayer(0, 'human', humanRole, humanSpecific));
    const botCount = totalPlayers - 1;
    const botSpecs = [];
    const oppositeRole = humanRole === 'bloc' ? 'ghost' : 'bloc';
    const botRoles = [];
    for (let i = 0; i < botCount; i++) {
      if (i === 0) botRoles.push(oppositeRole);
      else if (i === 1 && botCount >= 2) botRoles.push(oppositeRole);
      else botRoles.push(i % 2 === 0 ? oppositeRole : humanRole);
    }
    botRoles.forEach(r => botSpecs.push({ role: r, sp: r === 'bloc' ? pickBloc() : pickGhost() }));
    botSpecs.forEach((bs, i) => players.push(buildPlayer(i + 1, 'bot', bs.role, bs.sp)));
  }

  // v0.6.1: 2мқё лӘЁл“ң NPC мӨ‘лҰҪ лё”лЎқ 2к°ң м¶”к°Җ (Bloc нҺён–Ҙ н•ҙмҶҢ)
  // v0.6.3d: NPCлҠ” мӢңк·ёл„җ м җм§„ кіөк°ң(м •ліҙ)мқ„ м җм§„ кіөк°ңн•ҳлҠ” н‘ңм Ғ м—ӯн• 
  if (totalPlayers === 2) {
    const npc1 = pickBloc();
    const npc2 = pickBloc();
    const npcP1 = buildPlayer(players.length, 'npc', 'bloc', npc1);
    const npcP2 = buildPlayer(players.length + 1, 'npc', 'bloc', npc2);
    npcP1.isNpc = true;
    npcP2.isNpc = true;
    // v0.6.3d: мӢңк·ёл„җ вҖ” 0=мҷ„м „ лҜёмғҒ, 1=м •мІҙ, 2=нҠ№м„ұ, 3=мҷ„м „ л…ём¶ң (ліҙл„ҲмҠӨ м•ҪнғҲ)
    npcP1.signal = { revealed: 0, max: 3 };
    npcP2.signal = { revealed: 0, max: 3 };
    players.push(npcP1);
    players.push(npcP2);
  }

  // v1.0.1: мҶ”лЎң лӘЁл“ң лӮңмқҙлҸ„ ліҙм • вҖ” easy: мқёк°„ мӢңмһ‘ мһҗмӣҗ +5 / hard: лҙҮ мӢңмһ‘ мһҗмӣҗ +5
  if (mode === 'solo' && difficulty === 'easy') {
    const p0 = players[0];
    p0.resources = { ...p0.resources, credit: (p0.resources.credit || 0) + 5, weapons: (p0.resources.weapons || 0) + 1, parts: (p0.resources.parts || 0) + 1, data: (p0.resources.data || 0) + 1 };
  } else if (mode === 'solo' && difficulty === 'hard') {
    for (let i = 1; i < players.length; i++) {
      players[i].resources = { ...players[i].resources, credit: (players[i].resources.credit || 0) + 5, weapons: (players[i].resources.weapons || 0) + 1 };
    }
  }

  // Set bloc HQ zones as owned
  players.forEach(p => {
    if (p.role === 'bloc') {
      const setup = blocSetupSrc[p.specific];
      map[setup.hq].owner = p.id;
      setup.support.forEach(s => { map[s].owner = p.id; });
      p.position = setup.hq;
    } else {
      // v0.7.3: 11Г—11м—җм„ңлҠ” Ghost мӢңмһ‘ мң„м№ҳлҘј мҷёкіҪмңјлЎң л¶„мӮ°
      if (useSize === '11x11') {
        const ghostStarts11 = {
          CIPHER: 'A6', BLADE: 'F1', BROKER: 'K6', RIGGER: 'F11',
          DRIFTER: 'A1', MOLE: 'K11',
        };
        p.position = ghostStarts11[p.specific] || 'F6';
        // v0.8.4: 11Г—11 Ghost мӢңмһ‘ мһҗмӣҗ ліҙк°• вҖ” нҒ° ліҙл“ң мқҙлҸҷ л№„мҡ© ліҙм „
        // мӢңмһ‘ вӮө+5 / л¬ҙкё°+1 / лҚ°мқҙн„°+1 / л¶Җн’Ҳ+1 + transport нҠёлһҷ +1
        p.resources = { ...p.resources, credit: (p.resources.credit || 0) + 5, weapons: (p.resources.weapons || 0) + 1, data: (p.resources.data || 0) + 1, parts: (p.resources.parts || 0) + 1 };
        if (p.tracks) p.tracks = { ...p.tracks, transport: (p.tracks.transport || 0) + 1 };
      } else {
        p.position = GHOST_STATS[p.specific].startZone;
      }
    }
  });

  // Deal objectives
  const objBloc = shuffle(OBJECTIVES.filter(o => o.role === 'bloc'));
  const objGhost = shuffle(OBJECTIVES.filter(o => o.role === 'ghost'));
  let bi = 0, gi = 0;
  players.forEach(p => {
    if (p.role === 'bloc') {
      p.objectives = [objBloc[bi++ % objBloc.length], objBloc[bi++ % objBloc.length]];
    } else {
      p.objectives = [objGhost[gi++ % objGhost.length], objGhost[gi++ % objGhost.length]];
    }
  });

  return {
    meta: {
      scenario: 'S01',
      mapSize: useSize,
      round: 1,
      phase: 0,
      currentPlayer: 0,
      humanPlayer: 0,
      turnInit: null,
      gameOver: false,
      winner: null,
      winReason: null,
      newsSinceStart: 0,
      raidsThisGame: Object.fromEntries([...Array(5).keys()].map(k => [k, 0])),
      zonesVisited: Object.fromEntries([...Array(5).keys()].map(k => [k, new Set()])),
      attacksUsed: Object.fromEntries([...Array(5).keys()].map(k => [k, 0])),
      lostCardsUsed: Object.fromEntries([...Array(5).keys()].map(k => [k, 0])),
      nexusHolder: null,
      nexusStreak: 0,
      claimedAchievements: {},  // id => playerIdx
      milestonesAwarded: Object.fromEntries([...Array(5).keys()].map(k => [k, []])),  // v0.6.3b: кұ°лҰ¬лӘ…м„ұ л§ҲмқјмҠӨнҶӨ кё°лЎқ
      highlights: [],            // v0.9.1: н•ҳмқҙлқјмқҙнҠё лӘЁлЁјнҠё кё°лЎқ (кІҢмһ„ мӨ‘ кё°м–өн•  н•ң мҲҳ)
      promises: [],              // v0.9.2: нҳ‘мғҒ м•ҪмҶҚ нҠёлһҳнӮ№
      mode,                      // v1.0.1: 'solo' | 'multi' (н•«мӢңнҠё) | 'bots' (мӢңл®¬)
      difficulty,                // v1.0.1: easy / normal / hard (мҶ”лЎң н•ңм •)
      activePlayer: 0,           // v1.0.2: н•«мӢңнҠёмҡ© вҖ” нҳ„мһ¬ м°ЁлЎҖ мқёк°„ мқёлҚұмҠӨ
      pendingMoveTarget: null,   // мӮ¬мҡ©мһҗк°Җ м§ҖлҸ„м—җм„ң м°ҚмқҖ лӘ©н‘ң мўҢн‘ң (Ghost/Bloc л‘ҳ лӢӨ)
      awaitingMoveTarget: false, // trueл©ҙ UIм—җм„ң лӘ©н‘ң нҒҙлҰӯ лҢҖкё°
      moveBudget: 0,             // мқҙлІҲ н„ҙ мҙқ мқҙлҸҷ м№ё мҲҳ (BFS л°ҳкІҪ)
      turnSnapshot: null,        // н„ҙ м „ мғҒнғң мҠӨлғ…мғ· (ліҖнҷ” мҡ”м•Ҫмҡ©)
      turnDiff: null,            // н„ҙ нӣ„ кі„мӮ°лҗң ліҖнҷ” мҡ”м•Ҫ
      zoneBonusPending: null,    // { zone: 'home', coord: 'B3', options: [{...},{...},{...}] }
      visitedBonusZones: {},     // { playerIdx: { coord: true } } вҖ” ліҙл„ҲмҠӨлҘј мқҙлҜё л°ӣмқҖ кө¬м—ӯ
      pendingRaid: null,         // { coord, bloc, zoneNm, atk, threshold } вҖ” мӮ¬мҡ©мһҗ л Ҳмқҙл“ң кІ°м • лҢҖкё°
      chosenTargets: [],         // [ { cardIdx, half, targetPlayerIdx } ] вҖ” мӮ¬мҡ©мһҗк°Җ м§Җм •н•ң кіөкІ© нғҖкІҹл“Ө
      pendingTargetSelect: null, // { cardId, half, effectKey, candidates, cardIdx } вҖ” UIк°Җ нғҖкІҹ кі лҘј мҲҳ мһҲкІҢ
      pendingGhostDuel: null,    // { coord, atkGhostIdx, defGhostIdx } вҖ” Ghost PvP кІ°м • лҢҖкё°
      lastTargetedBy: null,      // { attacker, effectKey, detail } вҖ” лҙҮмқҙ P0 нғҖкІҹн–Ҳмқ„ л•Ң н‘ңмӢң
      attackBonusOnce: 0,        // мқјнҡҢм„ұ кіөкІ© нҢҗм • ліҙл„ҲмҠӨ
      peekNews: 0,               // лӮЁмқҖ peek м№ҙмҡҙнҠё (cop/data ліҙл„ҲмҠӨ)
      mapReveal: 0,              // лӮЁмқҖ м „мІҙ м§ҖлҸ„ л…ём¶ң лқјмҡҙл“ң
      moveBonusNext: 0,          // лӢӨмқҢ н„ҙ мқҙлҸҷ ліҙл„ҲмҠӨ (port ліҙл„ҲмҠӨ)
      atkBonusOnce: 0,           // мқјнҡҢм„ұ кіөкІ© нҢҗм • ліҙл„ҲмҠӨ (arms ліҙл„ҲмҠӨ)
    },
    players,
    map,
    pool: { M: 0, I: 0, V: 0, S: 0, B: 0, A: 0, GRID: 0 },
    stocks: { VANTA: 8, IRONWALL: 8, HELIX: 8, AXIOM: 8, CARBON: 8 },
    heat: 5,
    signalDie: rollSignalDie(),
    currentNews: null,
    log: [{ round: 0, phase: 0, message: 'рҹҺ® кІҢмһ„ мӢңмһ‘. нҠңнҶ лҰ¬м–ј 5Г—5 В· мӢңлӮҳлҰ¬мҳӨ S01' }],
  };
}

function buildPlayer(id, kind, role, specific) {
  const deck = role === 'bloc' ? BLOC_DECKS[specific] : GHOST_DECKS[specific];
  const stats = role === 'bloc' ? BLOC_STATS[specific] : GHOST_STATS[specific];
  const trackInit = initTracks(specific);
  return {
    id, kind, role, specific,
    hp: stats.hp,
    maxHp: stats.hp,
    stats,
    resources: initResources(role),
    stocks: initStocks(role, specific),
    deck: shuffle(deck),
    hand: [],
    discard: [],
    lost: [],
    contracts: [],
    wanted: 0,
    tl: 1,
    tlProgress: 0,
    position: null,
    zonesOwned: [],
    pool: { M: 0, I: 0, V: 0, S: 0, B: 0, A: 0, GRID: 0 },
    objectives: [],
    achievements: [],
    defeated: false,
    plannedCards: [],
    plannedHalves: [],
    // v0.6.3: 5нҠёлһҷ мӢңмҠӨн…ң (м•…лӘ…нҳ• м•…лӘ…мӢқ вҖ” м§Ғм ‘ нҲ¬мһҗ, мҙқм•…лӘ…=н•©)
    tracks: trackInit.tracks,
    onceAbilities: { critFailImmunity: false, droneFree: false, reroll: false, teleport: false, deathSave: false },
  };
}

// Reducer actions
function reducer(state, action) {
  switch (action.type) {
    case 'DRAW_INITIAL': {
      // Draw hand size depending on role
      const ps = state.players.map(p => {
        const handSize = 6;
        const newHand = p.deck.slice(0, handSize);
        const newDeck = p.deck.slice(handSize);
        return { ...p, hand: newHand, deck: newDeck };
      });
      return { ...state, players: ps };
    }

    case 'LOG':
      return { ...state, log: [...state.log, { round: state.meta.round, phase: state.meta.phase, message: action.msg }].slice(-150) };

    case 'SET_PHASE':
      return { ...state, meta: { ...state.meta, phase: action.phase } };

    case 'REQUEST_MOVE_TARGET':
      return { ...state, meta: { ...state.meta, awaitingMoveTarget: true, moveBudget: action.budget || 0, pendingMoveTarget: null } };

    case 'SET_MOVE_TARGET':
      return { ...state, meta: { ...state.meta, awaitingMoveTarget: false, pendingMoveTarget: action.coord } };

    case 'CLEAR_MOVE_TARGET':
      return { ...state, meta: { ...state.meta, awaitingMoveTarget: false, pendingMoveTarget: null, moveBudget: 0 } };

    case 'APPLY_ZONE_BONUS': {
      // action.opt: м„ нғқлҗң мҳөм…ҳ к°қмІҙ {k, v, label}
      const pending = state.meta.zoneBonusPending;
      if (!pending) return state;
      const opt = action.opt;
      let s = { ...state };
      const me = s.players[0];
      let res = { ...me.resources };
      let pool = { ...(me.pool || {}) };
      let hp = me.hp;
      let maxHp = me.maxHp;
      let wanted = me.wanted || 0;
      let heat = s.heat;
      let metaPatch = {};
      const logLines = [];
      switch (opt.k) {
        case 'credit': res.credit = (res.credit || 0) + opt.v; logLines.push(`вӮө +${opt.v}`); break;
        case 'data': res.data = (res.data || 0) + opt.v; logLines.push(`рҹ“Ў лҚ°мқҙн„° +${opt.v}`); break;
        case 'weapons': res.weapons = (res.weapons || 0) + opt.v; logLines.push(`рҹ”© л¬ҙкё° +${opt.v}`); break;
        case 'parts': res.parts = (res.parts || 0) + opt.v; logLines.push(`вҡҷпёҸ л¶Җн’Ҳ +${opt.v}`); break;
        case 'influence': res.influence = (res.influence || 0) + opt.v; logLines.push(`рҹҺҷ мқён”ҢлЈЁм–ёмҠӨ +${opt.v}`); break;
        case 'rep': res.rep = (res.rep || 0) + opt.v; logLines.push(`вҳ… л ҷ +${opt.v}`); break;
        case 'heal': hp = Math.min(maxHp, hp + opt.v); logLines.push(`вқӨпёҸ HP +${opt.v} (вҶ’${hp})`); break;
        case 'full_heal': hp = maxHp; logLines.push(`вқӨпёҸвқӨпёҸ HP мҷ„м „ нҡҢліө (вҶ’${hp})`); break;
        case 'wanted': wanted = Math.max(0, wanted + opt.v); logLines.push(`рҹҡЁ нҳ„мғҒмҲҳл°° ${opt.v > 0 ? '+' : ''}${opt.v} (вҶ’${wanted})`); break;
        case 'heat_down': heat = Math.max(0, heat - opt.v); logLines.push(`рҹ”Ҙ кіөк¶Ңл Ҙ -${opt.v} (вҶ’${heat})`); break;
        case 'gen': pool[opt.v] = (pool[opt.v] || 0) + 1; logLines.push(`в—Ҳ${opt.v} +1 (к°ңмқё н’Җ)`); break;
        case 'all_attr':
          ['M','I','V','S','B','A'].forEach(a => { pool[a] = (pool[a] || 0) + opt.v; });
          logLines.push(`в—Ҳ м „мҶҚм„ұ +${opt.v}`);
          break;
        case 'random_attr': {
          const pick = rand(['M','I','V','S','B','A']);
          pool[pick] = (pool[pick] || 0) + opt.v;
          logLines.push(`в—Ҳ${pick} +${opt.v} (лһңлҚӨ)`);
          break;
        }
        case 'draw': {
          const deck = [...(me.deck || [])];
          const handAdd = deck.splice(0, opt.v);
          const newHand = [...(me.hand || []), ...handAdd];
          // н”Ңл Ҳмқҙм–ҙм—җ л°ҳмҳҒ мҳҲм•Ҫ (м•„лһҳм—җм„ң н•ң лІҲм—җ м ҖмһҘ)
          metaPatch._drawNew = { deck, hand: newHand };
          logLines.push(`рҹӮ  м№ҙл“ң ${handAdd.length}мһҘ л“ңлЎңмҡ°`);
          break;
        }
        case 'stock_buy': {
          // мһ„мқҳ м„ нғқ л¶Ҳк°Җлқј лһңлҚӨ лё”лЎқ 1мЈј н• мқё л§ӨмҲҳ
          const blocs = Object.keys(s.stocks);
          const pick = rand(blocs);
          const cost = Math.max(1, s.stocks[pick] - opt.v);
          if (res.credit >= cost) {
            res.credit -= cost;
            const newStocks = { ...me.stocks, [pick]: (me.stocks[pick] || 0) + 1 };
            metaPatch._stocksNew = newStocks;
            logLines.push(`рҹ“Ҳ ${pick} мЈјмӢқ 1мЈј л§ӨмҲҳ (вӮө${cost})`);
          } else {
            logLines.push(`рҹ“Ҳ мЈјмӢқ н• мқё л§ӨмҲҳ вҖ” вӮөл¶ҖмЎұ (н•„мҡ” ${cost})`);
          }
          break;
        }
        case 'peek_news':
          metaPatch.peekNews = (s.meta.peekNews || 0) + opt.v;
          logLines.push(`рҹ‘Ғ лӢӨмқҢ лүҙмҠӨ ${opt.v}мһҘ лҜёлҰ¬ліҙкё° м ҒлҰҪ`);
          break;
        case 'info':
          metaPatch.mapReveal = (s.meta.mapReveal || 0) + 3;
          logLines.push(`рҹ‘Ғ м§ҖлҸ„ 3R л…ём¶ң`);
          break;
        case 'move_bonus':
          metaPatch.moveBonusNext = (s.meta.moveBonusNext || 0) + opt.v;
          logLines.push(`рҹҡ¶ лӢӨмқҢ н„ҙ мқҙлҸҷ +${opt.v}`);
          break;
        case 'atk_boost':
          metaPatch.atkBonusOnce = (s.meta.atkBonusOnce || 0) + opt.v;
          logLines.push(`рҹ’Ҙ лӢӨмқҢ нҢҗм • +${opt.v} (мқјнҡҢм„ұ)`);
          break;
        default:
          logLines.push(`(${opt.k} лҜёкө¬нҳ„)`);
      }
      // н”Ңл Ҳмқҙм–ҙ мғҒнғң лі‘н•©
      let ps = [...s.players];
      const p0Next = {
        ...me,
        resources: res,
        pool,
        hp,
        wanted,
      };
      if (metaPatch._drawNew) {
        p0Next.deck = metaPatch._drawNew.deck;
        p0Next.hand = metaPatch._drawNew.hand;
        delete metaPatch._drawNew;
      }
      if (metaPatch._stocksNew) {
        p0Next.stocks = metaPatch._stocksNew;
        delete metaPatch._stocksNew;
      }
      ps[0] = p0Next;
      const meta2 = { ...s.meta, zoneBonusPending: null, ...metaPatch };
      s = { ...s, players: ps, heat, meta: meta2 };
      s = logEntry(s, `вӯҗ лӢ№мӢ  рҹҢҹ ${pending.coord} ліҙл„ҲмҠӨ нҡҚл“қ В· ${opt.label}${logLines.length > 1 ? ` [${logLines.join(', ')}]` : ''}`);
      return s;
    }

    case 'SKIP_ZONE_BONUS':
      return { ...state, meta: { ...state.meta, zoneBonusPending: null } };

    case 'RAID_SELECT_TYPE': {
      const pr = state.meta.pendingRaid;
      if (!pr) return state;
      // v0.6.3c: нҠёлһҷ л ҲлІЁ мһ кёҲ кІҖмҰқ
      const cfg = RAID_TYPES[action.raidType];
      if (cfg?.requiresTrack) {
        const me = state.players[0];
        const lv = me?.tracks?.[cfg.requiresTrack.key] || 0;
        if (lv < cfg.requiresTrack.lv) {
          return { ...state, log: [...state.log, { round: state.meta.round, phase: state.meta.phase, message: `вқҢ ${cfg.name} мһ к№Җ вҖ” ${TRACK_NAMES[cfg.requiresTrack.key].name} LV${cfg.requiresTrack.lv} н•„мҡ” (нҳ„мһ¬ LV${lv})` }].slice(-150) };
        }
      }
      return { ...state, meta: { ...state.meta, pendingRaid: { ...pr, selectedType: action.raidType, phase: 'invest' } } };
    }

    case 'RAID_INVEST': {
      // action.item: 'weapons' | 'data' | 'poolAttr' (with action.attr for pool)
      const pr = state.meta.pendingRaid;
      if (!pr) return state;
      const me = state.players[0];
      const inv = { ...pr.invested };
      if (action.item === 'weapons' && (me.resources.weapons || 0) > inv.weapons) {
        inv.weapons++;
      } else if (action.item === 'data' && (me.resources.data || 0) > inv.data) {
        inv.data++;
      } else if (action.item === 'poolAttr' && action.attr) {
        if ((me.pool?.[action.attr] || 0) > 0 && !inv.poolAttr) {
          inv.poolAttr = action.attr;
        }
      } else if (action.item === 'unset_pool') {
        inv.poolAttr = null;
      } else if (action.item === 'reset') {
        inv.weapons = 0; inv.data = 0; inv.poolAttr = null;
      }
      return { ...state, meta: { ...state.meta, pendingRaid: { ...pr, invested: inv } } };
    }

    case 'RAID_EXECUTE': {
      const pr = state.meta.pendingRaid;
      if (!pr || !pr.selectedType) return state;
      let s = { ...state };
      const me = s.players[0];
      const rtype = RAID_TYPES[pr.selectedType];
      const zoneLoot = ZONE_LOOT[pr.zoneType] || {};
      const bloc = pr.bloc;
      const counterBonus = countersBloc(me.specific, bloc) ? 1 : 0;

      // нҲ¬мһҗ мһҗмӣҗ мҶҢл№„
      const inv = pr.invested;
      const newRes = { ...me.resources };
      if (inv.weapons > 0) newRes.weapons = Math.max(0, (newRes.weapons || 0) - inv.weapons);
      if (inv.data > 0) newRes.data = Math.max(0, (newRes.data || 0) - inv.data);
      const newPool = { ...(me.pool || {}) };
      if (inv.poolAttr) newPool[inv.poolAttr] = Math.max(0, (newPool[inv.poolAttr] || 0) - 1);

      // л Ҳмқҙл“ң нғҖмһ…лі„ л№„мҡ© м„ м§Җл¶Ҳ (нҳ‘мғҒнҳ•В·л“ңлЎ нҳ• л“ұ)
      if (rtype.cost) {
        if (rtype.cost.credit) {
          if ((newRes.credit || 0) >= rtype.cost.credit) newRes.credit -= rtype.cost.credit;
          else {
            s = logEntry(s, `вӯҗ лӢ№мӢ  ${rtype.icon} ${rtype.name} мӢӨнҢЁ (л№„мҡ© вӮө${rtype.cost.credit} л¶ҖмЎұ)`);
            return { ...s, meta: { ...s.meta, pendingRaid: null } };
          }
        }
        if (rtype.cost.parts) {
          if ((newRes.parts || 0) >= rtype.cost.parts) newRes.parts -= rtype.cost.parts;
          else {
            s = logEntry(s, `вӯҗ лӢ№мӢ  ${rtype.icon} ${rtype.name} мӢӨнҢЁ (л¶Җн’Ҳ ${rtype.cost.parts}к°ң л¶ҖмЎұ)`);
            return { ...s, meta: { ...s.meta, pendingRaid: null } };
          }
        }
      }

      // Bloc мһҗлҸҷ л°ҳкІ© (мһ мһ…нҳ•мқҖ bypass)
      const defense = rtype.bypass_defense ? {} : (BLOC_DEFENSE[bloc] || {});
      let thresholdMod = 0;
      let approachMod = 0;
      let executeMod = 0;
      let escapeMod = 0;
      const defenseLogs = [];
      if (rtype.bypass_defense) defenseLogs.push('рҹ•· л°©м–ҙ мҡ°нҡҢ');
      if (defense.threshold_plus) { thresholdMod += defense.threshold_plus; defenseLogs.push(`${bloc} л°©м–ҙ +${defense.threshold_plus} threshold`); }
      if (defense.detect) { approachMod -= 2; defenseLogs.push(`${bloc} м„јм„ң к°җм§Җ (м ‘к·ј -2)`); }
      if (defense.all_plus) { approachMod += 0 - defense.all_plus; executeMod -= defense.all_plus; escapeMod -= defense.all_plus; defenseLogs.push(`${bloc} AI ліҙмЎ° (м „ нҢҗм • ${-defense.all_plus})`); }
      if (pr.fortified > 0 && !rtype.bypass_defense) { thresholdMod += pr.fortified; defenseLogs.push(`мҡ”мғҲнҷ” +${pr.fortified}`); }

      const finalThreshold = rtype.threshold + thresholdMod;

      // нҲ¬мһҗ ліҙл„ҲмҠӨ
      const zoneAttr = ZONE_TYPES[pr.zoneType]?.attr;
      const poolBonus = inv.poolAttr === zoneAttr ? 2 : (inv.poolAttr ? 1 : 0);
      const execBonus = inv.weapons + counterBonus + executeMod;
      const approachBonus = inv.data + approachMod;
      const escapeBonus = escapeMod;

      // === 3лӢЁкі„ нҢҗм • ===
      // 1. Approach (м ‘к·ј) вҖ” d6 + SHADE мҶҚм„ұ нҲ¬мһҗ (data) vs 4
      const approachRoll = d6();
      const approachTotal = approachRoll + approachBonus + (inv.poolAttr === 'S' ? 2 : 0);
      const approachOK = approachTotal >= 4;

      // 2. Execute (мӢӨн–ү) вҖ” d6 + м„ нғқн•ң мҠӨнғҜ + нҲ¬мһҗ + мғҒм„ұ + нҠёлһҷ ліҙл„ҲмҠӨ vs threshold
      // v0.5.25: нҒ¬лҰ¬нӢ°м»¬ мӢӨнҢЁ вҖ” d6 = 1мқҖ мһҗлҸҷ мӢӨнҢЁ (мҠӨнғҜ л¬ҙкҙҖ)
      // v0.6.3c: нҠёлһҷ нҢЁмӢңлёҢ ліҙл„ҲмҠӨ (combat/mfg/transport LV2~5)
      const execRoll = d6();
      const statVal = me.stats[rtype.useStat] || 0;
      const trackVal = trackBonus(me, rtype.useStat);
      const execTotal = execRoll + statVal + trackVal + execBonus + poolBonus + (approachOK ? 0 : -2);
      const critFail = execRoll === 1;
      // v0.6.3c: combat LV4+ лҳҗлҠ” onceAbilities.critFailImmunity вҶ’ нҒ¬лҰ¬нӢ°м»¬ мӢӨнҢЁ л©ҙм—ӯ
      const critImmune = (me.tracks?.combat || 0) >= 4 || me.onceAbilities?.critFailImmunity;
      const execOK = (!critFail || critImmune) && execTotal >= finalThreshold;

      // 3. Escape (лҸ„мЈј) вҖ” d6 + SPD + мҲҳмҶЎ нҠёлһҷ ліҙл„ҲмҠӨ vs 3
      const escapeRoll = d6();
      const escapeTotal = escapeRoll + me.stats.spd + trackBonus(me, 'spd') + escapeBonus;
      const escapeOK = escapeTotal >= 3;

      // кІ°кіј м Ғмҡ©
      const cell = s.map[pr.coord];
      let rewards = rtype.success;
      let outcome = 'success';
      if (!execOK) {
        rewards = rtype.failure;
        outcome = 'failure';
      }

      const ps = [...s.players];
      let updatedP = { ...me, resources: newRes, pool: newPool };

      // ліҙмғҒ/нҺҳл„җнӢ° м Ғмҡ©
      if (outcome === 'success') {
        updatedP.resources.rep = (updatedP.resources.rep || 0) + (rewards.rep || 0);
        if (rewards.data) updatedP.resources.data = (updatedP.resources.data || 0) + rewards.data;
        if (rewards.parts) updatedP.resources.parts = Math.max(0, (updatedP.resources.parts || 0) + rewards.parts);
        if (rewards.influence) updatedP.resources.influence = (updatedP.resources.influence || 0) + rewards.influence;
        updatedP.wanted = (updatedP.wanted || 0) + (rewards.wanted || 0);
        // кө¬м—ӯ м°Ёл“ұ м „лҰ¬н’Ҳ
        if (zoneLoot.credit) updatedP.resources.credit = (updatedP.resources.credit || 0) + zoneLoot.credit;
        if (zoneLoot.data) updatedP.resources.data = (updatedP.resources.data || 0) + zoneLoot.data;
        if (zoneLoot.weapons) updatedP.resources.weapons = (updatedP.resources.weapons || 0) + zoneLoot.weapons;
        if (zoneLoot.parts) updatedP.resources.parts = (updatedP.resources.parts || 0) + zoneLoot.parts;
        if (zoneLoot.influence) updatedP.resources.influence = (updatedP.resources.influence || 0) + zoneLoot.influence;
        if (zoneLoot.rep) updatedP.resources.rep += zoneLoot.rep;
        if (zoneLoot.wanted) updatedP.wanted = Math.max(0, (updatedP.wanted || 0) + zoneLoot.wanted);
        if (zoneLoot.full_heal) updatedP.hp = updatedP.maxHp;
        if (zoneLoot.all_attr) ['M','I','V','S','B','A'].forEach(a => { updatedP.pool[a] = (updatedP.pool[a] || 0) + 1; });
        if (zoneLoot.peek_news) s = { ...s, meta: { ...s.meta, peekNews: (s.meta.peekNews || 0) + 1 } };
      } else {
        updatedP.hp = Math.max(0, updatedP.hp - (rewards.hp || 0));
        updatedP.wanted = (updatedP.wanted || 0) + (rewards.wanted || 0);
        if (rewards.data) updatedP.resources.data = Math.max(0, (updatedP.resources.data || 0) + rewards.data);
        if (rewards.parts) updatedP.resources.parts = Math.max(0, (updatedP.resources.parts || 0) + rewards.parts);
      }

      // Escape мӢӨнҢЁ м¶”к°Җ нҺҳл„җнӢ°
      if (!escapeOK && outcome === 'success') {
        updatedP.wanted = (updatedP.wanted || 0) + 1;
      }

      // л§ө/мЈјмӢқ м—…лҚ°мқҙнҠё (м„ұкіө мӢң)
      let newMap = s.map;
      let newStocks = s.stocks;
      let destroyedBuilding = null;
      if (outcome === 'success') {
        if (cell.building) destroyedBuilding = cell.building;  // v0.6.3e: кұҙл¬ј нҢҢкҙҙ кё°лЎқ
        newMap = { ...s.map, [pr.coord]: { ...cell, owner: null, fortified: 0, building: null } };
        newStocks = { ...s.stocks, [bloc]: Math.max(1, s.stocks[bloc] - (rewards.stockHit || 0)) };
        // v0.6.3e: кұҙл¬ј нҢҢкҙҙ ліҙл„ҲмҠӨ вҖ” GhostлҠ” м¶”к°Җ вҳ…+2, вӮө+3
        if (destroyedBuilding) {
          updatedP.resources.rep = (updatedP.resources.rep || 0) + 2;
          updatedP.resources.credit = (updatedP.resources.credit || 0) + 3;
        }
      }

      ps[0] = updatedP;
      const newHeat = Math.min(10, Math.max(0, s.heat + (rewards.heat || 0)));
      s = { ...s, players: ps, map: newMap, stocks: newStocks, heat: newHeat };

      // л Ҳмқҙл“ң м№ҙмҡҙнҠё мҰқк°Җ (м„ұкіөл§Ң)
      if (outcome === 'success') {
        s.meta = { ...s.meta, raidsThisGame: { ...s.meta.raidsThisGame, 0: (s.meta.raidsThisGame[0] || 0) + 1 } };
        // v0.9.2: м•ҪмҶҚ мң„л°ҳ мІҙнҒ¬ вҖ” Bloc мҶҢмң мһҗк°Җ truce м•ҪмҶҚн•ң мӮ¬мқҙл©ҙ P0 вҳ…-2, н”јн•ҙмһҗ вҳ…+2
        const blocOwnerIdx = state.players.findIndex(pp => pp.specific === bloc && pp.role === 'bloc');
        const activePromises = (s.meta.promises || []).filter(pm => pm.status === 'active' && pm.expiresR >= s.meta.round && pm.type === 'truce' &&
          ((pm.from === 0 && pm.to === blocOwnerIdx) || (pm.from === blocOwnerIdx && pm.to === 0)));
        if (activePromises.length > 0) {
          const ps3 = [...s.players];
          ps3[0] = { ...ps3[0], resources: { ...ps3[0].resources, rep: Math.max(0, (ps3[0].resources.rep || 0) - 2) } };
          if (blocOwnerIdx >= 0) ps3[blocOwnerIdx] = { ...ps3[blocOwnerIdx], resources: { ...ps3[blocOwnerIdx].resources, rep: (ps3[blocOwnerIdx].resources.rep || 0) + 2 } };
          // м•ҪмҶҚ status broken мІҳлҰ¬
          const newPromises = (s.meta.promises || []).map(pm => activePromises.includes(pm) ? { ...pm, status: 'broken' } : pm);
          s = { ...s, players: ps3, meta: { ...s.meta, promises: newPromises } };
          s = logEntry(s, `вҡ  м•ҪмҶҚ мң„л°ҳ! P0 вҶ’ P${blocOwnerIdx} truce л¬ҙмӢң raid В· P0 вҳ…-2, P${blocOwnerIdx} вҳ…+2`);
        }
        // v0.6.3b: л Ҳмқҙл“ң м„ұкіө мӢң мӮ¬мҡ©н•ң мҠӨнғҜм—җ л”°лқј нҠёлһҷ +1
        const raidTrackMap = { atk: 'combat', spd: 'transport', hack: 'mfg' };
        const tk = raidTrackMap[rtype.useStat] || 'combat';
        s = raiseTrack(s, 0, tk, 1, 'л Ҳмқҙл“ң м„ұкіө');
        // мһ мһ…нҳ•/нҳ‘мғҒнҳ• ліҙл„ҲмҠӨ: security/party
        if (rtype.useStat === 'inf' || rtype.id === 'infiltrate') s = raiseTrack(s, 0, 'security', 1, 'мһ мһ…');
        if (rtype.id === 'negotiate') s = raiseTrack(s, 0, 'party', 1, 'нҳ‘мғҒ');
        // v0.9.1: н•ҳмқҙлқјмқҙнҠё вҖ” мІ« raid м„ұкіө / мІ« мһ мһ…нҳ• / мІ« кұҙл¬ј нҢҢкҙҙ / мІ« NEXUS м җл №
        s = recordHighlight(s, 'first_raid_success', 0);
        if (pr.selectedType === 'infiltrate') s = recordHighlight(s, 'first_infiltrate', 0);
        if (destroyedBuilding) s = recordHighlight(s, 'first_building_kill', 0);
        if (s.map[pr.coord]?.zone === 'nex') s = recordHighlight(s, 'first_nexus_claim', 0);
        // v0.6.3d: NPC лё”лЎқ л Ҳмқҙл“ң мӢң мӢңк·ёл„җ +1 (мһ мһ…нҳ•мқҖ +2)
        const blocOwner = state.players.findIndex(pp => pp.specific === bloc && pp.role === 'bloc');
        const ownerP = state.players[blocOwner];
        if (ownerP?.isNpc) {
          const sigGain = (rtype.id === 'infiltrate' || rtype.bypass_defense) ? 2 : 1;
          s = revealSignal(s, blocOwner, 0, sigGain);
          // мӢңк·ёл„җ LV3 ліҙл„ҲмҠӨ м•ҪнғҲ
          if (s.players[blocOwner].signal?.revealed >= 3) {
            const ps = [...s.players];
            ps[0] = { ...ps[0], resources: { ...ps[0].resources, credit: (ps[0].resources.credit || 0) + 5, data: (ps[0].resources.data || 0) + 2 } };
            s = { ...s, players: ps };
            s = logEntry(s, `рҹҺҒ мӢңк·ёл„җ LV3 ліҙл„ҲмҠӨ м•ҪнғҲ вҖ” вӮө+5 рҹ“Ў+2`);
          }
        }
      } else {
        // мӢӨнҢЁ мӢң кІҪнҳё нҠёлһҷ +1 (л°©м–ҙ н•ҷмҠө)
        s = raiseTrack(s, 0, 'security', 1, 'л Ҳмқҙл“ң мӢӨнҢЁ');
      }

      // кІ°кіј мғҒм„ё лЎңк·ё
      const cbStr = counterBonus > 0 ? ` +мғҒм„ұ${counterBonus}` : '';
      const invStr = [
        inv.weapons ? `рҹ”©Г—${inv.weapons}` : null,
        inv.data ? `рҹ“ЎГ—${inv.data}` : null,
        inv.poolAttr ? `в—Ҳ${inv.poolAttr}${poolBonus>1?'(л§Өм№ҳ+2)':'+1'}` : null,
      ].filter(Boolean).join(' ');
      const defStr = defenseLogs.length > 0 ? ` | рҹӣЎ ${defenseLogs.join(', ')}` : '';
      const rtn = rtype.name;
      s = logEntry(s, `вӯҗ лӢ№мӢ  ${rtype.icon} ${rtn} л Ҳмқҙл“ң [${pr.coord} ${pr.zoneNm}] вҖ” ${pr.bloc}${defStr}`);
      if (invStr) s = logEntry(s, `  нҲ¬мһҗ: ${invStr}`);
      s = logEntry(s, `  рҹҺІ м ‘к·ј ${approachRoll}+${approachBonus}=${approachTotal} ${approachOK ? 'вң“' : 'вң—(мӢӨн–ү-2)'} В· мӢӨн–ү ${execRoll}+${statVal}${cbStr}+${execBonus+poolBonus}=${execTotal} vs ${finalThreshold} ${execOK ? 'вң“' : 'вң—'} В· лҸ„мЈј ${escapeRoll}+${me.stats.spd}=${escapeTotal} ${escapeOK ? 'вң“' : 'вң—(мҲҳл°°+1)'}`);
      if (outcome === 'success') {
        const lootStr = Object.values(zoneLoot).length > 0 ? ` + ${zoneLoot.label}` : '';
        const buildStr = destroyedBuilding ? ` В· рҹҸҡ ${BUILDINGS[destroyedBuilding].name} нҢҢкҙҙ (вҳ…+2 вӮө+3)` : '';
        s = logEntry(s, `  вң… м„ұкіө В· л ҷ+${rewards.rep} В· ${bloc} мЈјк°Җ-${rewards.stockHit} В· мӨ‘лҰҪнҷ”${lootStr}${buildStr}`);
      } else {
        s = logEntry(s, `  вқҢ мӢӨнҢЁ В· HP-${rewards.hp || 0} В· мҲҳл°°+${rewards.wanted || 0}`);
      }

      s.meta = { ...s.meta, pendingRaid: null };
      return s;
    }

    case 'RESOLVE_RAID_YES': {
      // л Ҳкұ°мӢң нҳёнҷҳ вҖ” м•„м§Ғ нҳём¶ңлҗҳлҠ” мҪ”л“ң мһҲмңјл©ҙ мҰүмӢң мғҲ EXECUTEлЎң мң„мһ„
      const pr = state.meta.pendingRaid;
      if (!pr) return state;
      let s = { ...state };
      const raidRoll = d6();
      const me = s.players[0];
      // мғҒм„ұ ліҙл„ҲмҠӨ: Ghost нҒҙлһҳмҠӨк°Җ нғҖкІҹ Bloc м№ҙмҡҙн„°л©ҙ atk +1
      const counterBonus = countersBloc(me.specific, pr.bloc) ? 1 : 0;
      const raidTotal = raidRoll + pr.atk + counterBonus;
      const cell = s.map[pr.coord];
      if (raidTotal >= pr.threshold) {
        const newStocks = { ...s.stocks, [pr.bloc]: Math.max(1, s.stocks[pr.bloc] - 3) };
        const ps = [...s.players];
        ps[0] = {
          ...me,
          resources: { ...me.resources, rep: (me.resources.rep || 0) + 3 },
          wanted: (me.wanted || 0) + 1,
        };
        const newMap = { ...s.map, [pr.coord]: { ...cell, owner: null } };
        s = { ...s, players: ps, stocks: newStocks, map: newMap, heat: Math.min(10, s.heat + 1) };
        s.meta = { ...s.meta, pendingRaid: null, raidsThisGame: { ...s.meta.raidsThisGame, 0: (s.meta.raidsThisGame[0] || 0) + 1 } };
        const cbStr = counterBonus > 0 ? ` +мғҒм„ұ${counterBonus}` : '';
        s = logEntry(s, `вӯҗ лӢ№мӢ  рҹ—ЎпёҸ л Ҳмқҙл“ң м„ұкіө! [${pr.coord} ${pr.zoneNm}] рҹҺІ${raidRoll}+${pr.atk}${cbStr}=${raidTotal} вүҘ ${pr.threshold} вҖ” ${pr.bloc} мЈјк°Җ-3, мӨ‘лҰҪнҷ”, л ҷ+3 (лҲ„м Ғ ${ps[0].resources.rep})`);
      } else {
        const ps = [...s.players];
        ps[0] = {
          ...me,
          hp: Math.max(0, me.hp - 3),
          wanted: (me.wanted || 0) + 1,
        };
        s = { ...s, players: ps, heat: Math.min(10, s.heat + 1), meta: { ...s.meta, pendingRaid: null } };
        s = logEntry(s, `вӯҗ лӢ№мӢ  вқҢ л Ҳмқҙл“ң мӢӨнҢЁ [${pr.coord} ${pr.zoneNm}] рҹҺІ${raidRoll}+${pr.atk}=${raidTotal} < ${pr.threshold} вҖ” HP-3, мҲҳл°°+1`);
      }
      return s;
    }

    case 'RESOLVE_RAID_NO': {
      const pr = state.meta.pendingRaid;
      if (!pr) return state;
      let s = { ...state, meta: { ...state.meta, pendingRaid: null } };
      s = logEntry(s, `вӯҗ лӢ№мӢ  рҹ•¶ л Ҳмқҙл“ң нҸ¬кё° [${pr.coord} ${pr.zoneNm}] вҖ” м •м°°л§Ң н•ҳкі  л¬јлҹ¬лӮЁ`);
      return s;
    }

    case 'RESOLVE_DUEL_YES': {
      const d = state.meta.pendingGhostDuel;
      if (!d) return state;
      let s = { ...state };
      const atkRoll = d6();
      const defRoll = d6();
      const ps = [...s.players];
      const atkP = ps[d.atkGhostIdx];
      const defP = ps[d.defGhostIdx];
      // мғҒм„ұ ліҙл„ҲмҠӨ: кіөкІ©мһҗ вҶ’ л°©м–ҙмһҗ м№ҙмҡҙн„° кҙҖкі„л©ҙ atk +2
      const counterBonus = countersGhost(atkP.specific, defP.specific) ? 2 : 0;
      const atkTotal = d.atkStat + atkRoll + counterBonus;
      const defTotal = d.defStat + defRoll;
      if (atkTotal >= defTotal + 2) {
        const loot = Math.min(3, defP.resources.credit || 0);
        ps[d.atkGhostIdx] = { ...atkP, resources: { ...atkP.resources, rep: (atkP.resources.rep || 0) + 2, credit: (atkP.resources.credit || 0) + loot } };
        ps[d.defGhostIdx] = { ...defP, resources: { ...defP.resources, credit: Math.max(0, (defP.resources.credit || 0) - loot) }, hp: Math.max(0, defP.hp - 2) };
        s = { ...s, players: ps, meta: { ...s.meta, pendingGhostDuel: null } };
        const cbStr = counterBonus > 0 ? ` +мғҒм„ұ${counterBonus}` : '';
        s = logEntry(s, `вӯҗ лӢ№мӢ  вҡ”пёҸ Ghost кІ°нҲ¬ мҠ№лҰ¬! вҶ’ P${d.defGhostIdx} ${defP.specific} | рҹҺІ${atkRoll}+${d.atkStat}${cbStr}=${atkTotal} vs ${defTotal} | л ҷ+2, вӮө+${loot} нғҲм·Ё`);
      } else if (defTotal >= atkTotal + 2) {
        ps[d.atkGhostIdx] = { ...atkP, hp: Math.max(0, atkP.hp - 2) };
        s = { ...s, players: ps, meta: { ...s.meta, pendingGhostDuel: null } };
        s = logEntry(s, `вӯҗ лӢ№мӢ  вҡ”пёҸ Ghost кІ°нҲ¬ л°ҳкІ©лӢ№н•Ё! P${d.defGhostIdx} ${defP.specific} | рҹҺІ${atkTotal} vs ${defTotal} | HP-2`);
      } else {
        s = { ...s, meta: { ...s.meta, pendingGhostDuel: null } };
        s = logEntry(s, `вӯҗ лӢ№мӢ  вҡ”пёҸ Ghost кІ°нҲ¬ л¬ҙмҠ№л¶Җ P${d.defGhostIdx} | рҹҺІ${atkTotal} vs ${defTotal}`);
      }
      return s;
    }

    case 'RESOLVE_DUEL_NO': {
      const d = state.meta.pendingGhostDuel;
      if (!d) return state;
      let s = { ...state, meta: { ...state.meta, pendingGhostDuel: null } };
      const defP = s.players[d.defGhostIdx];
      s = logEntry(s, `вӯҗ лӢ№мӢ  рҹ•¶ кІ°нҲ¬ нҡҢн”ј вҖ” P${d.defGhostIdx} ${defP.specific}мҷҖ мһ мӢң кіөмЎҙ`);
      return s;
    }

    case 'DISMISS_TARGETED':
      return { ...state, meta: { ...state.meta, lastTargetedBy: null } };

    case 'BUY_STOCK': {
      // action.playerIdx, action.bloc, action.qty
      const price = state.stocks[action.bloc];
      if (!price) return state;
      const cost = price * action.qty;
      const ps = [...state.players];
      const p = ps[action.playerIdx];
      if ((p.resources.credit || 0) < cost) return state;
      ps[action.playerIdx] = {
        ...p,
        resources: { ...p.resources, credit: p.resources.credit - cost },
        stocks: { ...p.stocks, [action.bloc]: (p.stocks[action.bloc] || 0) + action.qty },
      };
      // Bloc ліёмқё л§ӨмҲҳ мң лҸҷм„ұ л¶Җм—¬: мЈјк°Җ +1 (л§ӨмҲҳм„ё)
      const newStocks = { ...state.stocks, [action.bloc]: Math.min(20, price + (action.qty >= 3 ? 1 : 0)) };
      const marker = action.playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
      return {
        ...state,
        players: ps,
        stocks: newStocks,
        log: [...state.log, { round: state.meta.round, phase: 1, message: `рҹ“Ҳ ${marker}P${action.playerIdx} В· ${action.bloc} ${action.qty}мЈј л§ӨмҲҳ (вӮө${cost}) вҖ” мЈјк°Җ ${price}${newStocks[action.bloc] !== price ? `вҶ’${newStocks[action.bloc]}` : ''}` }].slice(-150),
      };
    }

    case 'SELL_STOCK': {
      const price = state.stocks[action.bloc];
      if (!price) return state;
      const ps = [...state.players];
      const p = ps[action.playerIdx];
      const have = p.stocks[action.bloc] || 0;
      const qty = Math.min(have, action.qty);
      if (qty === 0) return state;
      const earn = price * qty;
      ps[action.playerIdx] = {
        ...p,
        resources: { ...p.resources, credit: (p.resources.credit || 0) + earn },
        stocks: { ...p.stocks, [action.bloc]: have - qty },
      };
      const newStocks = { ...state.stocks, [action.bloc]: Math.max(1, price - (qty >= 3 ? 1 : 0)) };
      const marker = action.playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
      return {
        ...state,
        players: ps,
        stocks: newStocks,
        log: [...state.log, { round: state.meta.round, phase: 1, message: `рҹ“ү ${marker}P${action.playerIdx} В· ${action.bloc} ${qty}мЈј л§ӨлҸ„ (вӮө+${earn}) вҖ” мЈјк°Җ ${price}${newStocks[action.bloc] !== price ? `вҶ’${newStocks[action.bloc]}` : ''}` }].slice(-150),
      };
    }

    case 'SHOP_BUY': {
      // кіөмҡ© мғҒм җ вҖ” лҲ„кө¬лӮҳ Phase 1м—җ кө¬л§Ө к°ҖлҠҘ
      // action.playerIdx, action.item
      const items = {
        medical:   { cost: 5, name: 'мқҳлЈҢ м№ҳлЈҢ',   apply: p => ({ ...p, hp: p.maxHp }) },
        arms:      { cost: 4, name: 'л¬ҙкё°мғҒ',      apply: p => ({ ...p, resources: { ...p.resources, weapons: (p.resources.weapons||0) + 2 } }) },
        info:      { cost: 3, name: 'м •ліҙмғҒ',      apply: p => ({ ...p, resources: { ...p.resources, data: (p.resources.data||0) + 2, rep: (p.resources.rep||0) + 1 } }) },
        bribe:     { cost: 3, name: 'лҮҢл¬ј',        apply: p => ({ ...p, wanted: Math.max(0, (p.wanted||0) - 2) }) },
        bounty:    { cost: 4, name: 'нҳ„мғҒкёҲ мІӯкө¬', apply: p => ({ ...p, resources: { ...p.resources, rep: (p.resources.rep||0) + 2 } }) },
        recruit:   { cost: 6, name: 'мҡ©лі‘ мҳҒмһ…',   apply: p => ({ ...p, resources: { ...p.resources, weapons: (p.resources.weapons||0) + 3, parts: (p.resources.parts||0) + 1 } }) },
      };
      const it = items[action.item];
      if (!it) return state;
      const p = state.players[action.playerIdx];
      if ((p.resources.credit||0) < it.cost) return state;
      const ps = [...state.players];
      let updated = { ...p, resources: { ...p.resources, credit: p.resources.credit - it.cost } };
      updated = it.apply(updated);
      ps[action.playerIdx] = updated;
      let s = { ...state, players: ps };
      if (action.item === 'bribe') s = { ...s, heat: Math.max(0, s.heat - 1) };
      const marker = action.playerIdx === 0 ? 'вӯҗ лӢ№мӢ  ' : '';
      s = logEntry(s, `рҹҸӘ ${marker}P${action.playerIdx} В· мғҒм җ: ${it.name} (вӮө-${it.cost})`);
      // v0.6.3b: мғҒм җ кө¬л§Ө вҶ’ нҢҢнӢ°(мқёл§Ҙ кұ°лһҳ) нҠёлһҷ +1, л¬ҙкё°/мҡ©лі‘мқҖ л¬ҙл ҘмңјлЎң
      const tk = (action.item === 'arms' || action.item === 'recruit') ? 'combat' : 'party';
      s = raiseTrack(s, action.playerIdx, tk, 1, `мғҒм җ:${it.name}`);
      return s;
    }

    case 'BOT_SHOP': {
      // лҙҮ мғҒм җ AI вҖ” мғҒнҷ©м—җ л§һкІҢ мһҗлҸҷ кө¬л§Ө
      let s = { ...state };
      const ps = [...state.players];
      state.players.forEach((p, pi) => {
        if (p.kind !== 'bot' || p.defeated) return;
        const credit = p.resources.credit || 0;
        // мҡ°м„ мҲңмң„: HP лӮ®мңјл©ҙ мқҳлЈҢ > мҲҳл°° лҶ’мңјл©ҙ лҮҢл¬ј > л¬ҙкё° л¶ҖмЎұн•ҳл©ҙ л¬ҙкё°мғҒ > л ҷ < 10мқҙл©ҙ м •ліҙмғҒ/нҳ„мғҒкёҲ
        const actions = [];
        if (p.hp < p.maxHp * 0.5 && credit >= 5) actions.push('medical');
        if ((p.wanted||0) >= 3 && credit >= 3) actions.push('bribe');
        if (p.role === 'ghost' && (p.resources.rep||0) < 12 && credit >= 4) actions.push('bounty');
        if ((p.resources.weapons||0) < 2 && credit >= 4) actions.push('arms');
        if (p.role === 'ghost' && (p.resources.data||0) < 2 && credit >= 3) actions.push('info');
        if (actions.length === 0) return;
        const item = actions[0];
        const items = {
          medical: { cost: 5, apply: pp => ({ ...pp, hp: pp.maxHp }) },
          arms:    { cost: 4, apply: pp => ({ ...pp, resources: { ...pp.resources, weapons: (pp.resources.weapons||0) + 2 } }) },
          info:    { cost: 3, apply: pp => ({ ...pp, resources: { ...pp.resources, data: (pp.resources.data||0) + 2, rep: (pp.resources.rep||0) + 1 } }) },
          bribe:   { cost: 3, apply: pp => ({ ...pp, wanted: Math.max(0, (pp.wanted||0) - 2) }) },
          bounty:  { cost: 4, apply: pp => ({ ...pp, resources: { ...pp.resources, rep: (pp.resources.rep||0) + 2 } }) },
        };
        const it = items[item];
        let upd = { ...p, resources: { ...p.resources, credit: p.resources.credit - it.cost } };
        upd = it.apply(upd);
        ps[pi] = upd;
        s = logEntry({ ...s, players: ps }, `рҹҸӘ P${pi} [${p.specific}] В· мғҒм җ кө¬л§Ө (${item}, вӮө-${it.cost})`);
        if (item === 'bribe') s = { ...s, heat: Math.max(0, s.heat - 1) };
        // v0.6.3b: лҙҮ мғҒм җ кө¬л§Ө вҶ’ нҠёлһҷ мғҒмҠ№ (party/combat)
        const tk = (item === 'arms' || item === 'recruit') ? 'combat' : 'party';
        s = raiseTrack(s, pi, tk, 1, `мғҒм җ:${item}`);
      });
      return s;
    }

    // v0.9.2: NEGOTIATE_PHASE вҖ” Phase 1.5 нҳ‘мғҒ
    // мһҗмӣҗ кұ°лһҳ / л№„кіөкІ© м•ҪмҶҚ / Bloc лҸҷл§№ вҖ” лҙҮ AIлҠ” net-valueлЎң мһҗлҸҷ мҲҳлқҪ/кұ°м Ҳ
    case 'NEGOTIATE_PHASE': {
      let s = { ...state };
      const players = s.players;
      const proposals = [];
      // к°Ғ н”Ңл Ҳмқҙм–ҙк°Җ 1к°ң м ңм•Ҳ мӢңлҸ„ (мҲҳлқҪ к°ҖлҠҘн•ң мғҒлҢҖ 1лӘ… м„ м •)
      for (let from = 0; from < players.length; from++) {
        const fromP = players[from];
        if (fromP.defeated || fromP.isNpc) continue;
        // нӣ„ліҙ мғҒлҢҖ: мқём ‘н•ҳм§Җ м•Ҡм•„лҸ„ OK, defeated/NPC м ңмҷё
        const others = players.map((pp, i) => ({ pp, i })).filter(({ pp, i }) => i !== from && !pp.defeated && !pp.isNpc);
        if (others.length === 0) continue;
        // кұ°лһҳ мӢңлӮҳлҰ¬мҳӨ нӣ„ліҙ вҖ” к°ҖмһҘ мӢӨмҡ©м Ғмқё 1к°ң м„ м •
        const candidates = [];
        for (const { pp: toP, i: to } of others) {
          // (1) мһҗмӣҗ мҠӨмҷ‘: fromмқҙ л¶ҖмЎұн•ң мһҗмӣҗ вҶ” toк°Җ л¶ҖмЎұн•ң мһҗмӣҗ
          // лӢЁмҲң лЈ°: fromмқҙ creditвүҘ4 + toк°Җ weaponsвүҘ2 вҶ’ credit 4 / weapons 2 кұ°лһҳ
          if ((fromP.resources.credit || 0) >= 4 && (toP.resources.weapons || 0) >= 2 && (fromP.resources.weapons || 0) < 2) {
            candidates.push({ from, to, type: 'swap', give: { credit: 4 }, get: { weapons: 2 }, value: 5 });
          }
          if ((fromP.resources.weapons || 0) >= 2 && (toP.resources.credit || 0) >= 4 && (fromP.resources.credit || 0) < 4) {
            candidates.push({ from, to, type: 'swap', give: { weapons: 2 }, get: { credit: 4 }, value: 5 });
          }
          if ((fromP.resources.data || 0) >= 2 && (toP.resources.parts || 0) >= 2 && (fromP.resources.parts || 0) < 2) {
            candidates.push({ from, to, type: 'swap', give: { data: 2 }, get: { parts: 2 }, value: 4 });
          }
          // (2) л№„кіөкІ© м•ҪмҶҚ: GhostвҶ”Bloc лҳҗлҠ” GhostвҶ”Ghost (м„ңлЎң лӢӨмқҢ R м•Ҳ м№ңлӢӨ)
          if (fromP.role !== toP.role) {
            // Ghostк°Җ Blocм—җкІҢ: "лӢӨмқҢ R raid м•Ҳ н•Ё" м ңм•Ҳ (BlocмқҖ вҳ…+1лЎң ліҙмғҒ)
            candidates.push({ from, to, type: 'truce', give: {}, get: {}, expiresR: s.meta.round + 1, value: 3 });
          }
          // (3) BROKER ліҙл„ҲмҠӨ (v0.9.3) вҖ” нҳ‘мғҒ мӢң +1 мһҗмӣҗ (л„Ҳн”„: rep 2вҶ’1, credit 2вҶ’1)
          if (fromP.specific === 'BROKER') {
            candidates.push({ from, to, type: 'broker_deal', give: {}, get: { rep: 1, credit: 1 }, value: 3 });
          }
        }
        if (candidates.length === 0) continue;
        // к°ҖмһҘ к°Җм№ҳ лҶ’мқҖ кІғ м„ нғқ
        candidates.sort((a, b) => b.value - a.value);
        proposals.push(candidates[0]);
      }
      // кұ°лһҳ мІҳлҰ¬
      for (const prop of proposals) {
        const fromP = s.players[prop.from];
        const toP = s.players[prop.to];
        if (fromP.defeated || toP.defeated) continue;
        // лҙҮ AI: to мёЎмқҙ л°ӣмқ„ к°Җм№ҳ нҸүк°Җ (net positiveл©ҙ мҲҳлқҪ)
        let acceptValue = 0;
        for (const [k, v] of Object.entries(prop.give || {})) acceptValue += v;
        for (const [k, v] of Object.entries(prop.get || {})) acceptValue -= v;
