<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DEAD NEXUS · Simulator v0.5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; }
  html, body, #root { height: 100%; margin: 0; background: #06060e; color: #e0e0e0; }
  body { font-family: 'Rajdhani', system-ui, sans-serif; overflow-x: hidden; }
  .mono { font-family: 'Share Tech Mono', monospace; }
  button { font-family: inherit; cursor: pointer; }

  /* ---- Color palette ---- */
  :root {
    --bg: #06060e;
    --bg2: #0f0f1a;
    --bg3: #1a1a2e;
    --border: #2d2d4f;
    --cyan: #00e5ff;
    --magenta: #ff003c;
    --yellow: #ffd700;
    --green: #b4ff39;
    --orange: #ff9100;
    --purple: #a855f7;
    --text-dim: #9090a8;
    --text: #e0e0e0;
  }

  /* ---- Boot screen ---- */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #06060e; color: var(--cyan);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 4px; font-size: 14px;
  }

  /* ---- Setup screen ---- */
  .setup {
    max-width: 900px; margin: 0 auto; padding: 40px 24px;
  }
  .setup h1 {
    font-family: 'Share Tech Mono', monospace;
    font-size: 42px; letter-spacing: 4px; margin: 0;
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .setup .tagline {
    color: var(--text-dim); letter-spacing: 3px; font-size: 11px;
    margin-top: 4px; font-family: 'Share Tech Mono', monospace;
  }
  .setup h2 {
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan); letter-spacing: 2px;
    font-size: 16px; margin: 32px 0 12px;
    border-bottom: 1px solid var(--border); padding-bottom: 6px;
  }
  .role-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  }
  .role-card {
    border: 2px solid var(--border); background: var(--bg2);
    padding: 16px; border-radius: 4px; cursor: pointer;
    transition: all 0.2s;
  }
  .role-card.selected { border-color: var(--cyan); background: var(--bg3); box-shadow: 0 0 20px rgba(0,229,255,0.2); }
  .role-card h3 { margin: 0 0 6px; font-family: 'Share Tech Mono', monospace; color: var(--cyan); }
  .role-card p { margin: 0; color: var(--text-dim); font-size: 13px; }

  .class-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  }
  .class-card {
    border: 1.5px solid var(--border); background: var(--bg2);
    padding: 12px; border-radius: 3px; cursor: pointer; transition: all 0.15s;
  }
  .class-card.selected { border-color: var(--cyan); background: rgba(0,229,255,0.1); }
  .class-card .cname { font-family: 'Share Tech Mono', monospace; font-size: 14px; font-weight: 700; color: var(--cyan); letter-spacing: 1px; }
  .class-card .cstats { font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--text-dim); margin-top: 6px; }

  .start-btn {
    background: linear-gradient(90deg, var(--cyan), var(--magenta));
    border: none; color: #000; font-weight: 700;
    font-family: 'Share Tech Mono', monospace; letter-spacing: 3px;
    padding: 14px 36px; font-size: 16px; border-radius: 3px;
    margin-top: 32px; width: 100%;
  }
  .start-btn:hover { filter: brightness(1.15); box-shadow: 0 0 30px rgba(0,229,255,0.4); }

  /* ---- Game layout ---- */
  .game {
    display: grid;
    grid-template-columns: 300px 1fr 280px;
    grid-template-rows: 50px 1fr;
    height: 100vh; max-height: 100vh;
    grid-template-areas:
      "top top top"
      "left center right";
  }
  .top-bar {
    grid-area: top;
    background: var(--bg2); border-bottom: 1px solid var(--border);
    display: flex; align-items: center; padding: 0 16px; gap: 24px;
    font-family: 'Share Tech Mono', monospace; font-size: 12px;
  }
  .top-bar .title {
    font-weight: 700; letter-spacing: 3px; color: var(--cyan);
  }
  .top-bar .phases {
    display: flex; gap: 4px; flex: 1; justify-content: center;
  }
  .phase-chip {
    padding: 2px 10px; border: 1px solid var(--border); border-radius: 2px;
    font-size: 10px; letter-spacing: 1px; color: var(--text-dim);
  }
  .phase-chip.active { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 700; }
  .phase-chip.done { color: #555; border-color: #333; }
  .top-bar .round { color: var(--yellow); }
  .top-bar .heat { color: var(--magenta); }

  /* Left panel — player state */
  .left-panel {
    grid-area: left; background: var(--bg2); border-right: 1px solid var(--border);
    padding: 12px; overflow-y: auto;
  }
  .player-card {
    border: 1.5px solid var(--border); background: var(--bg3);
    padding: 10px; border-radius: 3px; margin-bottom: 10px;
  }
  .player-card.me { border-color: var(--cyan); }
  .player-card.turn { box-shadow: 0 0 15px rgba(0,229,255,0.3); }
  .player-card .pheader {
    display: flex; justify-content: space-between; align-items: baseline;
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    margin-bottom: 6px;
  }
  .player-card .pname { color: var(--cyan); letter-spacing: 1px; }
  .player-card .php {
    color: var(--magenta); font-weight: 700;
  }
  .player-card .pstats {
    font-family: 'Share Tech Mono', monospace; font-size: 10px;
    color: var(--text-dim); display: grid; grid-template-columns: 1fr 1fr; gap: 2px 8px;
  }
  .player-card .pstats strong { color: var(--text); }

  /* Center - map */
  .center-panel {
    grid-area: center; display: flex; flex-direction: column; padding: 12px;
    overflow: auto;
  }
  .map-wrap { display: flex; gap: 16px; }
  .map-board {
    display: grid;
    grid-template-columns: 28px repeat(5, 1fr);
    grid-template-rows: 28px repeat(5, 1fr);
    gap: 2px;
    background: #000;
    padding: 2px;
    border: 2px solid var(--border);
    max-width: 520px;
    aspect-ratio: 5.5/5.5;
  }
  .map-cell {
    background: var(--bg3); display: flex; flex-direction: column;
    align-items: center; justify-content: center; text-align: center;
    font-size: 10px; padding: 4px;
    position: relative; cursor: pointer;
    transition: all 0.1s;
    font-family: 'Share Tech Mono', monospace;
  }
  .map-cell:hover { filter: brightness(1.3); outline: 1px solid var(--cyan); z-index: 1; }
  .map-cell.label { background: transparent; cursor: default; color: var(--text-dim); }
  .map-cell.corner { background: transparent; cursor: default; }
  .map-cell .coord {
    position: absolute; top: 2px; left: 3px; font-size: 8px; opacity: 0.5;
  }
  .map-cell .ztype { font-size: 9px; color: #000; font-weight: 700; }
  .map-cell .owner {
    position: absolute; bottom: 2px; right: 3px;
    font-size: 7px; padding: 0 3px;
    background: rgba(0,0,0,0.5); color: white; font-weight: 700;
  }
  .map-cell .pm {
    position: absolute; top: 14px; right: 3px; font-size: 9px;
    background: var(--cyan); color: #000; padding: 1px 3px; font-weight: 700;
  }
  /* Zone colors */
  .z-ruin { background: #3a3a2a; color: #999; }
  .z-home { background: #4a3a5a; color: #fff; }
  .z-bank { background: #8a6a10; color: #fff; }
  .z-data { background: #1a4a7a; color: #fff; }
  .z-heal { background: #2a7a5a; color: #fff; }
  .z-work { background: #7a5a2a; color: #fff; }
  .z-arms { background: #5a5a5a; color: #fff; }
  .z-club { background: #7a2a5a; color: #fff; }
  .z-port { background: #3a4a7a; color: #fff; }
  .z-cop  { background: #222; color: #fff; }
  .z-nex  { background: #ffd700; color: #000; font-weight: 900; }
  .z-aux  { background: #5a3a3a; color: #fff; }

  /* Right panel */
  .right-panel {
    grid-area: right; background: var(--bg2); border-left: 1px solid var(--border);
    padding: 12px; overflow-y: auto; display: flex; flex-direction: column;
  }
  .pool-box {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 8px; border-radius: 3px; margin-bottom: 10px;
  }
  .pool-box h4 {
    margin: 0 0 6px; font-family: 'Share Tech Mono', monospace;
    font-size: 10px; letter-spacing: 2px; color: var(--text-dim);
  }
  .attr-row { display: flex; gap: 4px; flex-wrap: wrap; font-family: 'Share Tech Mono', monospace; font-size: 11px; }
  .attr-tag {
    padding: 2px 6px; border-radius: 2px; color: white; font-weight: 700;
    display: inline-flex; align-items: center; gap: 3px;
  }
  .a-M { background: #185FA5; }
  .a-I { background: #888780; }
  .a-V { background: #854F0B; }
  .a-S { background: #534AB7; }
  .a-B { background: #1D9E75; }
  .a-A { background: #C04828; }
  .a-GRID { background: #666; }

  .signal-box { text-align: center; font-family: 'Share Tech Mono', monospace; letter-spacing: 2px; padding: 6px; }
  .sig-MESH_UP { background: rgba(24,95,165,0.3); color: var(--cyan); }
  .sig-MESH_DOWN { background: rgba(192,72,40,0.3); color: var(--magenta); }
  .sig-SURGE { background: rgba(255,215,0,0.3); color: var(--yellow); }
  .sig-BLACKOUT { background: #000; color: #555; border: 1px solid #333; }

  .news-box {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 10px; border-radius: 3px; margin-bottom: 10px;
    font-size: 12px;
  }
  .news-box .nh { color: var(--yellow); font-family: 'Share Tech Mono', monospace; font-size: 10px; letter-spacing: 2px; margin-bottom: 4px; }

  .log-box {
    background: var(--bg3); border: 1px solid var(--border);
    padding: 8px; border-radius: 3px; font-size: 11px; flex: 1;
    overflow-y: auto; min-height: 100px; max-height: 300px;
    font-family: 'Share Tech Mono', monospace;
  }
  .log-box h4 { margin: 0 0 6px; font-size: 10px; letter-spacing: 2px; color: var(--text-dim); }
  .log-entry { padding: 2px 0; color: var(--text-dim); }
  .log-entry.event { color: var(--yellow); }
  .log-entry.action { color: var(--cyan); }
  .log-entry.combat { color: var(--magenta); }

  /* Hand */
  .hand-wrap {
    background: var(--bg2); border-top: 1px solid var(--border);
    padding: 10px; flex: 1 1 auto;
    display: flex; flex-direction: column;
    min-height: 0; max-height: 300px;
  }
  .hand-wrap h4 { margin: 0 0 6px; font-family: 'Share Tech Mono', monospace; font-size: 11px; color: var(--cyan); letter-spacing: 2px; }
  .hand { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; flex: 1; align-items: flex-start; }
  .card {
    width: 150px; height: 240px;
    background: #0a0a18; border: 1.5px solid var(--border);
    border-radius: 4px; padding: 6px;
    flex-shrink: 0;
    font-size: 10px; display: flex; flex-direction: column;
    cursor: pointer; transition: transform 0.15s, border-color 0.1s;
    overflow: hidden;
  }
  .card:hover { transform: translateY(-4px); border-color: var(--cyan); }
  .card.selected { border-color: var(--yellow); box-shadow: 0 0 12px rgba(255,215,0,0.4); }
  .card.disabled { opacity: 0.4; cursor: not-allowed; }
  .card .ch {
    display: flex; justify-content: space-between; align-items: center;
    font-family: 'Share Tech Mono', monospace; font-size: 9px;
    border-bottom: 1px solid var(--border); padding-bottom: 3px; margin-bottom: 3px;
  }
  .card .ci { background: var(--cyan); color: #000; padding: 1px 5px; font-weight: 700; }
  .card .ct {
    font-family: 'Share Tech Mono', monospace; font-size: 11px;
    color: var(--yellow); letter-spacing: 0.5px; text-align: center; margin: 4px 0;
  }
  .card .ceff {
    font-size: 9.5px; line-height: 1.35; flex: 1;
    overflow-y: auto; max-height: 90px;
  }
  .card .ceff strong { display: block; margin-bottom: 2px; font-size: 9px; }
  .card .cbot {
    border-top: 1px dashed #444; padding-top: 4px; margin-top: 3px;
    font-size: 9.5px; line-height: 1.35;
    max-height: 90px; overflow-y: auto;
  }
  .card .cbot strong { display: block; margin-bottom: 2px; font-size: 9px; }
  .card .cost {
    font-family: 'Share Tech Mono', monospace; font-size: 9px; color: var(--text-dim);
  }
  .loss-tag { color: var(--magenta); font-weight: 700; font-size: 8px; padding: 1px 3px; background: rgba(255,0,60,0.2); }

  /* Action buttons */
  .phase-actions {
    display: flex; gap: 8px; padding: 10px; background: var(--bg2);
    border-top: 2px solid var(--cyan);
    flex: 0 0 auto;
    min-height: 54px;
  }
  .center-panel { display: flex; flex-direction: column; }
  .map-wrap { flex: 0 0 auto; }
  .pa-btn {
    flex: 1; padding: 10px; background: var(--bg3);
    border: 1.5px solid var(--border); color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    letter-spacing: 1px; border-radius: 2px; font-size: 12px;
  }
  .pa-btn:hover:not(:disabled) { background: var(--cyan); color: #000; border-color: var(--cyan); }
  .pa-btn.primary { background: var(--cyan); color: #000; border-color: var(--cyan); font-weight: 700; }
  .pa-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* Modal */
  .modal-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100;
    display: flex; align-items: center; justify-content: center;
  }
  .modal {
    background: var(--bg2); border: 2px solid var(--cyan);
    padding: 24px; border-radius: 4px; max-width: 560px; width: 90%;
  }
  .modal h2 {
    font-family: 'Share Tech Mono', monospace;
    color: var(--cyan); letter-spacing: 3px; margin: 0 0 12px;
  }
  .modal p { color: var(--text-dim); line-height: 1.5; }
  .modal .obj-list { margin: 16px 0; }
  .modal .obj-item {
    background: var(--bg3); border-left: 3px solid var(--yellow);
    padding: 8px 12px; margin: 6px 0; font-size: 12px;
  }

  /* Game over */
  .gameover {
    text-align: center; padding: 60px 24px;
  }
  .gameover h1 {
    font-family: 'Share Tech Mono', monospace; font-size: 56px;
    letter-spacing: 6px; margin: 0 0 20px;
  }
  .gameover.win h1 { color: var(--green); text-shadow: 0 0 30px var(--green); }
  .gameover.lose h1 { color: var(--magenta); text-shadow: 0 0 30px var(--magenta); }
  .gameover .stats-grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px;
    max-width: 600px; margin: 24px auto;
  }
  .gameover .stat-box {
    background: var(--bg2); border: 1px solid var(--border);
    padding: 16px; border-radius: 3px;
  }
  .gameover .stat-box .lbl { font-family: 'Share Tech Mono', monospace; font-size: 10px; color: var(--text-dim); letter-spacing: 2px; }
  .gameover .stat-box .val { font-family: 'Share Tech Mono', monospace; font-size: 28px; color: var(--cyan); margin-top: 4px; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--cyan); }
</style>
</head>
<body>

<div id="root">
  <div id="boot">INITIALIZING ASHGRID SIMULATION...</div>
</div>

<script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone@7.25.6/babel.min.js"></script>

<script type="text/babel" data-presets="react">
'use strict';
const { useState, useEffect, useReducer, useMemo, useCallback, useRef } = React;

// ============================================================================
// DATA
// ============================================================================

const ZONE_TYPES = {
  ruin: { name: '폐허', color: 'z-ruin', income: {}, attr: 'A', buildable: false, note: '거점 불가' },
  home: { name: '주택가', color: 'z-home', income: { credit: 1, operative: 1 }, attr: 'GRID', buildable: true },
  bank: { name: '금융가', color: 'z-bank', income: { credit: 3 }, attr: 'M', buildable: true },
  data: { name: '데이터허브', color: 'z-data', income: { data: 2 }, attr: 'M', buildable: true },
  heal: { name: '의료구역', color: 'z-heal', income: { operative: 1 }, attr: 'B', buildable: true, note: 'HP회복' },
  work: { name: '공업지구', color: 'z-work', income: { parts: 2 }, attr: 'V', buildable: true },
  arms: { name: '무기고', color: 'z-arms', income: { weapons: 2 }, attr: 'I', buildable: true, note: '방어+1' },

  nex:  { name: 'NEXUS', color: 'z-nex', income: { credit: 3, all_attr: 1 }, attr: 'all', buildable: true, note: '2R 연속=즉시 승리(튜토)' },
  aux:  { name: '넥서스부속', color: 'z-aux', income: { credit: 2, random_attr: 1 }, attr: null, buildable: true },

// 5×5 tutorial map (25 cells)
const MAP_5x5 = [
  ['A1','ruin'], ['B1','home'], ['C1','bank'], ['D1','data'], ['E1','ruin'],
  ['A2','ruin'], ['B2','aux'],  ['C2','data'], ['D2','data'], ['E2','heal'],

  ['A5','ruin'], ['B5','club'], ['C5','cop'],  ['D5','port'], ['E5','ruin'],

// Bloc HQ + support zones (tutorial)
const BLOC_SETUP = {

  AXIOM:    { hq: 'D2', support: ['D1'],      color: '#2d6fff' },

  CARBON:   { hq: 'B3', support: ['A4'],      color: '#8b5a2b' },
};

// Bloc stats (for direct combat)
const BLOC_STATS = {
  VANTA:    { hp: 7,  atk: 2, def: 2, spd: 3, hack: 5, primary: 'M', secondary: 'S' },
  IRONWALL: { hp: 10, atk: 5, def: 4, spd: 3, hack: 1, primary: 'I', secondary: 'A' },
  HELIX:    { hp: 8,  atk: 3, def: 3, spd: 2, hack: 3, primary: 'B', secondary: 'V' },
  AXIOM:    { hp: 6,  atk: 2, def: 2, spd: 4, hack: 5, primary: 'M', secondary: 'V' },
  CARBON:   { hp: 9,  atk: 3, def: 4, spd: 2, hack: 2, primary: 'V', secondary: 'A' },
};

const GHOST_STATS = {
  CIPHER:  { hp: 6,  atk: 2, def: 1, spd: 4, hack: 5, primary: 'M', secondary: 'S', startZone: 'A1' },
  BLADE:   { hp: 10, atk: 5, def: 3, spd: 3, hack: 1, primary: 'I', secondary: 'A', startZone: 'A5' },
  BROKER:  { hp: 6,  atk: 2, def: 2, spd: 5, hack: 2, primary: 'S', secondary: 'GRID', startZone: 'A3' },
  RIGGER:  { hp: 7,  atk: 3, def: 4, spd: 2, hack: 3, primary: 'V', secondary: 'I', startZone: 'B5' },
  DRIFTER: { hp: 9,  atk: 4, def: 2, spd: 4, hack: 1, primary: 'A', secondary: 'GRID', startZone: 'E1' },
  MOLE:    { hp: 7,  atk: 2, def: 3, spd: 3, hack: 3, primary: 'S', secondary: 'M', startZone: 'D3' },
};

// Ghost cards (compact: tags describe effects)
// Effect tags:
//  move:N, atk:N, def:N, heal:N, scout, stealth, break_veil,
//  gen:X (generate attr), steal:X, crash_stock:N, reveal_hand,
//  raid_bonus:N, rep:N, credit:N
const GHOST_CARDS = {
  // CIPHER
  PORT_SCAN:      { name: 'PORT SCAN',      cls: 'CIPHER', init: 12, attr: ['M'],      top: { gen: 'M', move: 3, scout: 1 },                    bot: { cost: ['M','S'], reveal: 'zone', break_veil: 1 } },
  DATA_SPIKE:     { name: 'DATA SPIKE',     cls: 'CIPHER', init: 22, attr: ['M'], loss: true, top: { gen: 'M', atk: 1 },                         bot: { cost: ['M','M','S'], atk: 5, def_ignore: true, steal: 'M' } },

const d6 = () => Math.floor(Math.random() * 6) + 1;
const rand = (arr) => arr[Math.floor(Math.random() * arr.length)];
const shuffle = (a) => { const r = [...a]; for (let i = r.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1));[r[i], r[j]] = [r[j], r[i]]; } return r; };

const rollSignalDie = () => {
  const r = d6();
  if (r <= 2) return 'MESH_UP';
  if (r <= 4) return 'MESH_DOWN';
  if (r === 5) return 'SURGE';
  return 'BLACKOUT';
};

const getCard = (id) => GHOST_CARDS[id] || BLOC_CARDS[id];

const coord = (col, row) => String.fromCharCode(65 + col) + (row + 1);
const coordsAdj = (c) => {
  const col = c.charCodeAt(0) - 65;
  const row = parseInt(c.slice(1)) - 1;
  return [
    col > 0     ? coord(col - 1, row) : null,
    col < 4     ? coord(col + 1, row) : null,
    row > 0     ? coord(col, row - 1) : null,
    row < 4     ? coord(col, row + 1) : null,
  ].filter(Boolean);
};

// 자기 블록 주식: 통제권 표시, 자산 X
// 자산 = Σ(타 블록 주식 × 주가) + 구역 수 × 5
// 크레딧은 유동 자원이라 자본에 안 넣음 (자산 인플레 방지)
const assetValue = (p, stocks, state) => {
  let total = 0;
  for (const [bl, qty] of Object.entries(p.stocks)) {
    const isOwn = p.role === 'bloc' && p.specific === bl;
    if (isOwn) continue;
    const price = stocks[bl] ?? 10;
    total += qty * price;
  }
  if (state?.map) {
    const zonesOwned = Object.values(state.map).filter(c => c.owner === p.id).length;
    total += zonesOwned * 5;
  }
  return Math.floor(total);
};

function initGame(humanRole, humanSpecific) {
  // Build 5x5 map
  const map = {};
  MAP_5x5.forEach(([c, z]) => {
    map[c] = { zone: z, owner: null, token: Math.random() < 0.6 ? 'quest' : (Math.random() < 0.5 ? 'instant' : 'discovery'), tokenRevealed: false };
  });

  // Build players: 1 human + 3 bots
  const players = [];
  const allBlocs = ['VANTA', 'IRONWALL', 'HELIX', 'AXIOM', 'CARBON'];
  const allGhosts = ['CIPHER', 'BLADE', 'BROKER', 'RIGGER', 'DRIFTER', 'MOLE'];

  // Human first
  players.push(buildPlayer(0, 'human', humanRole, humanSpecific));

  // 3 bots: mixed roles opposite of human
  const botSpecs = [];
  if (humanRole === 'bloc') {
    // 2 Ghost bots + 1 Bloc bot
    botSpecs.push({ role: 'ghost', sp: rand(allGhosts.filter(g => g !== humanSpecific)) });
    botSpecs.push({ role: 'ghost', sp: rand(allGhosts) });
    const remaining = allBlocs.filter(b => b !== humanSpecific);
    botSpecs.push({ role: 'bloc', sp: rand(remaining) });
  } else {
    // 2 Bloc bots + 1 Ghost bot
    botSpecs.push({ role: 'bloc', sp: rand(allBlocs) });
    botSpecs.push({ role: 'bloc', sp: rand(allBlocs.filter(b => b !== botSpecs[0].sp)) });
    botSpecs.push({ role: 'ghost', sp: rand(allGhosts.filter(g => g !== humanSpecific)) });
  }
  botSpecs.forEach((bs, i) => players.push(buildPlayer(i + 1, 'bot', bs.role, bs.sp)));

  // Set bloc HQ zones as owned
  players.forEach(p => {
    if (p.role === 'bloc') {
      const setup = BLOC_SETUP[p.specific];
      map[setup.hq].owner = p.id;
      setup.support.forEach(s => { map[s].owner = p.id; });
      p.position = setup.hq;
    } else {
      p.position = GHOST_STATS[p.specific].startZone;
    }
  });

  // Deal objectives
  const objBloc = shuffle(OBJECTIVES.filter(o => o.role === 'bloc'));
  const objGhost = shuffle(OBJECTIVES.filter(o => o.role === 'ghost'));
  let bi = 0, gi = 0;
  players.forEach(p => {
    if (p.role === 'bloc') {
      p.objectives = [objBloc[bi++ % objBloc.length], objBloc[bi++ % objBloc.length]];
    } else {
      p.objectives = [objGhost[gi++ % objGhost.length], objGhost[gi++ % objGhost.length]];
    }
  });

  return {
    meta: {
      scenario: 'S01',
      mapSize: '5x5',
      round: 1,
      phase: 0,
      currentPlayer: 0,
      humanPlayer: 0,
      turnInit: null,
      gameOver: false,
      winner: null,
      winReason: null,
      newsSinceStart: 0,
      raidsThisGame: { 0:0, 1:0, 2:0, 3:0 },
      zonesVisited: { 0: new Set(), 1: new Set(), 2: new Set(), 3: new Set() },
      attacksUsed: { 0:0, 1:0, 2:0, 3:0 },
      lostCardsUsed: { 0:0, 1:0, 2:0, 3:0 },
      nexusHolder: null,
      nexusStreak: 0,
      claimedAchievements: {},  // id => playerIdx
    },
    players,
    map,
    pool: { M: 0, I: 0, V: 0, S: 0, B: 0, A: 0, GRID: 0 },
    stocks: { VANTA: 10, IRONWALL: 10, HELIX: 10, AXIOM: 10, CARBON: 10 },
    heat: 5,
    signalDie: rollSignalDie(),
    currentNews: null,
    log: [{ round: 0, phase: 0, message: '🎮 게임 시작. 튜토리얼 5×5 · 시나리오 S01' }],
  };
}

function buildPlayer(id, kind, role, specific) {
  const deck = role === 'bloc' ? BLOC_DECKS[specific] : GHOST_DECKS[specific];
  const stats = role === 'bloc' ? BLOC_STATS[specific] : GHOST_STATS[specific];
  return {
    id, kind, role, specific,
    hp: stats.hp,
    maxHp: stats.hp,
    stats,
    resources: initResources(role),
    stocks: initStocks(role, specific),
    deck: shuffle(deck),
    hand: [],
    discard: [],
    lost: [],
    contracts: [],
    wanted: 0,
    tl: 1,
    tlProgress: 0,
    position: null,
    zonesOwned: [],
    objectives: [],
    achievements: [],
    defeated: false,
    plannedCards: [],  // for phase 3->4
  };
}

// Reducer actions
function reducer(state, action) {
  switch (action.type) {
    case 'DRAW_INITIAL': {
      // Draw hand size depending on role
      const ps = state.players.map(p => {
        const handSize = p.role === 'bloc' ? 5 : 6;
        const newHand = p.deck.slice(0, handSize);
        const newDeck = p.deck.slice(handSize);
        return { ...p, hand: newHand, deck: newDeck };
      });
      return { ...state, players: ps };
    }

    case 'LOG':
      return { ...state, log: [...state.log, { round: state.meta.round, phase: state.meta.phase, message: action.msg }].slice(-60) };

    case 'SET_PHASE':
      return { ...state, meta: { ...state.meta, phase: action.phase } };

    case 'NEXT_PHASE': {
      const cur = state.meta.phase;
      if (cur < 6) return { ...state, meta: { ...state.meta, phase: cur + 1 } };
      // End of round
      return state;  // handled elsewhere
    }

    case 'NEXT_ROUND': {
      const newRound = state.meta.round + 1;
      if (newRound > 8) {
        return checkVictoryByPoints(state);
      }
      const nd = rollSignalDie();
      // 속성 풀 감쇠 (Math.ceil로 1→1 유지하여 시드 보존)
      const newPool = {};
      for (const [k, v] of Object.entries(state.pool)) newPool[k] = Math.ceil(v / 2);
      // === 손패 리필 (드로우 페이즈) ===
      const refilledPlayers = state.players.map(p => {
        if (p.defeated) return p;
        const handMax = p.role === 'bloc' ? 5 : 6;
        const needed = Math.max(0, handMax - p.hand.length);
        let newDeck = [...p.deck];
        let newDiscard = [...p.discard];
        let newHand = [...p.hand];
        for (let i = 0; i < needed; i++) {
          if (newDeck.length === 0) {
            // 덱 소진 → discard 셔플해서 덱으로 (LOST 카드는 제외)
            if (newDiscard.length === 0) break;
            newDeck = shuffle(newDiscard);
            newDiscard = [];
          }
          newHand.push(newDeck.shift());
        }
        return { ...p, hand: newHand, deck: newDeck, discard: newDiscard };
      });
      return {
        ...state,
        meta: { ...state.meta, round: newRound, phase: 0 },
        signalDie: nd,
        pool: newPool,
        currentNews: null,
        players: refilledPlayers,
        log: [...state.log, { round: newRound, phase: 0, message: `🔄 R${newRound} 시작 · 시그널 ${nd} · 손패 리필` }].slice(-60),
      };
    }

    case 'DRAW_NEWS': {
      const news = rand(NEWS);
      let newStocks = { ...state.stocks };
      let newHeat = state.heat;
      if (news.effect.heat) newHeat += news.effect.heat;
      if (news.effect.all_stock) {
        Object.keys(newStocks).forEach(k => newStocks[k] = Math.max(1, Math.min(20, newStocks[k] + news.effect.all_stock)));
      }
      if (news.effect.ironwall_stock) newStocks.IRONWALL = Math.max(1, Math.min(20, newStocks.IRONWALL + news.effect.ironwall_stock));
      if (news.effect.axiom_stock) newStocks.AXIOM = Math.max(1, Math.min(20, newStocks.AXIOM + news.effect.axiom_stock));
      return {
        ...state,
        currentNews: news,
        stocks: newStocks,
        heat: Math.max(0, Math.min(10, newHeat)),
        log: [...state.log, { round: state.meta.round, phase: 1, message: `📰 ${news.title} — ${JSON.stringify(news.effect).slice(0, 60)}` }].slice(-60),
      };
    }

    case 'PLAN_CARDS': {
      // action.playerIdx, action.cards (array of card IDs — 1 or 2 for ghost; 1-3 for bloc)
      const ps = state.players.map((p, i) => {
        if (i === action.playerIdx) {
          return { ...p, plannedCards: action.cards };
        }
        return p;
      });
      return { ...state, players: ps };
    }

    case 'EXECUTE_TURN': {
      // Order players by initiative
      const pOrder = state.players
        .map((p, i) => ({ p, i, init: getInitiative(p) }))
        .filter(x => !x.p.defeated && x.p.plannedCards.length > 0)
        .sort((a, b) => a.init - b.init);

      let s = state;
      for (const { p, i } of pOrder) {
        s = executeCards(s, i);
      }
      // Clear planned
      s.players = s.players.map(p => ({ ...p, plannedCards: [] }));
      return s;
    }

    case 'COLLECT_INCOME': {
      let s = { ...state };
      const newPool = { ...s.pool };
      const newLog = [...s.log];

      const newPlayers = state.players.map((p, pi) => {
        if (p.defeated) return p;
        const res = { ...p.resources };
        // 맵에서 직접 소유 구역 찾기 (p.zonesOwned 쓰지 않음 — 안 업데이트되던 버그)
        const ownedCoords = Object.entries(state.map).filter(([c, cell]) => cell.owner === pi).map(([c]) => c);

        ownedCoords.forEach(c => {
          const cell = state.map[c];
          const z = ZONE_TYPES[cell.zone];
          if (!z) return;
          // 자원 수입
          for (const [k, v] of Object.entries(z.income)) {
            if (k === 'all_attr') {
              ['M','I','V','S','B','A'].forEach(a => { newPool[a] = (newPool[a] || 0) + v; });
            } else if (k === 'random_attr') {
              const rnd = rand(['M','I','V','S','B','A']);
              newPool[rnd] = (newPool[rnd] || 0) + v;
            } else if (k === 'operative') {
              // operative는 구역 탈환·OPERATIVE 프록시 — 지금은 크레딧으로 환산
              res.credit = (res.credit || 0) + v;
            } else {
              res[k] = (res[k] || 0) + v;
            }
          }
          // 구역 생산 속성도 풀에 추가 (docs/10 명시)
          if (z.attr && z.attr !== 'all' && z.attr !== null) {
            newPool[z.attr] = (newPool[z.attr] || 0) + 1;
          }
        });

        // 배당 (10% 이상 지분)
        for (const [bl, qty] of Object.entries(p.stocks)) {
          if (qty >= 2) {
            const divPerShare = state.stocks[bl] >= 15 ? 1 : 0.5;
            const div = Math.floor(qty * divPerShare);
            if (div > 0) res.credit = (res.credit || 0) + div;
          }
        }

        if (ownedCoords.length > 0) {
          const summary = `💰 P${pi} [${p.specific}] · ${ownedCoords.length}구역 수입: ₵${res.credit - (p.resources.credit || 0)}`;
          newLog.push({ round: s.meta.round, phase: s.meta.phase, message: summary });
        }

        return { ...p, resources: res };
      });

      s = { ...s, players: newPlayers, pool: newPool, log: newLog.slice(-60) };

      // === Bloc 패시브 확장: 라운드마다 자사 소유 구역 인접한 빈 buildable 구역 1개 자동 점령 ===
      const expandedMap = { ...s.map };
      const expandLog = [];
      for (let pi = 0; pi < s.players.length; pi++) {
        const p = s.players[pi];
        if (p.role !== 'bloc' || p.defeated) continue;
        const myZones = Object.entries(expandedMap).filter(([c, cell]) => cell.owner === pi).map(([c]) => c);
        const candidates = new Set();
        myZones.forEach(c => {
          coordsAdj(c).forEach(adj => {
            const cell = expandedMap[adj];
            if (cell && cell.owner === null && ZONE_TYPES[cell.zone]?.buildable) candidates.add(adj);
          });
        });
        if (candidates.size > 0) {
          const picks = [...candidates];
          const target = picks[Math.floor(Math.random() * picks.length)];
          expandedMap[target] = { ...expandedMap[target], owner: pi };
          const zName = ZONE_TYPES[expandedMap[target].zone]?.name || target;
          expandLog.push({ round: s.meta.round, phase: s.meta.phase, message: `📈 P${pi} [${p.specific}] 영향권 확장 → ${target} (${zName}) · 자산 +5` });
        }
      }
      if (expandLog.length > 0) {
        s = { ...s, map: expandedMap, log: [...s.log, ...expandLog].slice(-60) };
      }
      return s;
    }

    case 'CLAIM_ACHIEVEMENT': {
      // action.playerIdx, action.achievementId
      if (state.meta.claimedAchievements[action.achievementId] !== undefined) return state;
      const achv = ACHIEVEMENTS_IN.find(a => a.id === action.achievementId);
      if (!achv) return state;
      const ps = state.players.map((p, i) => {
        if (i !== action.playerIdx) return p;
        const res = { ...p.resources };
        if (achv.reward.res) res.credit += achv.reward.res;
        if (achv.reward.rep) res.rep += achv.reward.rep;
        if (achv.reward.parts) res.parts += achv.reward.parts;
        if (achv.reward.data) res.data += achv.reward.data;
        if (achv.reward.contact) res.influence += achv.reward.contact;
        return { ...p, resources: res, achievements: [...p.achievements, action.achievementId] };
      });
      return {
        ...state,
        players: ps,
        meta: { ...state.meta, claimedAchievements: { ...state.meta.claimedAchievements, [action.achievementId]: action.playerIdx } },
        log: [...state.log, { round: state.meta.round, phase: state.meta.phase, message: `🏆 P${action.playerIdx} 업적 달성: ${achv.name}` }].slice(-60),
      };
    }

    case 'MOVE_PLAYER': {
      // action.playerIdx, action.to
      const ps = state.players.map((p, i) => {
        if (i !== action.playerIdx) return p;
        return { ...p, position: action.to };
      });
      return {
        ...state,
        players: ps,
        log: [...state.log, { round: state.meta.round, phase: state.meta.phase, message: `P${action.playerIdx} 이동 → ${action.to}` }].slice(-60),
      };
    }

    case 'VICTORY':
      return { ...state, meta: { ...state.meta, gameOver: true, winner: action.winner, winReason: action.reason } };

    case 'RESET':
      return initGame(action.humanRole, action.humanSpecific);

    default:
      return state;
  }
}

function getInitiative(p) {
  if (p.role === 'ghost' && p.plannedCards[0]) {
    const c = getCard(p.plannedCards[0]);
    return c?.init ?? 50;
  }
  if (p.role === 'bloc' && p.plannedCards[0]) {
    return (p.tl || 1) * 10;
  }
  return 50;
}

function executeCards(state, playerIdx) {
  let s = { ...state };
  const p = s.players[playerIdx];
  if (!p.plannedCards || p.plannedCards.length === 0) return s;

  // For simplicity: execute TOP of first card + BOTTOM of second card (Ghost) or Main of first (Bloc)
  if (p.role === 'ghost') {
    const c1 = getCard(p.plannedCards[0]);
    const c2 = p.plannedCards.length > 1 ? getCard(p.plannedCards[1]) : null;
    if (c1?.top) s = applyEffect(s, playerIdx, c1.top, 'top', c1);
    if (c2?.bot) s = applyEffect(s, playerIdx, c2.bot, 'bot', c2);
    // Move cards to discard/lost
    const newHand = p.hand.filter(h => !p.plannedCards.includes(h));
    const newDiscard = [...p.discard];
    const newLost = [...p.lost];
    p.plannedCards.forEach((cid, i) => {
      const c = getCard(cid);
      if (c?.loss && i === 1) newLost.push(cid);
      else if (c?.loss && i === 0) newLost.push(cid);
      else newDiscard.push(cid);
    });
    s.players = s.players.map((pp, j) => j === playerIdx ? { ...pp, hand: newHand, discard: newDiscard, lost: newLost } : pp);
  } else {
    // Bloc
    const c1 = getCard(p.plannedCards[0]);
    if (c1?.main) s = applyEffect(s, playerIdx, c1.main, 'main', c1);
    // Move played cards to discard
    const newHand = p.hand.filter(h => !p.plannedCards.includes(h));
    const newDiscard = [...p.discard, ...p.plannedCards];
    s.players = s.players.map((pp, j) => j === playerIdx ? { ...pp, hand: newHand, discard: newDiscard } : pp);
  }
  return s;
}

// ============================================================================
// 경로 탐색: 가장 가까운 Bloc 소유 구역 찾기 (BFS, Chebyshev 4-방향)
// ============================================================================
function findNearestBlocZone(state, fromCoord, excludeOwnBloc = null) {
  const visited = new Set([fromCoord]);
  let frontier = [fromCoord];
  while (frontier.length > 0) {
    const next = [];
    for (const c of frontier) {
      const cell = state.map[c];
      if (!cell) continue;
      if (cell.owner !== null && cell.owner !== undefined) {
        const owner = state.players[cell.owner];
        if (owner?.role === 'bloc' && owner.specific !== excludeOwnBloc) {
          return c; // Found bloc zone
        }
      }
      for (const adj of coordsAdj(c)) {
        if (!visited.has(adj)) { visited.add(adj); next.push(adj); }
      }
    }
    frontier = next;
  }
  return null;
}

// 현재 위치에서 목표 방향으로 한 칸 이동 (BFS 기반)
function stepToward(state, fromCoord, toCoord) {
  if (fromCoord === toCoord) return fromCoord;
  // BFS로 경로 찾기
  const parent = { [fromCoord]: null };
  const queue = [fromCoord];
  while (queue.length > 0) {
    const c = queue.shift();
    if (c === toCoord) {
      // Backtrack to find first step
      let step = c;
      while (parent[step] !== fromCoord && parent[step] !== null) step = parent[step];
      return step === toCoord ? toCoord : step;
    }
    for (const adj of coordsAdj(c)) {
      if (!(adj in parent)) { parent[adj] = c; queue.push(adj); }
    }
  }
  return fromCoord;
}

function applyEffect(state, playerIdx, effect, kind, card) {
  let s = state;
  const p = s.players[playerIdx];

  // 속성 생성
  if (effect.gen) {
    const newPool = { ...s.pool };
    const keys = effect.gen.split(':');
    keys.forEach(k => { newPool[k] = (newPool[k] || 0) + 1; });
    s = { ...s, pool: newPool };
    s = logEntry(s, `P${playerIdx} [${p.specific}] · 속성 ${keys.join('+')} 생성 → 풀에 적립`);
  }

  // 비용 지불
  if (effect.cost) {
    const newPool = { ...s.pool };
    for (const a of effect.cost) {
      if (newPool[a] > 0) newPool[a]--;
      else if (newPool.GRID > 0) newPool.GRID--;
      else {
        s = logEntry(s, `P${playerIdx} · ${a} 부족 — 효과 불발 (${cardDisplayName(card)})`);
        return s;
      }
    }
    s = { ...s, pool: newPool };
  }

  // === 이동 (스마트 라우팅, effect.move 스텝만큼 반복) ===
  if (effect.move) {
    const meTag = playerIdx === 0 ? '⭐ 당신 ' : '';
    const startPos = s.players[playerIdx].position;
    let current = startPos;
    const path = [startPos];
    for (let step = 0; step < effect.move; step++) {
      let nextStep = null;
      const pNow = s.players[playerIdx];
      if (pNow.role === 'ghost') {
        const goal = findNearestBlocZone(s, current);
        if (goal && goal !== current) {
          nextStep = stepToward(s, current, goal);
        } else if (goal === current) {
          break; // 이미 목표 도착, 남은 이동은 보존
        } else {
          const adj = coordsAdj(current);
          if (adj.length) nextStep = rand(adj);
        }
      } else {
        // Bloc: 빈 buildable 구역 선호
        const adj = coordsAdj(current);
        const empty = adj.filter(c => s.map[c] && s.map[c].owner === null && ZONE_TYPES[s.map[c].zone]?.buildable);
        if (empty.length > 0) nextStep = rand(empty);
        else if (adj.length > 0) nextStep = rand(adj);
      }
      if (!nextStep || nextStep === current) break;
      current = nextStep;
      path.push(current);
      // 각 스텝마다 s.players 업데이트
      const ps = [...s.players];
      ps[playerIdx] = { ...ps[playerIdx], position: current };
      const v = new Set(s.meta.zonesVisited[playerIdx] || []);
      v.add(current);
      s = { ...s, players: ps, meta: { ...s.meta, zonesVisited: { ...s.meta.zonesVisited, [playerIdx]: v } } };
    }
    if (path.length > 1) {
      const finalPos = current;
      const zName = ZONE_TYPES[s.map[finalPos].zone]?.name || finalPos;
      const pathStr = path.join(' → ');
      s = logEntry(s, `${meTag}🚶 P${playerIdx} [${p.specific}] · ${pathStr} (${zName}, ${path.length - 1}칸 이동)`);
    }
  }

  // === OPERATIVE 배치 (Bloc 구역 확장) ===
  if (effect.deploy_op && p.role === 'bloc') {
    const curPos = s.players[playerIdx].position;
    const adj = coordsAdj(curPos);
    const empty = adj.filter(c => s.map[c] && s.map[c].owner === null && ZONE_TYPES[s.map[c].zone]?.buildable);
    const count = Math.min(effect.deploy_op, empty.length);
    if (count > 0) {
      const newMap = { ...s.map };
      const captured = [];
      for (let i = 0; i < count; i++) {
        const target = empty[i];
        newMap[target] = { ...newMap[target], owner: playerIdx };
        captured.push(target);
      }
      s = { ...s, map: newMap };
      const names = captured.map(c => `${c}(${ZONE_TYPES[s.map[c].zone]?.name || ''})`).join(', ');
      s = logEntry(s, `🏢 P${playerIdx} [${p.specific}] · 구역 점령: ${names} — 자산 +${count * 5}`);
    } else {
      s = logEntry(s, `🏢 P${playerIdx} [${p.specific}] · 인접 빈 구역 없음 (OPERATIVE 불발)`);
    }
  }

  // === 공격 (같은 구역 적) ===
  if (effect.atk || effect.atk_x2 || effect.atk_x3_retort) {
    const curP = s.players[playerIdx];
    const atkVal = effect.atk || (effect.atk_x2 ? curP.stats.atk : 0) || 0;
    const enemies = s.players.filter((pp, i) => i !== playerIdx && !pp.defeated && pp.position === curP.position);
    if (enemies.length > 0) {
      const target = enemies[0];
      const tIdx = s.players.indexOf(target);
      const atkRoll = d6();
      const defRoll = d6();
      const atkTotal = curP.stats.atk + atkVal + atkRoll;
      const defTotal = target.stats.def + defRoll;
      const dmg = Math.max(0, atkTotal - defTotal);
      s = logEntry(s, `💥 P${playerIdx} → P${tIdx} (${target.specific}) · 공격 ${curP.stats.atk}+${atkVal}+🎲${atkRoll}=${atkTotal} vs 방어 ${target.stats.def}+🎲${defRoll}=${defTotal} → 피해 ${dmg}`);
      const ps = [...s.players];
      ps[tIdx] = { ...ps[tIdx], hp: Math.max(0, ps[tIdx].hp - dmg) };
      if (ps[tIdx].hp === 0) {
        ps[tIdx] = { ...ps[tIdx], defeated: true };
        s = logEntry(s, `⚰️ P${tIdx} (${target.specific}) 쓰러짐`);
      }
      s = { ...s, players: ps };
      s.meta.attacksUsed[playerIdx] = (s.meta.attacksUsed[playerIdx] || 0) + 1;
    }
  }

  // === 레이드 (Ghost + Bloc 구역에서 공격 카드 사용 시) ===
  // ⚠ 중요: p는 시작 시점 기준이라 이동 후 무효. 현재 위치 재읽기 필수
  const curP2 = s.players[playerIdx];
  const atCell = s.map[curP2.position];
  const isBlocOwnedZone = atCell?.owner !== null && atCell?.owner !== undefined && s.players[atCell.owner]?.role === 'bloc';
  if (curP2.role === 'ghost' && effect.atk && isBlocOwnedZone) {
    const blocIdx = atCell.owner;
    const bloc = s.players[blocIdx].specific;
    const zName = ZONE_TYPES[atCell.zone]?.name || '';
    const raidRoll = d6();
    const raidTotal = raidRoll + curP2.stats.atk;
    const threshold = 5;
    if (raidTotal >= threshold) {
      // 성공 — 주가 -3, 렙 +3, 구역 점령 여부 선택
      const newStocks = { ...s.stocks, [bloc]: Math.max(1, s.stocks[bloc] - 3) };
      s = { ...s, stocks: newStocks };
      const ps = [...s.players];
      ps[playerIdx] = {
        ...ps[playerIdx],
        resources: { ...ps[playerIdx].resources, rep: ps[playerIdx].resources.rep + 3 },
        wanted: ps[playerIdx].wanted + 1,
      };
      const newMap = { ...s.map, [curP2.position]: { ...atCell, owner: null } };
      s = { ...s, players: ps, map: newMap, heat: Math.min(10, s.heat + 1) };
      s.meta.raidsThisGame[playerIdx] = (s.meta.raidsThisGame[playerIdx] || 0) + 1;
      const meTag = playerIdx === 0 ? '⭐ 당신 ' : '';
      s = logEntry(s, `${meTag}🗡️ 레이드 성공! [${curP2.position} ${zName}] 🎲${raidRoll}+${curP2.stats.atk}=${raidTotal} — ${bloc} 주가-3, 구역 중립화, P${playerIdx} 렙+3 (누적 ${ps[playerIdx].resources.rep}), 현상수배+1`);
    } else {
      const ps = [...s.players];
      ps[playerIdx] = {
        ...ps[playerIdx],
        hp: Math.max(0, ps[playerIdx].hp - 3),
        wanted: ps[playerIdx].wanted + 1,
      };
      s = { ...s, players: ps, heat: Math.min(10, s.heat + 1) };
      const meTag = playerIdx === 0 ? '⭐ 당신 ' : '';
      s = logEntry(s, `${meTag}❌ 레이드 실패 [${curP2.position} ${zName}] 🎲${raidRoll}+${curP2.stats.atk}=${raidTotal} < ${threshold} — P${playerIdx} HP-3, 현상수배+1`);
    }
  }

  // === 회복 (아군 Ghost 50%) ===
  if (effect.heal_all) {
    const ps = s.players.map(pp => pp.role === 'bloc' ? pp : { ...pp, hp: Math.min(pp.maxHp, pp.hp + Math.floor(pp.maxHp * 0.5)) });
    s = { ...s, players: ps };
    s = logEntry(s, `💚 P${playerIdx} [${p.specific}] · 아군 Ghost 전원 HP 50% 회복`);
  }

  if (card?.loss) {
    s.meta.lostCardsUsed[playerIdx] = (s.meta.lostCardsUsed[playerIdx] || 0) + 1;
  }

  // === 주가 조작 ===
  if (effect.crash_stock || effect.crash_target) {
    // 자기 블록 외 랜덤
    const candidates = Object.keys(s.stocks).filter(b => !(p.role === 'bloc' && p.specific === b));
    const target = rand(candidates);
    const amt = effect.crash_stock || effect.crash_target || 3;
    const newStocks = { ...s.stocks, [target]: Math.max(1, s.stocks[target] - amt) };
    s = { ...s, stocks: newStocks };
    s = logEntry(s, `📉 P${playerIdx} [${p.specific}] · ${target} 주가 -${amt} (${s.stocks[target]} → ${newStocks[target]})`);
  }

  // === 무기·자원 지급 ===
  if (effect.weapons) {
    const ps = [...s.players];
    ps[playerIdx] = { ...ps[playerIdx], resources: { ...ps[playerIdx].resources, weapons: (ps[playerIdx].resources.weapons || 0) + effect.weapons } };
    s = { ...s, players: ps };
    s = logEntry(s, `🔩 P${playerIdx} · 무기 +${effect.weapons}`);
  }
  if (effect.credit) {
    const ps = [...s.players];
    ps[playerIdx] = { ...ps[playerIdx], resources: { ...ps[playerIdx].resources, credit: (ps[playerIdx].resources.credit || 0) + effect.credit } };
    s = { ...s, players: ps };
    s = logEntry(s, `₵ P${playerIdx} · 크레딧 +${effect.credit}`);
  }
  if (effect.parts) {
    const ps = [...s.players];
    ps[playerIdx] = { ...ps[playerIdx], resources: { ...ps[playerIdx].resources, parts: (ps[playerIdx].resources.parts || 0) + effect.parts } };
    s = { ...s, players: ps };
    s = logEntry(s, `⚙️ P${playerIdx} · 부품 +${effect.parts}`);
  }

  // === 공권력 변동 ===
  if (effect.heat) {
    const newHeat = Math.max(0, Math.min(10, s.heat + effect.heat));
    s = { ...s, heat: newHeat };
    s = logEntry(s, `🚨 공권력 ${effect.heat > 0 ? '+' : ''}${effect.heat} → ${newHeat}`);
  }

  return s;
}

function cardDisplayName(card) {
  if (!card) return '?';
  return CARD_NAMES_KR[card.id] || card.name || '?';
}

function logEntry(s, msg) {
  return { ...s, log: [...s.log, { round: s.meta.round, phase: s.meta.phase, message: msg }].slice(-60) };
}

function checkVictoryByPoints(state) {
  // Find winner by asset (bloc) or rep (ghost)
  let winner = null;
  let topAsset = -Infinity;
  let topRep = -Infinity;
  state.players.forEach((p, i) => {
    if (p.role === 'bloc') {
      const av = assetValue(p, state.stocks, state);
      if (av > topAsset) { topAsset = av; winner = { idx: i, reason: `시간 종료 · 최고 자산 ${av}` }; }
    } else {
      if (p.resources.rep > topRep) { topRep = p.resources.rep; winner = { idx: i, reason: `시간 종료 · 최고 렙 ${p.resources.rep}` }; }
    }
  });
  return { ...state, meta: { ...state.meta, gameOver: true, winner: winner?.idx, winReason: winner?.reason || '무승부' } };
}

function checkInstantVictory(state) {
  // Check tutorial victory conditions
  for (let i = 0; i < state.players.length; i++) {
    const p = state.players[i];
    if (p.defeated) continue;
    if (p.role === 'bloc') {
      const av = assetValue(p, state.stocks, state);
      if (av >= 40) {
        return { ...state, meta: { ...state.meta, gameOver: true, winner: i, winReason: `Bloc 승리: 자산 ${av} (≥40)` } };
      }
    } else {
      if (p.resources.rep >= 10 && (state.meta.raidsThisGame[i] || 0) >= 1) {
        return { ...state, meta: { ...state.meta, gameOver: true, winner: i, winReason: `Ghost 승리: 렙 ${p.resources.rep} + 레이드 ${state.meta.raidsThisGame[i]}회` } };
      }
    }
  }
  return state;
}

// AI (Score-based greedy)
// ============================================================================

function botPickCards(state, playerIdx) {
  const p = state.players[playerIdx];
  if (p.hand.length === 0) return [];

  if (p.role === 'ghost') {
    // Pick 2 cards if possible
    const scored = p.hand.map(cid => ({ cid, score: scoreGhostCard(state, playerIdx, cid) }));
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, Math.min(2, p.hand.length)).map(x => x.cid);
  } else {
    // Bloc picks 1 card
    const scored = p.hand.map(cid => ({ cid, score: scoreBlocCard(state, playerIdx, cid) }));
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, 1).map(x => x.cid);
  }
}

function scoreGhostCard(state, pIdx, cid) {
  const c = getCard(cid);
  const p = state.players[pIdx];
  if (!c) return 0;
  let score = 10;

  // Prefer attacking when HP full
  if (c.top?.atk && p.hp > p.maxHp * 0.5) score += 15;
  if (c.bot?.atk || c.bot?.atk_x2 || c.bot?.atk_x3_retort) score += 10;

  // Prefer move when not near anything
  if (c.top?.move && p.zonesOwned.length < 2) score += 8;

  // Avoid LOSS unless powerful
  if (c.loss) {
    if (p.hp < p.maxHp * 0.3) score -= 10;
    else score += (c.bot?.atk || 0);
  }

  // Resource generation
  if (c.top?.gen && state.pool[c.top.gen] < 2) score += 5;

  return score + Math.random() * 2;
}

function scoreBlocCard(state, pIdx, cid) {
  const c = getCard(cid);
  const p = state.players[pIdx];
  if (!c) return 0;
  let score = 10;

  // Prefer own TL or lower
  if (c.tl <= p.tl) score += 15;
  if (c.tl > p.tl) score -= 20;

  // Resource efficiency
  const costLen = c.main?.cost?.length || 0;
  if (costLen > 0) {
    let payable = true;
    const poolCopy = { ...state.pool };
    for (const a of c.main.cost) {
      if (poolCopy[a] > 0) poolCopy[a]--;
      else if (poolCopy.GRID > 0) poolCopy.GRID--;
      else { payable = false; break; }
    }
    if (!payable) score -= 30;
  }

  // Reward aggressive cards for attackers
  if (c.main?.deploy_op || c.main?.heat) score += 10;

  return score + Math.random() * 2;
}

        <div className={`role-card ${role === 'bloc' ? 'selected' : ''}`} onClick={() => { setRole('bloc'); setSpecific('VANTA'); }}>

          <p>메가기업 운영. 자산 40 도달로 승리.</p>
        </div>
      </div>

      <h2>2. {role === 'ghost' ? '클래스' : '블록'} 선택</h2>
      <div className="class-grid">
        {options.map(([sp, desc]) => {
          const st = statsFor(sp);
          return (
            <div key={sp} className={`class-card ${specific === sp ? 'selected' : ''}`} onClick={() => setSpecific(sp)}>
              <div className="cname">{sp}</div>
              <div style={{ fontSize: 11, color: 'var(--text-dim)', marginTop: 2 }}>{desc}</div>
              <div className="cstats">
                HP:{st.hp} ATK:{st.atk}<br/>
                DEF:{st.def} SPD:{st.spd}<br/>
                HACK:{st.hack}
              </div>
            </div>
          );
        })}
      </div>

      <h2>3. 상대 (봇 3명 자동 배정)</h2>
      <div style={{ background: 'var(--bg2)', padding: 12, borderRadius: 3, fontSize: 13, color: 'var(--text-dim)' }}>
        당신이 {role === 'ghost' ? 'Ghost' : 'Bloc'}이면 봇은 반대 역할 + 같은 역할 믹스로 배정됩니다.
        시나리오 S01 표준 · 최대 8라운드 · 튜토리얼 승리 조건.
      </div>

      <button className="start-btn" onClick={() => onStart(role, specific)}>
        🎮 START SIMULATION
      </button>
    </div>
  );
}

function GameScreen({ state, dispatch }) {
  const me = state.players[0];
  const isMyTurn = state.meta.phase === 2;  // Plan phase
  const [selectedCards, setSelectedCards] = useState([]);

  // Auto-advance phases
  useEffect(() => {
    if (state.meta.gameOver) return;
    const ph = state.meta.phase;

    // Instantaneous phase handling
    if (ph === 1 && !state.currentNews) {
      setTimeout(() => dispatch({ type: 'DRAW_NEWS' }), 600);
      setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 2 }), 1500);
    }

    if (ph === 2) {
      // Bots auto-pick
      state.players.forEach((p, i) => {
        if (p.kind === 'bot' && !p.defeated && p.plannedCards.length === 0) {
          const cards = botPickCards(state, i);
          setTimeout(() => dispatch({ type: 'PLAN_CARDS', playerIdx: i, cards }), 300 + i * 200);
        }
      });
    }

    if (ph === 3) {
      setTimeout(() => {
        dispatch({ type: 'EXECUTE_TURN' });
        setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 4 }), 1200);
      }, 500);
    }

    if (ph === 4) {
      setTimeout(() => {
        dispatch({ type: 'COLLECT_INCOME' });
        setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 5 }), 800);
      }, 400);
    }

    if (ph === 5) {
      setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 6 }), 500);  // R&D skip for MVP
    }

    if (ph === 6) {
      setTimeout(() => {
        // Check victory
        const after = checkInstantVictory(state);
        if (after.meta.gameOver) {
          dispatch({ type: 'VICTORY', winner: after.meta.winner, reason: after.meta.winReason });
        } else {
          dispatch({ type: 'NEXT_ROUND' });
        }
      }, 500);
    }
  }, [state.meta.phase, state.meta.round]);

  const canPlan = me.kind === 'human' && state.meta.phase === 2;
  const needCards = me.role === 'ghost' ? 2 : 1;

  const confirmPlan = () => {
    dispatch({ type: 'PLAN_CARDS', playerIdx: 0, cards: selectedCards });
    setSelectedCards([]);
    // Wait for bots to plan, then advance
    setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 3 }), 800);
  };

  const toggleCard = (cid) => {
    if (!canPlan) return;
    if (selectedCards.includes(cid)) {
      setSelectedCards(selectedCards.filter(c => c !== cid));
    } else if (selectedCards.length < needCards) {
      setSelectedCards([...selectedCards, cid]);
    }
  };

  if (state.meta.gameOver) {
    const iWon = state.meta.winner === 0;
    return (
      <div className={`gameover ${iWon ? 'win' : 'lose'}`}>
        <h1>{iWon ? 'VICTORY' : 'DEFEAT'}</h1>
        <div style={{ color: 'var(--text-dim)', fontSize: 14, letterSpacing: 2, marginBottom: 20 }}>
          {state.meta.winReason || '게임 종료'}
        </div>
        <div className="stats-grid">
          <div className="stat-box">
            <div className="lbl">ROUND</div>
            <div className="val">{state.meta.round}</div>
          </div>
          <div className="stat-box">
            <div className="lbl">{me.role === 'bloc' ? 'ASSET' : 'REP'}</div>
            <div className="val">{me.role === 'bloc' ? assetValue(me, state.stocks, state) : me.resources.rep}</div>
          </div>
          <div className="stat-box">
            <div className="lbl">ACHIEVEMENTS</div>
            <div className="val">{me.achievements.length}</div>
          </div>
        </div>
        <button className="start-btn" style={{ maxWidth: 300 }} onClick={() => dispatch({ type: 'RESET', humanRole: me.role, humanSpecific: me.specific })}>
          🔄 AGAIN
        </button>
      </div>
    );
  }

  return (
    <div className="game">
      <div className="top-bar">
        <div className="title">DEAD NEXUS · SIM v0.5</div>
        <div className="phases">
          {PHASE_NAMES.map((name, i) => (
            <div key={i} className={`phase-chip ${i === state.meta.phase ? 'active' : (i < state.meta.phase ? 'done' : '')}`}>
              {i+1}.{name}
            </div>
          ))}
        </div>
        <div className="round">R{state.meta.round}/8</div>
        <div className="heat">🚨HEAT {state.heat}</div>
      </div>

      {/* LEFT — Players */}
      <div className="left-panel">
        <h4 style={{ margin: '4px 0 8px', fontFamily: 'Share Tech Mono, monospace', fontSize: 11, color: 'var(--text-dim)', letterSpacing: 2 }}>PLAYERS</h4>
        {state.players.map((p, i) => (
          <div key={i} className={`player-card ${i === 0 ? 'me' : ''} ${p.defeated ? '' : ''}`}>
            <div className="pheader">
              <div className="pname">{p.kind === 'human' ? '👤' : '🤖'} P{i} · {p.specific}</div>
              <div className="php">HP {p.hp}/{p.maxHp}</div>
            </div>
            <div className="pstats">
              <div>₵ <strong>{p.resources.credit}</strong></div>
              <div>📡 <strong>{p.resources.data}</strong></div>
              <div>🎙 <strong>{p.resources.influence}</strong></div>
              <div>🔩 <strong>{p.resources.weapons}</strong></div>
              <div>⚙️ <strong>{p.resources.parts}</strong></div>
              {p.role === 'ghost'
                ? <div>★ <strong>{p.resources.rep}</strong></div>
                : <div>📊 <strong>{assetValue(p, state.stocks, state)}</strong></div>
              }
            </div>
            {p.role === 'ghost' && <div style={{ fontSize: 10, marginTop: 4, color: 'var(--magenta)' }}>⚠ {p.wanted}</div>}
            <div style={{ fontSize: 10, marginTop: 4, color: 'var(--text-dim)' }}>@ {p.position || '—'} · 덱 {p.deck.length} · 패 {p.hand.length}</div>
            {i === 0 && (
              <div style={{ fontSize: 10, marginTop: 6, color: 'var(--yellow)' }}>
                🎯 {p.objectives.map(o => o.name).join(' · ')}
              </div>
            )}
          </div>
        ))}
      </div>

      {/* CENTER — Map + Hand */}
      <div className="center-panel">
        <div className="map-wrap">
          <div className="map-board">
            <div className="map-cell corner"></div>
            <div className="map-cell label">A</div>
            <div className="map-cell label">B</div>
            <div className="map-cell label">C</div>
            <div className="map-cell label">D</div>
            <div className="map-cell label">E</div>
            {[1,2,3,4,5].map(r => (
              <React.Fragment key={r}>
                <div className="map-cell label">{r}</div>
                {['A','B','C','D','E'].map(c => {
                  const cd = c + r;
                  const cell = state.map[cd];
                  if (!cell) return <div key={cd} className="map-cell"></div>;
                  const z = ZONE_TYPES[cell.zone];
                  const owner = cell.owner !== null && cell.owner !== undefined ? state.players[cell.owner] : null;
                  const pm = state.players.filter(p => p.position === cd && !p.defeated);
                  const hasMe = pm.some(p => p.id === 0);
                  return (
                    <div key={cd} className={`map-cell ${z.color}`} style={hasMe ? { outline: '3px solid var(--cyan)', zIndex: 2 } : {}}>
                      <div className="coord">{cd}</div>
                      <div className="ztype">{z.name}</div>
                      {owner && <div className="owner" style={{ background: owner.role === 'bloc' ? BLOC_SETUP[owner.specific]?.color || '#555' : '#333' }}>P{cell.owner}</div>}
                      {pm.length > 0 && (
                        <div className="pm" style={hasMe ? { background: 'var(--cyan)', color: '#000', fontWeight: 900, boxShadow: '0 0 6px var(--cyan)' } : {}}>
                          {hasMe ? '★' + pm.map(p => p.specific.slice(0,2)).join(',') : pm.map(p => p.specific.slice(0,2)).join(',')}
                        </div>
                      )}
                    </div>
                  );
                })}
              </React.Fragment>
            ))}
          </div>
        </div>

        {/* Hand */}
        <div className="hand-wrap">
          <h4>
            ✋ 내 손패 ({me.hand.length}) · {canPlan ? `카드 ${needCards}장 선택 (${selectedCards.length}/${needCards})` : '대기'}
            {canPlan && selectedCards.length === needCards && (
              <button className="pa-btn primary" style={{ float: 'right', marginTop: -4 }} onClick={confirmPlan}>✓ 확정</button>
            )}
          </h4>
          <div className="hand">
            {me.hand.map((cid, idx) => {
              const c = getCard(cid);
              if (!c) return null;
              const sel = selectedCards.includes(cid);
              return (
                <div key={idx} className={`card ${sel ? 'selected' : ''} ${!canPlan ? 'disabled' : ''}`} onClick={() => toggleCard(cid)}>
                  <div className="ch">
                    <span className="ci">{c.init || (c.tl ? `T${c.tl}` : '-')}</span>
                    <span>{c.attr?.map((a, i) => <span key={i} className={`attr-tag a-${a}`} style={{ fontSize: 8, marginLeft: 2 }}>◈{a}</span>)}
                      {c.loss && <span className="loss-tag">LOSS</span>}
                    </span>
                  </div>
                  <div className="ct">{CARD_NAMES_KR[cid] || c.name}</div>
                  <div style={{ fontSize: 8, color: 'var(--text-dim)', textAlign: 'center', marginBottom: 2 }}>{c.name}</div>
                  <div className="ceff">
                    {c.top && <><strong style={{ color: 'var(--cyan)' }}>▲ 상단</strong><br/>{effectSummary(c.top)}</>}
                    {c.main && <><strong style={{ color: 'var(--cyan)' }}>▶ 메인</strong><br/>{effectSummary(c.main)}</>}
                  </div>
                  <div className="cbot">
                    {c.bot && <><strong style={{ color: 'var(--yellow)' }}>▼ 하단</strong><br/>{effectSummary(c.bot)}</>}
                    {c.side && <><strong style={{ color: 'var(--yellow)' }}>↻ 사이드</strong><br/>{effectSummary(c.side)}</>}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {/* Phase actions */}
        <div className="phase-actions">
          {state.meta.phase === 0 && (
            <button className="pa-btn primary" onClick={() => dispatch({ type: 'SET_PHASE', phase: 1 })}>
              ▶ 시장 → 뉴스
            </button>
          )}
          {state.meta.phase === 2 && !canPlan && (
            <button className="pa-btn" disabled>봇 계획 중...</button>
          )}
        </div>
      </div>

      {/* RIGHT — Pool, News, Log */}
      <div className="right-panel">
        <div className="pool-box">
          <h4>🎨 속성 풀</h4>
          <div className="attr-row">
            {Object.entries(state.pool).map(([k, v]) => (
              <span key={k} className={`attr-tag a-${k}`}>◈{k}<span style={{ marginLeft: 2 }}>{v}</span></span>
            ))}
          </div>
        </div>

        <div className={`pool-box signal-box sig-${state.signalDie}`}>
          📡 {state.signalDie}
        </div>

        <div className="pool-box">
          <h4>📊 주가</h4>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', fontFamily: 'Share Tech Mono, monospace', fontSize: 11 }}>
            {Object.entries(state.stocks).map(([bl, v]) => (
              <div key={bl}>
                <span style={{ color: 'var(--text-dim)' }}>{bl}:</span> <span style={{ color: v > 10 ? 'var(--green)' : (v < 10 ? 'var(--magenta)' : 'var(--text)') }}>{v}</span>
              </div>
            ))}
          </div>
        </div>

        {state.currentNews && (
          <div className="news-box">
            <div className="nh">📰 뉴스 {state.currentNews.id}</div>
            <div style={{ fontWeight: 700 }}>{state.currentNews.title}</div>
            <div style={{ fontSize: 10, color: 'var(--text-dim)', fontStyle: 'italic', marginTop: 3 }}>{state.currentNews.flavor}</div>
          </div>
        )}

        <div className="pool-box">
          <h4>🏆 업적 (선언)</h4>
          <div style={{ display: 'grid', gap: 3, fontSize: 10 }}>
            {ACHIEVEMENTS_IN.map(a => {
              const claimed = state.meta.claimedAchievements[a.id] !== undefined;
              const mine = state.meta.claimedAchievements[a.id] === 0;
              return (
                <button
                  key={a.id}
                  className="pa-btn"
                  style={{ fontSize: 10, padding: '4px 6px', opacity: claimed ? 0.4 : 1, background: mine ? 'var(--green)' : 'var(--bg3)', color: mine ? '#000' : 'var(--text)' }}
                  disabled={claimed}
                  onClick={() => dispatch({ type: 'CLAIM_ACHIEVEMENT', playerIdx: 0, achievementId: a.id })}
                >
                  {a.tier === 'gold' ? '🥇' : a.tier === 'silver' ? '🥈' : '🥉'} {a.name}
                </button>
              );
            })}
          </div>
        </div>

        <div className="log-box">
          <h4>📜 LOG</h4>
          {state.log.slice(-20).reverse().map((l, i) => (
            <div key={i} className="log-entry">
              [R{l.round}P{l.phase + 1}] {l.message}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function effectSummary(eff) {
  if (!eff) return '-';
  const parts = [];

  if (eff.cost && eff.cost.length) parts.push(`[${eff.cost.join('+')} 소비]`);
  if (eff.gen) parts.push(`속성 ${eff.gen.split(':').map(x => `${x}+1`).join(' ')} 생성`);

  if (eff.move) parts.push(`이동 ${eff.move}칸`);
  if (eff.atk) parts.push(`공격 +${eff.atk} (같은 구역 적)`);
  if (eff.atk_x2) parts.push(`공격 2배 (이번 라운드)`);
  if (eff.atk_x3_retort) parts.push(`반격 공격 3배`);
  if (eff.def) parts.push(`방어 +${eff.def}`);
  if (eff.def_ignore) parts.push(`적 방어 무시`);

  if (eff.scout) parts.push(`정찰 ${eff.scout}칸 (토큰 확인)`);
  if (eff.stealth) parts.push('은신 (추적 불가)');
  if (eff.break_veil === 99) parts.push('베일 완전 해제');
  else if (eff.break_veil) parts.push(`베일 강도 -${eff.break_veil}`);

  if (eff.deploy_op) parts.push(`OPERATIVE ${eff.deploy_op}명 배치 → 인접 빈 구역 자동 점령`);
  if (eff.fortify) parts.push(`자사 구역 방어력 +${eff.fortify} 영구`);

  if (eff.crash_stock) parts.push(`대상 블록 주가 -${eff.crash_stock}`);
  if (eff.crash_target) parts.push(`지정 블록 주가 -${eff.crash_target}`);
  if (eff.peek_hand) parts.push('상대 패 1장 엿보기');
  if (eff.peek_full) parts.push('상대 패 전체 확인');
  if (eff.peek_news) parts.push(`뉴스 다음 ${eff.peek_news}장 미리 보기`);

  if (eff.heal_all) parts.push(`아군 Ghost 전원 HP ${eff.heal_all}% 회복`);
  if (eff.heal) parts.push(`HP +${eff.heal} 회복`);

  if (eff.weapons) parts.push(`무기 +${eff.weapons}`);
  if (eff.credit) parts.push(`₵ +${eff.credit}`);
  if (eff.parts) parts.push(`부품 +${eff.parts}`);
  if (eff.data) parts.push(`데이터 +${eff.data}`);
  if (eff.rep) parts.push(`렙 +${eff.rep}`);
  if (eff.contact) parts.push(`접선 +${eff.contact}`);

  if (eff.heat) parts.push(`공권력 ${eff.heat > 0 ? '+' : ''}${eff.heat}`);
  if (eff.clear_wanted) parts.push('현상수배 0 초기화');
  if (eff.clear_track) parts.push('추적 기록 삭제');
  if (eff.spd) parts.push(`속도 +${eff.spd}`);
  if (eff.always_first) parts.push('무조건 선공');
  if (eff.enemy_spd) parts.push(`적 속도 ${eff.enemy_spd}`);

  if (eff.cancel_card) parts.push('상대 행동 카드 1장 취소');
  if (eff.cancel_action) parts.push('상대 행동 1개 취소');
  if (eff.stop_combat) parts.push('진행 중 전투 즉시 중단');
  if (eff.hide_actions_1r) parts.push('자사 행동 1R 비공개');
  if (eff.hide_actions) parts.push('이번 라운드 행동 비공개');
  if (eff.veil_up) parts.push(`자사 구역 베일 강도 +${eff.veil_up} 영구`);

  if (eff.draw_quest) parts.push(`퀘스트 카드 ${eff.draw_quest}장 획득`);
  if (eff.blackmarket) parts.push(`블랙마켓 카드 ${eff.blackmarket}장 획득`);
  if (eff.revive) parts.push('사망 고스트 1명 부활');
  if (eff.broker_fee) parts.push(`거래 수수료 +${eff.broker_fee}%`);

  if (eff.trap) parts.push('구역에 함정 설치');
  if (eff.trap_damage) parts.push(`함정 발동 시 HP -${eff.trap_damage}`);
  if (eff.steal) parts.push(`적 ${eff.steal} 속성 1개 탈취`);
  if (eff.infiltrate) parts.push('블록 소속 위장');
  if (eff.disguise) parts.push('이번 라운드 블록 위장');

  if (eff.swap) parts.push('자원 2종 1:1 교환');
  if (eff.swap_ratio) parts.push(`자원 1:${eff.swap_ratio} 유리한 교환`);

  if (eff.stock_op) parts.push('블록 1곳 주가 ±1 비공개 조작');
  if (eff.zone_income_2x) parts.push('자사 구역 수입 2배 (이번 라운드)');
  if (eff.zero_income) parts.push('대상 구역 수입 0 (이번 라운드)');

  if (eff.loss) parts.push('⚠ 소각 (Long Rest만 복구)');

  if (parts.length === 0) return '특수 효과';
  return parts.join(' · ');
}

// ============================================================================
// ROOT
// ============================================================================

function buildInitial(role, specific) {
  const initial = initGame(role, specific);
  initial.players = initial.players.map(p => {
    const handSize = p.role === 'bloc' ? 5 : 6;
    return { ...p, hand: p.deck.slice(0, handSize), deck: p.deck.slice(handSize) };
  });
  return initial;
}

function App() {
  const [state, setState] = useState(null);

  const startGame = useCallback((role, specific) => {
    console.log('[SIM] Start game:', role, specific);
    setState(buildInitial(role, specific));
  }, []);

  const dispatch = useCallback((action) => {
    if (action.type === 'RESET') {
      setState(buildInitial(action.humanRole, action.humanSpecific));
      return;
    }
    setState(prev => {
      if (!prev) return prev;
      try {
        return reducer(prev, action);
      } catch (e) {
        console.error('[SIM] Reducer error:', e, 'Action:', action);
        return prev;
      }
    });
  }, []);

  if (!state) {
    return <SetupScreen onStart={startGame} />;
  }

  return <GameScreen state={state} dispatch={dispatch} />;
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
