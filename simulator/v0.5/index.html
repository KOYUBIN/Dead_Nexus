function botPickCards(state, playerIdx) {
  const p = state.players[playerIdx];
  if (p.hand.length === 0) return [];

  if (p.role === 'ghost') {
    // Pick 2 cards if possible
    const scored = p.hand.map(cid => ({ cid, score: scoreGhostCard(state, playerIdx, cid) }));
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, Math.min(2, p.hand.length)).map(x => x.cid);
  } else {
    // Bloc: 2мһҘ м„ нғқ (мғҒмң„ 2мһҘ)
    const scored = p.hand.map(cid => ({ cid, score: scoreBlocCard(state, playerIdx, cid) }));
    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, Math.min(2, p.hand.length)).map(x => x.cid);
  }
}

function scoreGhostCard(state, pIdx, cid) {
  const c = getCard(cid);
  const p = state.players[pIdx];
  if (!c) return 0;
  let score = 10;

  const rep = p.resources.rep || 0;
  const raids = state.meta.raidsThisGame?.[pIdx] || 0;
  const repNeeded = Math.max(0, 16 - rep);
  const raidNeeded = Math.max(0, 2 - raids);
  const closeToWin = repNeeded <= 3 && raidNeeded <= 1;

  // л‘җ л°ҳмӘҪмқ„ н•©міҗ м№ҙл“ң к°Җм№ҳ нҸүк°Җ (н•ҳлӮҳл§Ң м“°кІ м§Җл§Ң мһ мһ¬ кё°м—¬лҸ„ л‘ҳ лӢӨ н•©мӮ° X, мөңлҢҖк°’)
  const halves = [c.top, c.bot].filter(Boolean);
  for (const h of halves) {
    // кіөкІ©В·мқҙлҸҷ: кё°мЎҙ м җмҲҳ
    if (h.atk || h.atk_x2 || h.atk_x3_retort) score += (p.hp > p.maxHp * 0.5 ? 12 : -5);
    if (h.move) score += p.role === 'ghost' ? (raidNeeded > 0 ? 8 : 3) : 8;
    // мҶҚм„ұ мғқм„ұ
    if (h.gen) score += 4;
    // === мӢ к·ң: нҸҙл°ұ ліҙмғҒ нҡЁкіјл“Ө м җмҲҳнҷ” (BROKER/CIPHER/MOLE мӮҙлҰ¬кё°) ===
    if (h.extort) score += h.extort * 5;       // rep + credit
    if (h.contact) score += h.contact * 3;
    if (h.blackmarket) score += h.blackmarket * 4;
    if (h.peek_objective || h.sell_info) score += 6;  // rep + data
    if (h.peek_hand || h.peek_full || h.peek_news) score += 3;
    if (h.scout || h.scout_all || h.drone_scan) score += 2;
    if (h.broker_fee) score += h.broker_fee;  // мӨ‘к°ң мҲҳмҲҳлЈҢлҠ” credit + rep
    if (h.stop_combat || h.cancel_card || h.cancel_action) score += 7;  // к°ңмһ… вҶ’ rep +2
    if (h.invisible || h.invisible_2r || h.stealth || h.hide_actions || h.hide_actions_1r) score += (p.wanted > 2 ? 8 : 3);
    if (h.clear_wanted || h.burn_identity) score += (p.wanted > 3 ? 10 : 1);
    if (h.heal) score += (p.hp < p.maxHp * 0.5 ? 10 : 2);
    if (h.stat_boost) score += h.stat_boost * 2;
    if (h.ambush) score += 6;
    if (h.copy_bloc_card) score += 8;
    if (h.reward) score += h.reward;
    if (h.draw_quest || h.quest_two) score += 5;
    if (h.cargo_haul || h.supply_drop || h.haul) score += 4;
    if (h.deploy_trap || h.trap) score += 3;
    if (h.swap || h.swap_ratio) score += 2;
    // === v0.5.13: BLADE/MOLE/RIGGER нҡЁкіј м җмҲҳ ===
    if (h.execute) score += 12;            // мҰүмӢң л ҷ+4
    if (h.frenzy || h.atk_per_hp) score += (p.hp > p.maxHp * 0.6 ? 10 : 3);
    if (h.hp_to_1 || h.last_stand) score += (p.hp > p.maxHp * 0.7 ? 8 : -5);
    if (h.negate || h.shield || h.human_shield) score += (p.hp < p.maxHp * 0.5 ? 8 : 2);
    if (h.point_blank || h.surprise) score += 6;
    if (h.peek_bloc || h.steal_card) score += 7;
    if (h.bloc_resource || h.vote_flip) score += 10;
    if (h.frame || h.swap_blame) score += (p.wanted > 2 ? 8 : 4);
    // v0.6.6e: mini-raid нҠёлҰ¬кұ° м җмҲҳ (м Ғм • вҖ” л„Ҳл¬ҙ лҶ’мңјл©ҙ Ghost нҸӯмЈј)
    if (h.infiltrate || h.disguise || h.bypass_veil) score += 12;  // MOLE
    if (h.def_ignore || h.steal) score += 8;                        // CIPHER
    if (h.atk_range || h.multi_target || h.disable_elec || h.zone_disable) score += 8;  // RIGGER
    if (h.execute) score += 8;                                      // BLADE
    if (h.assassin || h.atk_twice || h.atk_x3_retort || h.atk_reroll || h.force_enter) score += 10;
    if (h.scandal || h.stock_dmg) score += 7;
    if (h.permanent_clear) score += (p.wanted > 3 ? 12 : 2);
    if (h.emp_pulse || h.tech_breach) score += 8;
    if (h.field_craft || h.jury_rig) score += 12;     // v0.6.6: к°•нҷ” нҡЁкіј л°ҳмҳҒ
    if (h.repair || h.salvage) score += 8;            // v0.6.6 мӢ к·ң
    if (h.craft_item || h.zone_shield) score += 8;    // v0.6.6 мӢ к·ң
    if (h.shield_gen || h.drone_swarm || h.overclock) score += 5;
    if (h.disable_tl || h.force_tl_down) score += 9;
    if (h.temp_tl) score += 5;
    if (h.transfer_ally || h.fuel) score += 6;        // v0.6.6c к°•нҷ”
    if (h.leave_fire || h.burn_behind || h.smuggle) score += 6;  // v0.6.6c к°•нҷ”
    if (h.untrack || h.shortcut || h.ignore_obstacles || h.move_3_nowalls || h.move_any || h.teleport) score += 5;
    if (h.ram_atk) score += 7;                        // v0.6.6c мӢ к·ң
    if (h.break_veil) score += 3;
    if (h.mimic || h.transfer_attack || h.redirect) score += 8;  // v0.6.6c мӢ к·ң
    if (h.wipe_log || h.slow_target) score += (p.wanted > 2 ? 10 : 4);
    if (h.protect_ally || h.absorb || h.def_infinite_to_1) score += (p.hp < p.maxHp * 0.6 ? 8 : 4);
    if (h.block_adj || h.enemy_spd || h.def_penalty || h.def_zero) score += 6;
  }

  // LOSS нҡҢн”ј
  if (c.loss) {
    if (p.hp < p.maxHp * 0.3) score -= 15;
    else score += (c.bot?.atk || 0);
  }

  // мҠ№лҰ¬ к·јм ‘ мӢң кіөкІ©В·мқҙлҸҷ м„ нҳё
  if (closeToWin) {
    if (halves.some(h => h.atk || h.move || h.extort)) score += 10;
  }

  return score + Math.random() * 3;
}

function scoreBlocCard(state, pIdx, cid) {
  const c = getCard(cid);
  const p = state.players[pIdx];
  if (!c) return 0;
  let score = 10;

  // Prefer own TL or lower
  if (c.tl <= p.tl) score += 15;
  if (c.tl > p.tl) score -= 20;

  // === v0.6.6: Bloc м җмҲҳ (ліҙмҲҳм Ғ мЎ°м • вҖ” Bloc м№ҙл“ң л„Ҳл¬ҙ мһҗмЈј м“°л©ҙ Ghost м•Ҫнҷ”)
  const m = c.main || {};
  if (m.move) score += 8;
  if (m.deploy_op) score += 14;
  if (m.hire_raid) score += 10;
  if (m.stock_buy_any) score += m.stock_buy_any * 3;
  if (m.crash_target || m.destroy_zone) score += 10;
  if (m.zone_income_2x || m.div_2x) score += 12;     // CARBON н•өмӢ¬
  if (m.zero_income || m.block_resource) score += 7;
  if (m.fortify || m.veil_up || m.fortify_here) score += 6;
  if (m.heal_all) score += 9;                        // HELIX н•өмӢ¬
  if (m.ghost_extra_card || m.contracts_boost) score += 8;
  if (m.same_round_trade || m.flash_trade) score += 6;
  if (m.algorithm || m.long_contract) score += 12;
  if (m.bond) score += m.bond;
  // v0.8.6: Bloc лҠҘлҸҷ м•Ўм…ҳ
  if (m.bounty_post) score += 12;          // к°ҖмһҘ к°•н•ң Ghost кІ¬м ң
  if (m.assassin_contract) score += 14;    // HP нҒ° нғҖкІ© + нҸүнҢҗ к°ҖмӮ°
  if (m.ghost_track) score += 10;          // м •ліҙ + мҲҳл°° + мҳҒн–Ҙл Ҙ
  if (m.lock_zone || m.quarantine) score += 7;
  if (m.steal_op) score += 10;
  if (m.revive) score += 5;
  if (m.ghost_move) score += 6;
  if (m.ghost_wanted_all) score += 5;
  if (m.heat && m.heat < 0) score += 5;
  if (m.peek_news || m.scout_all) score += 4;
  if (m.credit) score += m.credit;

  // Resource efficiency
  const costLen = c.main?.cost?.length || 0;
  if (costLen > 0) {
    let payable = true;
    const poolCopy = { ...(p.pool || {}) };
    for (const a of c.main.cost) {
      if (poolCopy[a] > 0) poolCopy[a]--;
      else if (poolCopy.GRID > 0) poolCopy.GRID--;
      else { payable = false; break; }
    }
    if (!payable) score -= 30;
  }

  // Reward aggressive cards for attackers
  if (c.main?.deploy_op || c.main?.heat) score += 10;

  return score + Math.random() * 2;
}

          </div>
          <div style={{ maxHeight: 220, overflowY: 'auto', fontFamily: 'Share Tech Mono, monospace', fontSize: 11 }}>
            <div style={{ display: 'grid', gridTemplateColumns: '80px 50px 80px 50px 50px 50px 50px 50px 1fr', gap: 4, color: 'var(--text-dim)', fontSize: 9, paddingBottom: 4, borderBottom: '1px solid var(--border)' }}>
              <div>мқјмӢң</div><div>кІ°кіј</div><div>нҒҙлһҳмҠӨ/лё”лЎқ</div><div>лқјмҡҙл“ң</div><div>л ҷ/мһҗмӮ°</div><div>л Ҳмқҙл“ң</div><div>TL</div><div>м—…м Ғ</div><div>мқҙмң </div>
            </div>
            {history.map((h, i) => (
              <div key={i} style={{ display: 'grid', gridTemplateColumns: '80px 50px 80px 50px 50px 50px 50px 50px 1fr', gap: 4, padding: '3px 0', borderBottom: '1px solid var(--bg3)' }}>
                <div style={{ color: 'var(--text-dim)' }}>{formatHistoryTime(h.ts)}</div>
                <div style={{ color: h.won ? 'var(--green)' : 'var(--magenta)', fontWeight: 700 }}>{h.won ? 'мҠ№' : 'нҢЁ'}</div>
                <div>{h.role === 'ghost' ? 'рҹ‘»' : 'рҹҸў'} {h.specific}</div>
                <div style={{ textAlign: 'center' }}>R{h.round}</div>
                <div style={{ textAlign: 'center', color: 'var(--yellow)' }}>{h.role === 'ghost' ? h.rep : h.asset}</div>
                <div style={{ textAlign: 'center' }}>{h.raids || 0}</div>
                <div style={{ textAlign: 'center', color: 'var(--green)' }}>вҡЎ{h.tl}</div>
                <div style={{ textAlign: 'center' }}>{h.achievements || 0}</div>
                <div style={{ color: 'var(--text-dim)', fontSize: 10, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }}>{h.reason || 'вҖ”'}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

function GameScreen({ state, dispatch }) {
  // v1.0.2: н•«мӢңнҠё лӘЁл“ңл©ҙ activePlayer мқёк°„ кё°мӨҖмңјлЎң 'me' кІ°м •
  const isMulti = state.meta.mode === 'multi';
  const meIdx = isMulti ? (state.meta.activePlayer ?? 0) : 0;
  const me = state.players[meIdx];
  const isMyTurn = state.meta.phase === 2;  // Plan phase
  const [passDeviceShown, setPassDeviceShown] = useState(false);  // v1.0.2: pass-device к°ҖлҰјл§ү
  const [selectedCards, setSelectedCards] = useState([]);
  const [selectedHalves, setSelectedHalves] = useState([]);  // к°Ғ м„ нғқ м№ҙл“ңмқҳ 'top'|'bot' (Ghost) / 'main'|'side' (Bloc)

  // v1.0.2: н•«мӢңнҠё вҖ” activePlayer ліҖкІҪлҗҳл©ҙ м№ҙл“ң м„ нғқ лҰ¬м…Ӣ + pass-device лӘЁлӢ¬ мһҗлҸҷ н‘ңмӢң
  useEffect(() => {
    if (isMulti) {
      setSelectedCards([]);
      setSelectedHalves([]);
      setPassDeviceShown(true);
    }
    // eslint-disable-next-line
  }, [meIdx, isMulti]);

  // Auto-advance phases
  useEffect(() => {
    if (state.meta.gameOver) return;
    const ph = state.meta.phase;

    // Instantaneous phase handling
    // Phase 1 (мӢңмһҘ) вҖ” лүҙмҠӨ 1мһҘ кіөк°ң + лҙҮ кұ°лһҳ. мӮ¬мҡ©мһҗ кұ°лһҳлҠ” "кұ°лһҳ лҒқ" лІ„нҠјмңјлЎң м§„н–ү.
    if (ph === 1 && !state.currentNews) {
      setTimeout(() => dispatch({ type: 'DRAW_NEWS' }), 400);
      setTimeout(() => dispatch({ type: 'BOT_MARKET' }), 1200);
      // phase 2лЎңмқҳ мһҗлҸҷ мқҙлҸҷмқҖ мӮ¬мҡ©мһҗк°Җ мӢңмһҘ нҢЁл„җмқҳ "кұ°лһҳ лҒқ" лІ„нҠјмқ„ лҲҢлҹ¬м•ј н•Ё
    }

    if (ph === 2) {
      // Bots auto-pick
      state.players.forEach((p, i) => {
        if (p.kind === 'bot' && !p.defeated && p.plannedCards.length === 0) {
          const cards = botPickCards(state, i);
          setTimeout(() => dispatch({ type: 'PLAN_CARDS', playerIdx: i, cards }), 300 + i * 200);
        }
      });
    }

    if (ph === 3) {
      setTimeout(() => {
        dispatch({ type: 'SNAPSHOT_TURN' });
        setTimeout(() => dispatch({ type: 'EXECUTE_TURN' }), 150);
        setTimeout(() => dispatch({ type: 'COMPUTE_TURN_DIFF' }), 900);
        setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 4 }), 1400);
      }, 500);
    }

    if (ph === 4) {
      setTimeout(() => {
        dispatch({ type: 'COLLECT_INCOME' });
        setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 5 }), 800);
      }, 400);
    }

    if (ph === 5) {
      setTimeout(() => dispatch({ type: 'RESEARCH_PHASE' }), 300);
      setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 6 }), 900);
    }

    if (ph === 6) {
      setTimeout(() => {
        // Check victory
        const after = checkInstantVictory(state);
        if (after.meta.gameOver) {
          dispatch({ type: 'VICTORY', winner: after.meta.winner, reason: after.meta.winReason });
        } else {
          dispatch({ type: 'NEXT_ROUND' });
        }
      }, 500);
    }
  }, [state.meta.phase, state.meta.round]);

  const canPlan = me.kind === 'human' && state.meta.phase === 2;
  const needCards = 2; // GhostВ·Bloc лӘЁл‘җ 2мһҘ н”Ңл Ҳмқҙ (main/side мЎ°н•©)

  // м„ нғқн•ң м№ҙл“ң+л°ҳмӘҪмқҳ мҙқ мқҙлҸҷ мҠӨн…қ н•©кі„
  const computeMoveBudget = (cards, halves) => {
    let total = 0;
    cards.forEach((cid, idx) => {
      const c = getCard(cid);
      if (!c) return;
      const defaultHalf = me.role === 'ghost'
        ? (idx === 0 ? 'top' : 'bot')
        : (idx === 0 ? 'main' : 'side');
      const half = halves[idx] || defaultHalf;
      if (c[half]?.move) total += c[half].move;
    });
    return total;
  };

  const confirmPlan = () => {
    // v1.0.2: н•«мӢңнҠё лӘЁл“ңл©ҙ нҷңм„ұ мқёк°„ мқёлҚұмҠӨлЎң
    dispatch({ type: 'PLAN_CARDS', playerIdx: meIdx, cards: selectedCards, halves: selectedHalves });
    const budget = computeMoveBudget(selectedCards, selectedHalves);
    // v1.0.2: л©ҖнӢ° лӘЁл“ңл©ҙ лӢӨмқҢ мқёк°„ м°ЁлЎҖлЎң (лӘЁл“  мқёк°„ plan лҒқлӮҳл©ҙ phase 3)
    if (isMulti) {
      const humansIdx = state.players.map((p, i) => p.kind === 'human' && !p.defeated ? i : -1).filter(x => x >= 0);
      const curPos = humansIdx.indexOf(meIdx);
      if (curPos < humansIdx.length - 1) {
        // м•„м§Ғ plan м•Ҳ н•ң мқёк°„ лӮЁмқҢ вҶ’ NEXT_HUMAN
        setTimeout(() => dispatch({ type: 'NEXT_HUMAN' }), 400);
        return;
      }
      // л§Ҳм§Җл§ү мқёк°„ вҶ’ phase 3
      setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 3 }), 600);
      return;
    }
    // мқҙлҸҷ мҠӨн…қмқҙ мһҲмңјл©ҙ мӮ¬мҡ©мһҗм—җкІҢ лӘ©н‘ң нҒҙлҰӯ мҡ”мІӯ
    if (budget > 0) {
      dispatch({ type: 'REQUEST_MOVE_TARGET', budget });
    } else {
      setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 3 }), 600);
    }
    setSelectedCards([]);
    setSelectedHalves([]);
  };

  const skipMovePick = () => {
    // лӘ©н‘ң м°Қм§Җ м•Ҡкі  AI лқјмҡ°нҢ…м—җ мң„мһ„
    dispatch({ type: 'CLEAR_MOVE_TARGET' });
    setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 3 }), 300);
  };

  const pickMoveTarget = (coord) => {
    if (!state.meta.awaitingMoveTarget) return;
    dispatch({ type: 'SET_MOVE_TARGET', coord });
    setTimeout(() => dispatch({ type: 'SET_PHASE', phase: 3 }), 300);
  };

  // лӮҙ нҳ„мһ¬ мң„м№ҳм—җм„ң moveBudget л§ҢнҒј BFSлЎң лҸ„лӢ¬ к°ҖлҠҘн•ң м…Җ м§‘н•©
  const reachableCells = useMemo(() => {
    if (!state.meta.awaitingMoveTarget) return new Set();
    const from = me.position;
    if (!from) return new Set();
    const budget = state.meta.moveBudget || 0;
    const visited = new Map();
    visited.set(from, 0);
    let frontier = [from];
    for (let step = 0; step < budget; step++) {
      const next = [];
      frontier.forEach(c => {
        coordsAdj(c).forEach(a => {
          if (!visited.has(a) && state.map[a]) {
            visited.set(a, step + 1);
            next.push(a);
          }
        });
      });
      frontier = next;
    }
    visited.delete(from);  // м ңмһҗлҰ¬лҠ” м„ нғқ л¶Ҳк°Җ
    return new Set(visited.keys());
  }, [state.meta.awaitingMoveTarget, state.meta.moveBudget, me.position]);

  const toggleCard = (cid) => {
    if (!canPlan) return;
    if (selectedCards.includes(cid)) {
      const idx = selectedCards.indexOf(cid);
      setSelectedCards(selectedCards.filter(c => c !== cid));
      setSelectedHalves(selectedHalves.filter((_, i) => i !== idx));
    } else if (selectedCards.length < needCards) {
      const newSel = [...selectedCards, cid];
      // кё°ліё: мІ« м№ҙл“ң=top/main, л‘җ лІҲм§ё м№ҙл“ң=bot/side
      let defaultHalf;
      if (me.role === 'ghost') {
        defaultHalf = selectedCards.length === 0 ? 'top' : 'bot';
      } else {
        defaultHalf = selectedCards.length === 0 ? 'main' : 'side';
      }
      setSelectedCards(newSel);
      setSelectedHalves([...selectedHalves, defaultHalf]);
    }
  };

  // нҠ№м • м„ нғқ м№ҙл“ңмқҳ л°ҳмӘҪ нҶ кёҖ
  const cycleHalf = (idx) => {
    if (!canPlan) return;
    const next = [...selectedHalves];
    if (me.role === 'ghost') {
      next[idx] = next[idx] === 'top' ? 'bot' : 'top';
    } else {
      next[idx] = next[idx] === 'main' ? 'side' : 'main';
    }
    setSelectedHalves(next);
  };

  if (state.meta.gameOver) {
    const iWon = state.meta.winner === 0;
    return (
      <div className={`gameover ${iWon ? 'win' : 'lose'}`} style={{ overflow: 'auto', height: '100vh', padding: 24 }}>
        <h1>{iWon ? 'VICTORY' : 'DEFEAT'}</h1>
        <div style={{ color: 'var(--text-dim)', fontSize: 14, letterSpacing: 2, marginBottom: 20, textAlign: 'center' }}>
          {state.meta.winReason || 'кІҢмһ„ мў…лЈҢ'}
        </div>
        <div className="stats-grid">
          <div className="stat-box">
            <div className="lbl">ROUND</div>
            <div className="val">{state.meta.round}</div>
          </div>
          <div className="stat-box">
            <div className="lbl">{me.role === 'bloc' ? 'ASSET' : 'REP'}</div>
            <div className="val">{me.role === 'bloc' ? assetValue(me, state.stocks, state) : me.resources.rep}</div>
          </div>
          <div className="stat-box">
            <div className="lbl">ACHIEVEMENTS</div>
            <div className="val">{me.achievements.length}</div>
          </div>
        </div>
        <div style={{ display: 'flex', gap: 12, justifyContent: 'center', marginTop: 12, marginBottom: 20, flexWrap: 'wrap' }}>
          <button className="start-btn" style={{ maxWidth: 180 }} onClick={() => dispatch({ type: 'RESET', humanRole: me.role, humanSpecific: me.specific })}>
            рҹ”„ лӢӨмӢң
          </button>
          <button className="start-btn" style={{ maxWidth: 180, background: 'var(--bg3)', color: 'var(--yellow)', border: '1px solid var(--yellow)' }} onClick={() => dispatch({ type: 'BACK_TO_MENU' })}>
            рҹ“Ҡ л©”лүҙ & нһҲмҠӨнҶ лҰ¬
          </button>
          <button className="start-btn" style={{ maxWidth: 180, background: 'var(--bg3)', color: 'var(--cyan)', border: '1px solid var(--cyan)' }} onClick={() => copyLogToClipboard(state.log)}>
            рҹ“Ӣ лЎңк·ё ліөмӮ¬
          </button>
        </div>

        {/* кІҢмһ„ лҒқлӮҳлҸ„ лЎңк·ё н‘ңмӢң */}
        <div style={{ maxWidth: 900, margin: '20px auto', background: 'var(--bg2)', border: '1px solid var(--border)', borderRadius: 4, padding: 16, textAlign: 'left' }}>
          <h3 style={{ margin: 0, fontFamily: 'Share Tech Mono, monospace', color: 'var(--cyan)', letterSpacing: 2, fontSize: 14, marginBottom: 12 }}>рҹ“ң м „мІҙ н”Ңл Ҳмқҙ лЎңк·ё ({state.log.length}к°ң м—”нҠёлҰ¬)</h3>
          <div style={{ maxHeight: '50vh', overflowY: 'auto', fontFamily: 'Share Tech Mono, monospace', fontSize: 11 }}>
            {state.log.map((l, i) => {
              const cls = classifyLog(l.message);
              return (
                <div key={i} className={`log-entry ${cls}`} style={{ padding: '3px 6px', marginBottom: 2, lineHeight: 1.4 }}>
                  <span className="tag" style={{ fontSize: 9, color: 'var(--text-dim)', marginRight: 6 }}>R{l.round}В·P{l.phase + 1}</span>
                  {l.message}
                </div>
              );
            })}
          </div>
        </div>
      </div>
    );
  }

  return (
    <div className="game">
      {/* === v0.5.22: л Ҳмқҙл“ң н’Җм„ёнҠё лӘЁлӢ¬ (нғҖмһ… м„ нғқ вҶ’ мһҗмӣҗ нҲ¬мһҗ вҶ’ мӢӨн–ү) === */}
      {state.meta.pendingRaid && (() => {
        const pr = state.meta.pendingRaid;
        const counterActive = countersBloc(me.specific, pr.bloc);
        const counterBonus = counterActive ? 1 : 0;
        const zoneType = pr.zoneType;
        const zoneAttr = ZONE_TYPES[zoneType]?.attr;
        const zoneLoot = ZONE_LOOT[zoneType] || {};
        const defense = BLOC_DEFENSE[pr.bloc] || {};
        const rt = pr.selectedType ? RAID_TYPES[pr.selectedType] : null;

        // л°©м–ҙ нҡЁкіј мҡ”м•Ҫ
        let thresholdMod = 0;
        const defenseDesc = [];
        if (defense.threshold_plus) { thresholdMod += defense.threshold_plus; defenseDesc.push(`${pr.bloc} л°©м–ҙ +${defense.threshold_plus}`); }
        if (defense.detect) defenseDesc.push(`${pr.bloc} м„јм„ң к°җм§Җ (м ‘к·ј -2)`);
        if (defense.all_plus) defenseDesc.push(`${pr.bloc} AI ліҙмЎ° (м „ нҢҗм • -${defense.all_plus})`);
        if (pr.fortified > 0) { thresholdMod += pr.fortified; defenseDesc.push(`мҡ”мғҲнҷ” +${pr.fortified}`); }

        // нҳ„мһ¬ мҳҲмғҒ м„ұкіөлҘ  (нҒ¬лҰ¬нӢ°м»¬ мӢӨнҢЁ 5/6л§Ң л°ҳмҳҒ)
        let estPct = 50;
        if (rt) {
          const stat = me.stats[rt.useStat] || 0;
          const poolBonus = pr.invested.poolAttr === zoneAttr ? 2 : (pr.invested.poolAttr ? 1 : 0);
          const execBonus = pr.invested.weapons + counterBonus - (defense.all_plus || 0);
          const effThreshold = rt.threshold + thresholdMod;
          const effStat = stat + execBonus + poolBonus;
          const needed = effThreshold - effStat;
          // d6=1мқҖ мһҗлҸҷ мӢӨнҢЁ. 2~6 мӨ‘ (6-needed+1) м„ұкіө. лӢЁ max 5/6
          const baseSucc = Math.max(0, Math.min(6, 7 - needed));
          const rawSucc = Math.min(5, baseSucc);  // 1мқҖ crit fail
          estPct = Math.round(rawSucc / 6 * 100);
        }

        return (
          <div style={{ position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.88)', zIndex: 200, display: 'flex', alignItems: 'center', justifyContent: 'center', overflow: 'auto', padding: 16 }}>
            <div style={{ background: 'var(--bg2)', border: '2px solid var(--magenta)', borderRadius: 6, padding: 20, maxWidth: 720, width: '95%', boxShadow: '0 0 30px rgba(255, 60, 140, 0.3)' }}>
              <div style={{ color: 'var(--magenta)', fontFamily: 'Share Tech Mono, monospace', fontSize: 11, letterSpacing: 2, marginBottom: 4 }}>рҹ—ЎпёҸ RAID В· 3-PHASE</div>
              <h2 style={{ margin: 0, color: 'var(--text)', letterSpacing: 1 }}>
                {pr.coord} В· {pr.zoneNm} В· <span style={{ color: 'var(--magenta)' }}>{pr.bloc}</span> кұ°м җ
              </h2>
              {/* л°©м–ҙ м •ліҙ */}
              {defenseDesc.length > 0 && (
                <div style={{ marginTop: 6, padding: '6px 8px', background: 'rgba(255, 60, 140, 0.08)', border: '1px dashed var(--magenta)', borderRadius: 3, fontSize: 10, color: 'var(--magenta)' }}>
                  рҹӣЎ мһҗлҸҷ л°©м–ҙ: {defenseDesc.join(' В· ')}
                </div>
              )}

              {/* Step 1: нғҖмһ… м„ нғқ */}
              <div style={{ marginTop: 12 }}>
                <div style={{ color: 'var(--cyan)', fontSize: 11, letterSpacing: 2, marginBottom: 6 }}>1пёҸвғЈ л Ҳмқҙл“ң нғҖмһ… м„ нғқ</div>
                <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 8 }}>
                  {Object.entries(RAID_TYPES).map(([key, cfg]) => {
                    const selected = pr.selectedType === key;
                    const stat = me.stats[cfg.useStat];
                    // v0.6.3c: нҠёлһҷ LV мһ кёҲ мІҙнҒ¬
                    const reqT = cfg.requiresTrack;
                    const myLv = reqT ? (me.tracks?.[reqT.key] || 0) : 0;
                    const locked = !!reqT && myLv < reqT.lv;
                    const lockLabel = reqT ? `${TRACK_NAMES[reqT.key].name} LV${reqT.lv}` : null;
                    return (
                      <button key={key}
                        onClick={() => !locked && dispatch({ type: 'RAID_SELECT_TYPE', raidType: key })}
                        disabled={locked}
                        style={{
                          padding: 10,
                          background: locked ? 'rgba(60,60,80,0.4)' : (selected ? 'rgba(60,200,220,0.2)' : 'var(--bg3)'),
                          border: `2px solid ${locked ? 'var(--bg3)' : (selected ? 'var(--cyan)' : 'var(--border)')}`,
                          borderRadius: 4,
                          cursor: locked ? 'not-allowed' : 'pointer',
                          textAlign: 'left',
                          color: locked ? 'var(--text-dim)' : 'var(--text)',
                          fontSize: 11, lineHeight: 1.4,
                          opacity: locked ? 0.55 : 1,
                        }}>
                        <div style={{ fontSize: 16 }}>{locked ? 'рҹ”’ ' : ''}{cfg.icon} <strong>{cfg.name}</strong></div>
                        <div style={{ color: 'var(--text-dim)', fontSize: 10, marginTop: 2 }}>{cfg.desc}</div>
                        {reqT && (
                          <div style={{ marginTop: 2, fontSize: 9, color: locked ? 'var(--magenta)' : 'var(--green)' }}>
                            {locked ? `рҹ”’ ${lockLabel} н•„мҡ” (LV${myLv}/${reqT.lv})` : `вң“ ${lockLabel} м¶©мЎұ`}
                            {cfg.classAffinity && me.specific === cfg.classAffinity && ' В· нҒҙлһҳмҠӨ нҠ№нҷ”'}
                          </div>
                        )}
                        <div style={{ marginTop: 4, fontFamily: 'Share Tech Mono, monospace', fontSize: 10 }}>
                          {cfg.useStat.toUpperCase()} {stat} В· лӘ©н‘ң {cfg.threshold}
                        </div>
                        <div style={{ marginTop: 3, color: 'var(--green)', fontSize: 10 }}>
                          вң“ л ҷ+{cfg.success.rep}{cfg.success.data ? ` рҹ“Ў+${cfg.success.data}` : ''} В· мЈјк°Җ-{cfg.success.stockHit}
                        </div>
                        <div style={{ color: 'var(--magenta)', fontSize: 10 }}>
                          вң— {cfg.failure.hp ? `HP-${cfg.failure.hp} ` : ''}мҲҳл°°+{cfg.failure.wanted}
                        </div>
                      </button>
                    );
                  })}
                </div>
              </div>

              {/* Step 2: мһҗмӣҗ нҲ¬мһҗ (нғҖмһ… м„ нғқ нӣ„ нҷңм„ұ) */}
              {pr.selectedType && (
                <div style={{ marginTop: 14 }}>
                  <div style={{ color: 'var(--yellow)', fontSize: 11, letterSpacing: 2, marginBottom: 6 }}>2пёҸвғЈ мһҗмӣҗ нҲ¬мһҗ (м„ нғқ)</div>
                  <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 8 }}>
                    <div style={{ background: 'var(--bg1)', border: '1px solid var(--border)', borderRadius: 3, padding: 8, fontSize: 11 }}>
                      <div style={{ color: 'var(--text-dim)', fontSize: 9 }}>рҹ”© л¬ҙкё° ({pr.invested.weapons}) В· мӢӨн–ү+1/к°ң</div>
                      <div style={{ display: 'flex', gap: 4, marginTop: 4 }}>
                        <button className="pa-btn" style={{ flex: 1, fontSize: 10 }} disabled={(me.resources.weapons||0) <= pr.invested.weapons} onClick={() => dispatch({ type: 'RAID_INVEST', item: 'weapons' })}>+1</button>
                      </div>

                  {canSell && <button style={{ fontSize: 9, padding: '1px 5px', background: 'var(--bg3)', color: 'var(--magenta)', border: '1px solid var(--magenta)', borderRadius: 2, cursor: 'pointer' }} onClick={() => dispatch({ type: 'SELL_STOCK', playerIdx: 0, bloc: bl, qty: 1 })}>л§ӨлҸ„ вӮө{v}</button>}

        <div className="log-box">
          <div className="log-head">
            <h4>рҹ“ң н”Ңл Ҳмқҙ лЎңк·ё</h4>
            <button className="copy-btn" onClick={() => copyLogToClipboard(state.log)}>рҹ“Ӣ ліөмӮ¬</button>

              const cls = classifyLog(l.message);
              return (
                <div key={i} className={`log-entry ${cls}`}>
                  <span className="tag">R{l.round}В·P{l.phase + 1}</span>

            })}

        </div>
      </div>
    </div>
  );
}

function classifyLog(msg) {
  if (!msg) return '';
  const classes = [];
  if (msg.includes('вӯҗ лӢ№мӢ ')) classes.push('me');
  if (msg.includes('рҹ”„ R') || msg.includes('RмӢңмһ‘') || msg.includes('мӢңмһ‘ В·')) classes.push('round');
  if (msg.includes('рҹ“Ҡ') || msg.includes('мҡ”м•Ҫ')) classes.push('summary');
  if (msg.includes('рҹ—ЎпёҸ') || msg.includes('л Ҳмқҙл“ң')) classes.push('raid');
  else if (msg.includes('рҹ’Ҙ')) classes.push('combat');
  if (msg.includes('рҹ’°') || msg.includes('рҹ“Ҳ') || msg.includes('мҲҳмһ…')) classes.push('income');
  if (msg.includes('рҹ“°')) classes.push('news');
  if (msg.includes('рҹҡ¶')) classes.push('move');
  return classes.join(' ');
}

function copyLogToClipboard(log) {
  const text = log.map(l => `[R${l.round}В·P${l.phase + 1}] ${l.message}`).join('\n');
  navigator.clipboard.writeText(text).then(
    () => alert('вң… лЎңк·ё ліөмӮ¬ мҷ„лЈҢ В· ' + log.length + 'к°ң м—”нҠёлҰ¬'),
    () => {
      // Fallback for file:// or clipboard blocked
      const ta = document.createElement('textarea');
      ta.value = text;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); alert('вң… лЎңк·ё ліөмӮ¬ мҷ„лЈҢ (fallback)'); }
      catch (e) { alert('вқҢ ліөмӮ¬ мӢӨнҢЁ. лЎңк·ём°Ҫ мҠӨнҒ¬лЎӨн•ҙм„ң мҲҳлҸҷ м„ нғқВ·Ctrl+C'); }
      document.body.removeChild(ta);
    }
  );
}

function effectSummary(eff) {
  if (!eff) return '-';
  const parts = [];

  if (eff.cost && eff.cost.length) parts.push(`[${eff.cost.join('+')} мҶҢл№„]`);
  if (eff.gen) parts.push(`мҶҚм„ұ ${eff.gen.split(':').map(x => `${x}+1`).join(' ')} мғқм„ұ`);

  // v0.8.6: Bloc лҠҘлҸҷ м•Ўм…ҳ
  if (eff.bounty_post) parts.push('нҳ„мғҒкёҲ л°ңн–ү (Ghost нҸүнҢҗ 1мң„ мҲҳл°°+3, мһҗкё° вӮө+3 рҹҺҷ+1)');
  if (eff.assassin_contract) parts.push('мІӯл¶Җ мӮҙмқё (Ghost HP 1мң„ -4, вӮө-3 вҳ…+2)');
  if (eff.ghost_track) parts.push('Ghost м¶”м Ғ (м „мӣҗ мҲҳл°°+1, м§ҖлҸ„ 5R л…ём¶ң, мһҗкё° рҹ“Ў+3 рҹҺҷ+1)');

  if (eff.move) parts.push(`мқҙлҸҷ ${eff.move}м№ё`);
  if (eff.atk) parts.push(`кіөкІ© +${eff.atk} (к°ҷмқҖ кө¬м—ӯ м Ғ)`);
  if (eff.atk_x2) parts.push(`кіөкІ© 2л°° (мқҙлІҲ лқјмҡҙл“ң)`);
  if (eff.atk_x3_retort) parts.push(`л°ҳкІ© кіөкІ© 3л°°`);
  if (eff.def) parts.push(`л°©м–ҙ +${eff.def}`);

// ============================================================================
// ROOT
// ============================================================================

function buildInitial(opts) {
  // v1.0: opts = { mode, mapSize, difficulty, role, specific, humans }
  const { mode = 'solo', mapSize = '11x11', difficulty = 'normal', role = 'ghost', specific = 'CIPHER', humans = null } = opts || {};
  const playerCount = mode === 'multi' && humans ? Math.max(2, humans.length) : 4;
  const initial = initGame(role, specific, playerCount, mapSize, { mode, difficulty, humans });
  initial.players = initial.players.map(p => {
    const handSize = 6;
    return { ...p, hand: p.deck.slice(0, handSize), deck: p.deck.slice(handSize) };
  });
  return initial;
}

function App() {
  const [state, setState] = useState(null);
  const savedRef = useRef(false);

  const startGame = useCallback((opts) => {
    console.log('[SIM] Start game:', opts);
    savedRef.current = false;
    setState(buildInitial(opts));
  }, []);

  const dispatch = useCallback((action) => {
    if (action.type === 'RESET') {
      savedRef.current = false;
      setState(buildInitial(action.opts));
      return;
    }
    if (action.type === 'BACK_TO_MENU') {
      savedRef.current = false;
      setState(null);
      return;
    }
    setState(prev => {
      if (!prev) return prev;
      try {
        return reducer(prev, action);
      } catch (e) {
        console.error('[SIM] Reducer error:', e, 'Action:', action);
        return prev;
      }
    });
  }, []);

  // кІҢмһ„ мў…лЈҢ мӢң нһҲмҠӨнҶ лҰ¬ м ҖмһҘ (н•ң лІҲл§Ң)
  useEffect(() => {
    if (state?.meta?.gameOver && !savedRef.current) {
      savedRef.current = true;
      saveGameRecord(buildGameRecord(state));
    }
  }, [state?.meta?.gameOver]);

  if (!state) {
    return <SetupScreen onStart={startGame} />;
  }

  return <GameScreen state={state} dispatch={dispatch} />;
}

// Mount
const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<App />);

</script>
